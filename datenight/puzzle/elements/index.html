<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>flameboi & aguagurl</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../hud.css" />
  <script src="../../theme.js"></script>
  <script src="../../hud.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1f14;
      color: #f0e6d3;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 25% 85%, rgba(255,80,20,0.05) 0%, transparent 35%),
        radial-gradient(ellipse at 75% 85%, rgba(40,80,200,0.05) 0%, transparent 35%),
        linear-gradient(180deg, #141a10 0%, #1a2014 50%, #141a10 100%);
      z-index: -1;
    }

    /* -- Top controls bar -- */
    .top-controls {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 1.2rem; padding: 0.5rem 1rem;
      z-index: 500;
      font-family: 'Caveat', cursive; font-size: 0.9rem;
      color: rgba(240,230,211,0.3);
      background: rgba(14,18,10,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .top-controls a, .top-controls button {
      font-family: inherit; font-size: inherit;
      color: rgba(240,230,211,0.3); background: none;
      border: none; text-decoration: none;
      cursor: pointer; transition: color 0.3s;
      white-space: nowrap;
    }
    .top-controls a:hover, .top-controls button:hover {
      color: rgba(240,230,211,0.7);
    }
    .top-controls .pts-num { color: #d49b3c; font-weight: 600; }
    .top-controls .tc-sep {
      width: 1px; height: 14px;
      background: rgba(240,230,211,0.08);
    }

    .back-link { display: none; }
    .status-bar { display: none; }

    .switch-hint {
      position: fixed; bottom: 0.6rem; left: 50%; transform: translateX(-50%);
      font-family: 'Caveat', cursive; font-size: 0.8rem;
      color: rgba(240,230,211,0.2); z-index: 500;
      pointer-events: none;
    }
    .active-indicator {
      display: inline-block; padding: 0.1rem 0.5rem;
      border-radius: 8px; font-size: 0.75rem; margin-left: 0.2rem;
    }
    .active-fire { background: rgba(255,120,30,0.15); color: rgba(255,180,100,0.7); }
    .active-water { background: rgba(40,100,200,0.15); color: rgba(100,180,255,0.7); }
    @media (pointer: coarse) {
      .switch-hint { bottom: 4.5rem; }
    }

    /* Level info bar */
    .level-info { display: none; }

    /* ---- Level Container ---- */
    #level-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 3px;
      background: #0e1209;
      box-shadow:
        0 0 0 2px #090c06,
        0 4px 30px rgba(0,0,0,0.8);
      transition: opacity 0.3s;
    }
    #level {
      position: relative;
      overflow: hidden;
      background: #1c2218;
    }

    .tile {
      position: absolute;
      image-rendering: pixelated;
      z-index: 1;
    }

    /* Walls */
    .tile-wall {
      background: #4a3f2e;
      box-shadow:
        inset 1px 1px 0 rgba(255,240,200,0.08),
        inset -1px -1px 0 rgba(0,0,0,0.35);
    }
    .tile-wall::after {
      content: '';
      position: absolute; inset: 0;
      border: 1px solid rgba(0,0,0,0.25);
    }
    .tile-wall.v1 { background: linear-gradient(135deg, #4e432f, #4a3f2e, #443a28); }
    .tile-wall.v2 { background: linear-gradient(150deg, #463c2a, #4d422e, #4a3f2e); }
    .tile-wall.v3 { background: linear-gradient(120deg, #4c412d, #443a28, #4a3f2e); }
    .tile-wall.edge-top {
      box-shadow:
        inset 0 2px 0 rgba(255,240,200,0.15),
        inset 1px 0 0 rgba(255,240,200,0.05),
        inset -1px -1px 0 rgba(0,0,0,0.35);
    }
    /* Mossy wall accent */
    .tile-wall.mossy::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent 20%, rgba(80,140,50,0.3) 50%, transparent 80%);
    }

    /* Lava — sunk into floor */
    .tile-lava {
      background: #1c2218;
      overflow: hidden;
    }
    .tile-lava::after {
      content: '';
      position: absolute; bottom: 0; left: 2px; right: 2px; height: 60%;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(255,255,100,0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 50%, rgba(255,200,50,0.3) 0%, transparent 40%),
        linear-gradient(180deg, #ffaa22 0%, #ff7700 25%, #ee5500 50%, #cc3300 80%, #aa2200 100%);
      box-shadow:
        0 -4px 12px rgba(255,120,0,0.5),
        0 -1px 4px rgba(255,200,50,0.3),
        inset 0 2px 6px rgba(255,255,100,0.3);
      border-radius: 6px 6px 0 0;
      animation: lava-glow 2s ease-in-out infinite alternate;
    }
    .tile-lava::before {
      content: '';
      position: absolute; bottom: 58%; left: 2px; right: 2px; height: 5px;
      background: linear-gradient(90deg,
        transparent 5%,
        rgba(255,200,50,0.4) 15%,
        rgba(255,255,100,0.6) 30%,
        rgba(255,200,50,0.3) 45%,
        rgba(255,255,100,0.5) 60%,
        rgba(255,200,50,0.4) 80%,
        transparent 95%);
      border-radius: 3px;
      animation: wave 2.5s ease-in-out infinite;
      z-index: 1;
      filter: blur(1px);
    }
    @keyframes wave {
      0%, 100% { transform: scaleX(1) translateX(0); opacity: 0.6; }
      50% { transform: scaleX(1.03) translateX(-2px); opacity: 1; }
    }
    @keyframes lava-glow {
      0% { box-shadow: 0 -4px 12px rgba(255,120,0,0.4), 0 -1px 4px rgba(255,200,50,0.2), inset 0 2px 6px rgba(255,255,100,0.2); }
      100% { box-shadow: 0 -6px 18px rgba(255,120,0,0.6), 0 -2px 8px rgba(255,200,50,0.4), inset 0 3px 8px rgba(255,255,100,0.35); }
    }

    /* Water — sunk into floor */
    .tile-water {
      background: #1c2218;
      overflow: hidden;
    }
    .tile-water::after {
      content: '';
      position: absolute; bottom: 0; left: 2px; right: 2px; height: 60%;
      background:
        radial-gradient(ellipse at 25% 35%, rgba(100,200,255,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 45%, rgba(150,230,255,0.2) 0%, transparent 40%),
        linear-gradient(180deg, #55bbee 0%, #3399dd 25%, #2277bb 50%, #1155aa 80%, #0e4499 100%);
      box-shadow:
        0 -4px 12px rgba(30,100,200,0.4),
        0 -1px 4px rgba(100,200,255,0.25),
        inset 0 2px 6px rgba(150,230,255,0.25);
      border-radius: 6px 6px 0 0;
      animation: water-glow 3s ease-in-out infinite alternate;
    }
    .tile-water::before {
      content: '';
      position: absolute; bottom: 58%; left: 2px; right: 2px; height: 5px;
      background: linear-gradient(90deg,
        transparent 5%,
        rgba(100,200,255,0.3) 15%,
        rgba(150,230,255,0.5) 30%,
        rgba(100,200,255,0.2) 45%,
        rgba(150,230,255,0.4) 65%,
        rgba(100,200,255,0.3) 80%,
        transparent 95%);
      border-radius: 3px;
      animation: wave 3.5s ease-in-out infinite;
      z-index: 1;
      filter: blur(1px);
    }
    @keyframes water-glow {
      0% { box-shadow: 0 -4px 12px rgba(30,100,200,0.3), 0 -1px 4px rgba(100,200,255,0.15), inset 0 2px 6px rgba(150,230,255,0.15); }
      100% { box-shadow: 0 -6px 16px rgba(30,100,200,0.5), 0 -2px 6px rgba(100,200,255,0.3), inset 0 3px 8px rgba(150,230,255,0.3); }
    }

    /* Green goo — sunk into floor */
    .tile-goo {
      background: #1c2218;
      overflow: hidden;
    }
    .tile-goo::after {
      content: '';
      position: absolute; bottom: 0; left: 2px; right: 2px; height: 60%;
      background:
        radial-gradient(ellipse at 35% 40%, rgba(100,255,50,0.25) 0%, transparent 45%),
        linear-gradient(180deg, #55cc33 0%, #44aa22 30%, #338818 60%, #2a7a1a 100%);
      box-shadow:
        0 -4px 12px rgba(50,180,50,0.35),
        inset 0 2px 6px rgba(100,255,50,0.2);
      border-radius: 6px 6px 0 0;
      animation: goo-glow 2.5s ease-in-out infinite alternate;
    }
    .tile-goo::before {
      content: '';
      position: absolute; bottom: 58%; left: 2px; right: 2px; height: 5px;
      background: linear-gradient(90deg,
        transparent, rgba(100,255,50,0.3) 25%, rgba(150,255,100,0.5) 50%, rgba(100,255,50,0.3) 75%, transparent);
      border-radius: 3px;
      animation: wave 3s ease-in-out infinite;
      z-index: 1;
      filter: blur(1px);
    }
    @keyframes goo-glow {
      0% { box-shadow: 0 -4px 10px rgba(50,180,50,0.25), inset 0 2px 6px rgba(100,255,50,0.15); }
      100% { box-shadow: 0 -6px 14px rgba(50,180,50,0.4), inset 0 3px 8px rgba(100,255,50,0.25); }
    }

    /* Fire exit */
    .tile-fire-exit {
      background: linear-gradient(180deg, rgba(255,100,20,0.15), rgba(255,60,0,0.06));
      border: 2px solid rgba(255,120,30,0.4);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      box-shadow: 0 0 15px rgba(255,120,30,0.2), inset 0 0 10px rgba(255,120,30,0.1);
      animation: exit-pulse-fire 2s ease-in-out infinite alternate;
    }
    .tile-fire-exit::before {
      content: '';
      position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
      width: 10px; height: 14px;
      background: #ff8833;
      clip-path: polygon(50% 0%, 10% 55%, 25% 100%, 75% 100%, 90% 55%);
      filter: drop-shadow(0 0 4px rgba(255,120,30,0.8));
      animation: flame-flicker 0.5s ease-in-out infinite alternate;
    }
    .tile-fire-exit::after {
      content: '▲';
      position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      font-size: 0.5rem; color: rgba(255,150,50,0.4);
      animation: arrow-bounce 1s ease-in-out infinite;
    }
    @keyframes exit-pulse-fire {
      0% { box-shadow: 0 0 15px rgba(255,120,30,0.2), inset 0 0 10px rgba(255,120,30,0.1); }
      100% { box-shadow: 0 0 25px rgba(255,120,30,0.4), inset 0 0 15px rgba(255,120,30,0.2); }
    }
    @keyframes flame-flicker {
      0% { transform: translateX(-50%) scaleY(0.85) scaleX(0.9); }
      100% { transform: translateX(-50%) scaleY(1.15) scaleX(1.1); }
    }
    @keyframes arrow-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.4; }
      50% { transform: translateX(-50%) translateY(-3px); opacity: 0.8; }
    }

    /* Water exit */
    .tile-water-exit {
      background: linear-gradient(180deg, rgba(30,100,220,0.15), rgba(20,60,180,0.06));
      border: 2px solid rgba(50,120,220,0.4);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      box-shadow: 0 0 15px rgba(50,120,220,0.2), inset 0 0 10px rgba(50,120,220,0.1);
      animation: exit-pulse-water 2s ease-in-out infinite alternate;
    }
    .tile-water-exit::before {
      content: '';
      position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
      width: 8px; height: 11px;
      background: #4499dd;
      clip-path: polygon(50% 0%, 0% 55%, 20% 100%, 80% 100%, 100% 55%);
      filter: drop-shadow(0 0 4px rgba(50,150,255,0.8));
      animation: drop-bob 1s ease-in-out infinite;
    }
    .tile-water-exit::after {
      content: '▲';
      position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      font-size: 0.5rem; color: rgba(80,150,255,0.4);
      animation: arrow-bounce 1s ease-in-out infinite;
    }
    @keyframes exit-pulse-water {
      0% { box-shadow: 0 0 15px rgba(50,120,220,0.2), inset 0 0 10px rgba(50,120,220,0.1); }
      100% { box-shadow: 0 0 25px rgba(50,120,220,0.4), inset 0 0 15px rgba(50,120,220,0.2); }
    }
    @keyframes drop-bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-2px); }
    }

    /* Pressure plates */
    .tile-plate { background: transparent; }
    .tile-plate::after {
      content: '';
      position: absolute; bottom: 0; left: 10%; right: 10%;
      height: 5px; border-radius: 3px;
      transition: all 0.3s;
    }
    .tile-plate-a::after { background: #cc6600; box-shadow: 0 0 6px rgba(200,100,0,0.4); }
    .tile-plate-a.pressed::after { background: #ffaa33; box-shadow: 0 0 12px rgba(255,170,50,0.7); height: 3px; }
    .tile-plate-b::after { background: #2266bb; box-shadow: 0 0 6px rgba(30,100,200,0.4); }
    .tile-plate-b.pressed::after { background: #44aaee; box-shadow: 0 0 12px rgba(70,170,240,0.7); height: 3px; }
    /* Plate label */
    .tile-plate::before {
      content: '';
      position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px; border-radius: 50%;
      opacity: 0.4;
    }
    .tile-plate-a::before { background: #cc6600; }
    .tile-plate-b::before { background: #2266bb; }

    /* Gates */
    .tile-gate { transition: opacity 0.4s, transform 0.4s; transform-origin: top center; }
    .tile-gate-a {
      background: repeating-linear-gradient(0deg, #cc6600 0px, #cc6600 3px, #994400 3px, #994400 6px);
      opacity: 0.9;
      box-shadow: 0 0 6px rgba(200,100,0,0.2);
    }
    .tile-gate-a.open { opacity: 0; transform: scaleY(0); pointer-events: none; }
    .tile-gate-b {
      background: repeating-linear-gradient(0deg, #2266bb 0px, #2266bb 3px, #114488 3px, #114488 6px);
      opacity: 0.9;
      box-shadow: 0 0 6px rgba(30,100,200,0.2);
    }
    .tile-gate-b.open { opacity: 0; transform: scaleY(0); pointer-events: none; }

    /* Gems */
    .gem { position: absolute; z-index: 50; pointer-events: none; }
    .gem-inner {
      width: 100%; height: 100%;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }
    .gem-fire .gem-inner {
      background: linear-gradient(135deg, #ffee88, #ff8800, #cc4400);
      animation: gem-float 2s ease-in-out infinite;
      filter: drop-shadow(0 0 5px rgba(255,150,0,0.6));
    }
    .gem-water .gem-inner {
      background: linear-gradient(135deg, #aaddff, #3388dd, #1155aa);
      animation: gem-float 2s ease-in-out infinite;
      filter: drop-shadow(0 0 5px rgba(50,130,220,0.6));
    }
    .gem-inner::after {
      content: '';
      position: absolute; top: 18%; left: 22%;
      width: 30%; height: 25%;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: rotate(-20deg);
    }
    @keyframes gem-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(5deg); }
    }
    .gem.collected { transition: transform 0.3s, opacity 0.3s; transform: scale(2); opacity: 0; }

    /* Floating points animation */
    .points-popup {
      position: absolute;
      z-index: 200;
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      font-weight: 700;
      pointer-events: none;
      animation: points-rise 0.9s ease-out forwards;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .points-popup.pts-fire { color: #ffcc44; }
    .points-popup.pts-water { color: #66bbff; }
    .points-popup.pts-both { color: #ffee88; }
    .points-popup.pts-stack { color: #ff88cc; font-size: 0.9rem; }
    @keyframes points-rise {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      60% { opacity: 1; transform: translateY(-28px) scale(1.15); }
      100% { opacity: 0; transform: translateY(-44px) scale(0.9); }
    }

    /* Gem counter */
    .gem-counter {
      display: flex; gap: 0.8rem;
      font-family: 'Caveat', cursive; font-size: 0.85rem;
    }
    .gem-counter-fire { color: rgba(255,180,100,0.5); }
    .gem-counter-water { color: rgba(100,180,255,0.5); }

    /* ---- Player Sprites ---- */
    .player { position: absolute; z-index: 100; transition: none; }
    .player-inner {
      position: relative;
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Flameboi */
    .player-fire .p-head {
      width: 14px; height: 12px;
      background: linear-gradient(180deg, #ffcc00, #ff8800);
      clip-path: polygon(50% 0%, 20% 40%, 5% 100%, 95% 100%, 80% 40%);
      animation: head-flicker 0.35s ease-in-out infinite alternate;
    }
    .player-fire .p-face {
      width: 12px; height: 10px;
      background: linear-gradient(180deg, #ff7700, #ee5500);
      border-radius: 35% 35% 45% 45%;
      margin-top: -2px;
      position: relative;
    }
    .player-fire .p-eye {
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 2px rgba(255,255,200,0.8);
    }
    .player-fire .p-body {
      width: 10px; height: 8px;
      background: linear-gradient(180deg, #ee5500, #cc3300);
      border-radius: 2px;
      margin-top: -1px;
    }
    .player-fire .p-leg {
      width: 4px; height: 7px;
      background: linear-gradient(180deg, #cc3300, #aa2200);
      border-radius: 1px 1px 2px 2px;
    }
    @keyframes head-flicker {
      0% { transform: scaleX(0.9) scaleY(0.92); }
      100% { transform: scaleX(1.1) scaleY(1.08); }
    }

    /* Aguagurl */
    .player-water .p-head {
      width: 14px; height: 12px;
      background: linear-gradient(180deg, #66ccff, #2288dd);
      clip-path: polygon(15% 0%, 85% 0%, 100% 35%, 90% 100%, 10% 100%, 0% 35%);
      animation: water-head 1.5s ease-in-out infinite alternate;
    }
    .player-water .p-face {
      width: 12px; height: 10px;
      background: linear-gradient(180deg, #2288dd, #1166bb);
      border-radius: 35% 35% 45% 45%;
      margin-top: -2px;
      position: relative;
    }
    .player-water .p-eye {
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 2px rgba(200,230,255,0.8);
    }
    .player-water .p-body {
      width: 10px; height: 8px;
      background: linear-gradient(180deg, #1166bb, #0e4499);
      border-radius: 2px;
      margin-top: -1px;
    }
    .player-water .p-leg {
      width: 4px; height: 7px;
      background: linear-gradient(180deg, #0e4499, #0a3377);
      border-radius: 1px 1px 2px 2px;
    }
    @keyframes water-head {
      0% { filter: drop-shadow(0 -1px 2px rgba(100,200,255,0.3)); }
      100% { filter: drop-shadow(0 -1px 4px rgba(100,200,255,0.6)); }
    }

    .player .p-eyes {
      position: absolute; top: 3px; left: 50%; transform: translateX(-50%);
      width: 7px; display: flex; justify-content: space-between;
    }
    .player .p-legs {
      display: flex; gap: 1px; margin-top: -1px;
    }

    .player.walking .p-leg:first-child { animation: pwalk-l 0.2s ease-in-out infinite alternate; }
    .player.walking .p-leg:last-child { animation: pwalk-r 0.2s ease-in-out infinite alternate; }
    @keyframes pwalk-l { 0% { transform: rotate(-22deg); } 100% { transform: rotate(22deg); } }
    @keyframes pwalk-r { 0% { transform: rotate(22deg); } 100% { transform: rotate(-22deg); } }
    .player.jumping .p-leg { animation: none !important; transform: rotate(0deg) !important; }
    .player.facing-left .player-inner { transform: scaleX(-1); }

    .player-fire { filter: drop-shadow(0 0 5px rgba(255,120,30,0.4)); }
    .player-water { filter: drop-shadow(0 0 8px rgba(50,150,255,0.55)); }
    .player-fire.active-player { filter: drop-shadow(0 0 10px rgba(255,150,50,0.8)); }
    .player-water.active-player { filter: drop-shadow(0 0 14px rgba(50,150,255,0.9)); }

    .player-label {
      position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
      font-family: 'Caveat', cursive; font-size: 0.45rem;
      white-space: nowrap; pointer-events: none;
    }
    .player-fire .player-label { color: rgba(255,180,100,0.5); }
    .player-water .player-label { color: rgba(100,180,255,0.5); }

    .player.dying { animation: die-flash 0.35s ease; }
    @keyframes die-flash {
      0% { opacity: 1; filter: brightness(3); } 25% { opacity: 0.3; }
      50% { opacity: 1; filter: brightness(2); } 75% { opacity: 0.2; } 100% { opacity: 0; }
    }
    .player.respawning { animation: respawn-in 0.25s ease forwards; }
    @keyframes respawn-in {
      0% { opacity: 0; transform: scale(0.3); }
      60% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Landing dust */
    .land-dust {

function loadLevel(idx) {
  const data = LEVEL_DATA[idx];
  // Deep copy the map
  LEVEL = data.map.map(row => [...row]);
  COLS = LEVEL[0].length;
  ROWS = LEVEL.length;

  // Extract gems from level
  gems = [];
  gemsCollectedFire = 0;
  gemsCollectedWater = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (LEVEL[r][c] === GEM_FIRE || LEVEL[r][c] === GEM_WATER) {
        gems.push({ r, c, type: LEVEL[r][c] === GEM_FIRE ? 'fire' : 'water', collected: false });
        LEVEL[r][c] = AIR;
      }
    }
  }

  // Update level info
  document.getElementById('level-info').textContent = `${idx + 1}/${LEVEL_DATA.length} — ${data.name}`;
  const lib = document.getElementById('level-info-bar');
  if (lib) lib.textContent = `${idx + 1}/${LEVEL_DATA.length} — ${data.name}`;
}

// ---- Physics (tuned for fun) ----
const GRAVITY = 0.55;
const JUMP_VEL = -12.5;
const MOVE_SPEED = 3.2;
const MOVE_ACCEL = 1.5;   // Acceleration for snappier feel
const MOVE_FRICTION = 0.7; // Deceleration when not pressing
const AIR_CONTROL = 0.85;  // Slightly less control in air
const PLAYER_W = 16;
const PLAYER_H = 30;
const COYOTE_TIME = 6;    // Frames of coyote time (can jump after leaving edge)
const JUMP_BUFFER = 6;    // Frames of jump buffer (press jump before landing)

let fireSpawn, waterSpawn;

function setSpawns() {
  const data = LEVEL_DATA[currentLevelIndex];
  fireSpawn = { x: data.fireSpawn[0]*tileW+levelLeft, y: data.fireSpawn[1]*tileH+levelTop-PLAYER_H };
  waterSpawn = { x: data.waterSpawn[0]*tileW+levelLeft, y: data.waterSpawn[1]*tileH+levelTop-PLAYER_H };
}

const players = {
  fire: { x:0, y:0, vx:0, vy:0, onGround:false, alive:true, onExit:false, facing:'right',
          coyoteTimer:0, jumpBufferTimer:0, wasOnGround:false },
  water: { x:0, y:0, vx:0, vy:0, onGround:false, alive:true, onExit:false, facing:'right',
           coyoteTimer:0, jumpBufferTimer:0, wasOnGround:false },
};

let gateAOpen = false, gateBOpen = false;
const keys = { left:false, right:false, up:false };
let deaths = 0, won = false, partnerConnected = false;
let totalPoints = 0;

function resetPlayers() {
  setSpawns();
  players.fire.x = fireSpawn.x; players.fire.y = fireSpawn.y;
  players.fire.vx = 0; players.fire.vy = 0; players.fire.onGround = false;
  players.fire.alive = true; players.fire.onExit = false;
  players.fire.coyoteTimer = 0; players.fire.jumpBufferTimer = 0;
  players.water.x = waterSpawn.x; players.water.y = waterSpawn.y;
  players.water.vx = 0; players.water.vy = 0; players.water.onGround = false;
  players.water.alive = true; players.water.onExit = false;
  players.water.coyoteTimer = 0; players.water.jumpBufferTimer = 0;
}

// ---- Tile collision helpers ----
function worldToTile(px,py) { return { r:Math.floor((py-levelTop)/tileH), c:Math.floor((px-levelLeft)/tileW) }; }
function isSolid(r,c) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return true;
  const v=LEVEL[r][c];
  return v===WALL||(v===GATE_A&&!gateAOpen)||(v===GATE_B&&!gateBOpen);
}
function isHazardFor(r,c,role) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return false;
  const v=LEVEL[r][c];
  return v===GOO||(role==='fire'&&v===WATER)||(role==='water'&&v===LAVA);
}
function isExitFor(r,c,role) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return false;
  return (role==='fire'&&LEVEL[r][c]===FIRE_EXIT)||(role==='water'&&LEVEL[r][c]===WATER_EXIT);
}
function isOnPlate(px,py,pw,ph,pt) {
  const fy=py+ph, cx=px+pw/2;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    if (LEVEL[r][c]!==pt) continue;
    const tx=c*tileW+levelLeft, ty=r*tileH+levelTop;
    if (cx>tx&&cx<tx+tileW&&fy>=ty&&fy<=ty+tileH+2) return true;
  }
  return false;
}
function checkGemCollection(px,py,pw,ph,role) {
  const cx=px+pw/2, cy=py+ph/2;
  gems.forEach((g,i) => {
    if (g.collected||g.type!==role) return;
    if (Math.hypot(cx-(g.c*tileW+tileW/2+levelLeft), cy-(g.r*tileH+tileH/2+levelTop)) < tileW*0.7) collectGem(i);
  });
}

// ---- Landing dust effect ----
function spawnLandDust(x, y) {
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'land-dust';
    d.style.left = (x - levelLeft + PLAYER_W/2 + (Math.random()-0.5)*12) + 'px';
    d.style.top = (y - levelTop + PLAYER_H) + 'px';
    levelEl.appendChild(d);
    setTimeout(() => d.remove(), 400);
  }
}

// ---- Player update with coyote time + jump buffer ----
function applyInput(p, role) {
  if (!p.alive) return;

  // Horizontal movement with acceleration
  let targetVx = 0;
  if (keys.left) targetVx = -MOVE_SPEED;
  if (keys.right) targetVx = MOVE_SPEED;

  const control = p.onGround ? 1 : AIR_CONTROL;
  if (targetVx !== 0) {
    p.vx += (targetVx - p.vx) * MOVE_ACCEL * control * 0.15;
    if (Math.abs(p.vx - targetVx) < 0.5) p.vx = targetVx;
  } else {
    p.vx *= MOVE_FRICTION;
    if (Math.abs(p.vx) < 0.3) p.vx = 0;
  }

  // Coyote time tracking
  if (p.onGround) {
    p.coyoteTimer = COYOTE_TIME;
  } else {
    if (p.coyoteTimer > 0) p.coyoteTimer--;
  }

  // Jump buffer
  if (keys.up) {
    p.jumpBufferTimer = JUMP_BUFFER;
  } else {
    if (p.jumpBufferTimer > 0) p.jumpBufferTimer--;
  }

  // Jump with coyote time + jump buffer
  if (p.jumpBufferTimer > 0 && p.coyoteTimer > 0) {
    p.vy = JUMP_VEL;
    p.onGround = false;
    p.coyoteTimer = 0;
    p.jumpBufferTimer = 0;
  }

  // Variable jump height: release jump early = lower jump
  if (!keys.up && p.vy < JUMP_VEL * 0.4) {
    p.vy *= 0.85;
  }
}

function updatePlayer(p,role) {
  if (!p.alive) return;
  p.wasOnGround = p.onGround;

  p.vy += GRAVITY;
  if (p.vy>14) p.vy=14;
  let nx=p.x+p.vx, ny=p.y+p.vy;

  // Horizontal collision
  if (p.vx!==0) {
    const tx=p.vx>0?nx+PLAYER_W:nx;
    if (isSolid(worldToTile(tx,p.y+2).r,worldToTile(tx,p.y+2).c)||
        isSolid(worldToTile(tx,p.y+PLAYER_H/2).r,worldToTile(tx,p.y+PLAYER_H/2).c)||
        isSolid(worldToTile(tx,p.y+PLAYER_H-2).r,worldToTile(tx,p.y+PLAYER_H-2).c)) {
      nx = p.vx>0 ? Math.floor((nx+PLAYER_W-levelLeft)/tileW)*tileW+levelLeft-PLAYER_W
                   : Math.ceil((nx-levelLeft)/tileW)*tileW+levelLeft;
      p.vx=0;
    }
  }
  p.x=nx;

  // Vertical collision
  p.onGround=false;
  if (p.vy>=0) {
    const fy=ny+PLAYER_H;
    if (isSolid(worldToTile(p.x+2,fy).r,worldToTile(p.x+2,fy).c)||
        isSolid(worldToTile(p.x+PLAYER_W-2,fy).r,worldToTile(p.x+PLAYER_W-2,fy).c)) {
      ny=Math.floor((fy-levelTop)/tileH)*tileH+levelTop-PLAYER_H;
      // Landing dust if falling fast enough
      if (p.vy > 3 && !p.wasOnGround) spawnLandDust(p.x, ny);
      p.vy=0; p.onGround=true;
    }
  } else {
    const hy=ny;
    if (isSolid(worldToTile(p.x+2,hy).r,worldToTile(p.x+2,hy).c)||
        isSolid(worldToTile(p.x+PLAYER_W-2,hy).r,worldToTile(p.x+PLAYER_W-2,hy).c)) {
      ny=(Math.floor((hy-levelTop)/tileH)+1)*tileH+levelTop;
      p.vy=0;
    }
  }
  p.y=ny;

  // Stacking — land on the other player's shoulders
  const otherRole = role === 'fire' ? 'water' : 'fire';
  const other = players[otherRole];
  if (other.alive && p.vy >= 0) {
    const pFeetY = p.y + PLAYER_H;
    const otherTopY = other.y;
    const xOverlap = p.x + PLAYER_W > other.x && p.x < other.x + PLAYER_W;
    if (xOverlap && pFeetY >= otherTopY && pFeetY <= otherTopY + 8) {
      p.y = other.y - PLAYER_H;
      if (p.vy > 3 && !p.wasOnGround) {
        spawnLandDust(p.x, p.y);
        // Award 5 pts for landing on other player (cooldown prevents spam)
        if (!p._stackCooldown) {
          addPoints(20);
          const px = p.x + PLAYER_W / 2 - levelLeft;
          const py = p.y - levelTop - 5;
          spawnPointsPopup(px, py, '+20', 'pts-stack');
          p._stackCooldown = true;
          setTimeout(() => { p._stackCooldown = false; }, 2000);
        }
      }
      p.vy = 0;
      p.onGround = true;
    }
  }

  // Hazard check — only check feet (lava/water are floor pools)
  const cx=p.x+PLAYER_W/2;
  const checkPoints = [
    worldToTile(cx, p.y+PLAYER_H-2),           // feet center
    worldToTile(p.x+3, p.y+PLAYER_H-2),        // feet left
    worldToTile(p.x+PLAYER_W-3, p.y+PLAYER_H-2), // feet right
  ];
  for (const ch of checkPoints) {
    if (isHazardFor(ch.r,ch.c,role)) { killPlayer(role); return; }
  }

  checkGemCollection(p.x,p.y,PLAYER_W,PLAYER_H,role);
  p.onExit = isExitFor(worldToTile(cx,p.y+PLAYER_H/2).r,worldToTile(cx,p.y+PLAYER_H/2).c,role);
  p._onPlateA = isOnPlate(p.x,p.y,PLAYER_W,PLAYER_H,PLATE_A);
  p._onPlateB = isOnPlate(p.x,p.y,PLAYER_W,PLAYER_H,PLATE_B);
}

function killPlayer(role) {
  const p=players[role]; if (!p.alive) return; p.alive=false;
  const el=document.getElementById('player-'+role); el.classList.add('dying');
  setTimeout(()=>{
    el.classList.remove('dying');
    const sp=role==='fire'?fireSpawn:waterSpawn;
    p.x=sp.x;p.y=sp.y;p.vx=0;p.vy=0;p.onGround=false;p.alive=true;p.onExit=false;
    p.coyoteTimer=0;p.jumpBufferTimer=0;
    el.classList.add('respawning'); setTimeout(()=>el.classList.remove('respawning'),250);
    deaths++;
  },350);
}

function renderPlayers() {
  ['fire','water'].forEach(role=>{
    const p=players[role], el=document.getElementById('player-'+role);
    el.style.left=p.x+'px'; el.style.top=p.y+'px';
    el.style.width=PLAYER_W+'px'; el.style.height=PLAYER_H+'px';
    el.classList.toggle('walking',Math.abs(p.vx)>0.5&&p.onGround);
    el.classList.toggle('jumping',!p.onGround);
    if (p.vx>0.5){p.facing='right';el.classList.remove('facing-left');}
    else if(p.vx<-0.5){p.facing='left';el.classList.add('facing-left');}
    if (soloMode) el.classList.toggle('active-player',role===soloActiveRole);
  });
}

function updateGates() {
  gateAOpen=players.fire._onPlateA||players.water._onPlateA;
  gateBOpen=players.fire._onPlateB||players.water._onPlateB;
  gateAEls.forEach(el=>el.classList.toggle('open',gateAOpen));
  gateBEls.forEach(el=>el.classList.toggle('open',gateBOpen));
  plateAEls.forEach(el=>el.classList.toggle('pressed',gateAOpen));
  plateBEls.forEach(el=>el.classList.toggle('pressed',gateBOpen));
}

function checkVictory() {
  if (won) return;
  if (players.fire.onExit && players.water.onExit) {
    won = true;
    // Scoring: 100 for winning
    let pts = 100;
    totalPoints += pts;
    addPoints(pts);
    // Show +100 popup between both players
    const midX = (players.fire.x + players.water.x) / 2 + PLAYER_W / 2 - levelLeft;
    const midY = Math.min(players.fire.y, players.water.y) - levelTop - 10;
    spawnPointsPopup(midX, midY, '+100', 'pts-both');

    if (currentLevelIndex < LEVEL_DATA.length - 1) {
      // More levels to go
      document.getElementById('victory-title').textContent = 'level cleared!';
      document.getElementById('victory-pts').textContent = '+' + pts + ' pts';
      document.getElementById('victory-next-btn').style.display = '';
      document.getElementById('victory-done-btn').style.display = 'none';
    } else {
      // All levels complete
      markCompleted('elements');
      document.getElementById('victory-title').textContent = 'temple cleared!';
      document.getElementById('victory-pts').textContent = '+' + pts + ' pts (total: ' + totalPoints + ')';
      document.getElementById('victory-next-btn').style.display = 'none';
      document.getElementById('victory-done-btn').style.display = '';
    }
    setTimeout(() => document.getElementById('victory-overlay').classList.add('visible'), 400);
    sendPeerData({type:'victory',pts});
  }
}

function nextLevel() {
  document.getElementById('victory-overlay').classList.remove('visible');
  currentLevelIndex++;
  won = false;
  deaths = 0;
  initLevel();
  showLevelTransition();
}

function restartLevel() {
  won = false;
  deaths = 0;
  gems.forEach(g => g.collected = false);
  gemsCollectedFire = 0;
  gemsCollectedWater = 0;
  loadLevel(currentLevelIndex);
  calcTileSize();
  renderLevel();
  resetPlayers();
  updateGemCounter();
}

function initLevel() {
  loadLevel(currentLevelIndex);
  calcTileSize();
  renderLevel();
  resetPlayers();
}

function showLevelTransition() {
  const data = LEVEL_DATA[currentLevelIndex];
  const lt = document.getElementById('level-transition');
  document.getElementById('lt-title').textContent = data.name;
  document.getElementById('lt-sub').textContent = `level ${currentLevelIndex + 1} of ${LEVEL_DATA.length}`;
  document.getElementById('lt-hint').textContent = data.hint;
  lt.classList.add('visible');
  setTimeout(() => lt.classList.remove('visible'), 2200);
}

// ---- Solo mode ----
function switchSoloCharacter() {
  if (!soloMode) return;
  soloActiveRole = soloActiveRole==='fire'?'water':'fire';
  updateSwitchHint();
}
function updateSwitchHint() {
  const h=document.getElementById('switch-hint');
  if (soloMode) {
    const mob=window.matchMedia('(pointer:coarse)').matches;
    const l=soloActiveRole==='fire'?'flameboi':'aguagurl';
    const c=soloActiveRole==='fire'?'active-fire':'active-water';
    h.innerHTML=(mob?'tap switch':'tab to switch')+' <span class="active-indicator '+c+'">'+l+'</span>';
  } else h.innerHTML='';
}
function enterSoloMode() {
  soloMode=true; soloActiveRole='fire'; partnerConnected=true;
  document.getElementById('waiting-overlay').classList.add('hidden');
  updateSwitchHint();
}

// ---- Game loop ----
function gameLoop() {
  if (won) { renderPlayers(); requestAnimationFrame(gameLoop); return; }
  if (soloMode) {
    const me = players[soloActiveRole];
    if (me.alive) applyInput(me, soloActiveRole);
    const other = players[soloActiveRole==='fire'?'water':'fire'];
    if (other.alive) { other.vx *= 0.7; if (Math.abs(other.vx) < 0.3) other.vx = 0; }
  } else {
    const me = players[myRole];
    if (me.alive) applyInput(me, myRole);
  }
  updatePlayer(players.fire,'fire');
  updatePlayer(players.water,'water');
  updateGates(); renderPlayers(); checkVictory();
  if (!soloMode) sendMyState();
  requestAnimationFrame(gameLoop);
}

// ---- Input ----
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){keys.left=true;e.preventDefault();}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){keys.right=true;e.preventDefault();}
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' '){keys.up=true;e.preventDefault();}
  if(e.key==='Tab'){e.preventDefault();switchSoloCharacter();}
  if(e.key==='r'||e.key==='R'){restartLevel();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')keys.up=false;
});

function setupMobile(){
  function at(b,k){
    b.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true},{passive:false});
    b.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false},{passive:false});
    b.addEventListener('touchcancel',()=>{keys[k]=false;});
    b.addEventListener('mousedown',e=>{e.preventDefault();keys[k]=true;});
    b.addEventListener('mouseup',()=>{keys[k]=false;});
    b.addEventListener('mouseleave',()=>{keys[k]=false;});
  }
  at(document.getElementById('btn-left'),'left');
  at(document.getElementById('btn-right'),'right');
  at(document.getElementById('btn-jump'),'up');
  const bs=document.getElementById('btn-switch');
  bs.addEventListener('touchstart',e=>{e.preventDefault();switchSoloCharacter();},{passive:false});
  bs.addEventListener('mousedown',e=>{e.preventDefault();switchSoloCharacter();});
}
setupMobile();
document.getElementById('solo-btn').addEventListener('click',()=>enterSoloMode());
document.getElementById('restart-btn').addEventListener('click',()=>restartLevel());
document.getElementById('victory-next-btn').addEventListener('click',()=>nextLevel());

// ---- Peer networking ----
let peer=null,conn=null,sendThrottle=0;
function peerIdForPuzzle(code){return 'shahhub-puzzle-elements-'+code;}
function sendPeerData(data){if(conn&&conn.open)conn.send(data);}
const PEER_CONFIG={config:{iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'turn:openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayproject'},
]}};
function sendMyState(){
  sendThrottle++;if(sendThrottle%2!==0)return;
  const me=players[myRole];
  sendPeerData({type:'state',
    tx:Math.round((me.x-levelLeft)/tileW*100)/100,
    ty:Math.round((me.y-levelTop)/tileH*100)/100,
    vx:Math.round(me.vx*10)/10,vy:Math.round(me.vy*10)/10,
    alive:me.alive,onExit:me.onExit,onGround:me.onGround,_onPlateA:me._onPlateA,_onPlateB:me._onPlateB});
}
function handlePeerData(data){
  if(data.type==='state'){
    if(soloMode){soloMode=false;document.getElementById('switch-hint').innerHTML='';}
    const p=players[partnerRole];
    p.x=data.tx!=null?data.tx*tileW+levelLeft:data.x;
    p.y=data.ty!=null?data.ty*tileH+levelTop:data.y;
    p.vx=data.vx;p.vy=data.vy;p.alive=data.alive;
    p.onExit=data.onExit;p.onGround=data.onGround;p._onPlateA=data._onPlateA;p._onPlateB=data._onPlateB;
  } else if(data.type==='victory'){
    if(!won){won=true;addPoints(data.pts);markCompleted('elements');
      document.getElementById('victory-pts').textContent='+'+data.pts+' pts';
      setTimeout(()=>document.getElementById('victory-overlay').classList.add('visible'),500);}
  } else if(data.type==='character'){
    partnerChar={...DEFAULT_PARTNER,...data.char};
    if(window.hudUpdatePartner)window.hudUpdatePartner(data.char);applyCharColors();
  } else if(data.type==='gem-collected'){
    const g=gems[data.index];
    if(g&&!g.collected){g.collected=true;if(g.type==='fire')gemsCollectedFire++;else gemsCollectedWater++;
      const el=document.getElementById('gem-'+data.index);if(el){el.classList.add('collected');setTimeout(()=>el.remove(),300);}
      updateGemCounter();addPoints(25);
      spawnPointsPopup(g.c*tileW+tileW/2, g.r*tileH, '+25', 'pts-'+g.type);}
  }
}
function setupPeer(){
  if(!roomCode){enterSoloMode();return;}
  if(isHost){
    peer=new Peer(peerIdForPuzzle(roomCode),PEER_CONFIG);
    peer.on('open',()=>{peer.on('connection',c=>{
      conn=c;partnerConnected=true;soloMode=false;
      document.getElementById('waiting-overlay').classList.add('hidden');
      document.getElementById('switch-hint').innerHTML='';
      c.on('data',handlePeerData);c.on('close',()=>{conn=null;window.location.href='../../world/?after=elements';});
      sendPeerData({type:'character',char:myChar});
    });});peer.on('error',()=>{});
  } else {
    peer=new Peer(PEER_CONFIG);peer.on('open',()=>tryConnect(0));peer.on('error',()=>{});
  }
}
function tryConnect(attempt){
  if(attempt>20)return;
  const c=peer.connect(peerIdForPuzzle(roomCode),{reliable:true});
  let settled=false;
  c.on('open',()=>{if(settled)return;settled=true;conn=c;partnerConnected=true;soloMode=false;
    document.getElementById('waiting-overlay').classList.add('hidden');
    document.getElementById('switch-hint').innerHTML='';
    c.on('data',handlePeerData);c.on('close',()=>{conn=null;window.location.href='../../world/?after=elements';});sendPeerData({type:'character',char:myChar});});
  c.on('error',()=>{if(settled)return;settled=true;setTimeout(()=>tryConnect(attempt+1),1000);});
  setTimeout(()=>{if(!settled){settled=true;try{c.close();}catch(e){}tryConnect(attempt+1);}},3000);
}

// ---- Level menu ----
function buildLevelMenu() {
  const list = document.getElementById('level-menu-list');
  list.innerHTML = '';
  LEVEL_DATA.forEach((data, i) => {
    const item = document.createElement('div');
    item.className = 'level-menu-item' + (i === currentLevelIndex ? ' current' : '');
    item.innerHTML = '<span class="level-menu-num">' + (i + 1) + '</span><div><div>' + data.name + '</div><div class="level-menu-hint">' + data.hint + '</div></div>';
    item.addEventListener('click', () => {
      currentLevelIndex = i;
      won = false;
      deaths = 0;
      initLevel();
      closeLevelMenu();
      showLevelTransition();
    });
    list.appendChild(item);
  });
}
function openLevelMenu() {
  buildLevelMenu();
  document.getElementById('level-menu-overlay').classList.add('visible');
}
function closeLevelMenu() {
  document.getElementById('level-menu-overlay').classList.remove('visible');
}
document.getElementById('menu-btn').addEventListener('click', () => openLevelMenu());
document.getElementById('level-menu-close').addEventListener('click', () => closeLevelMenu());
document.getElementById('level-menu-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeLevelMenu();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLevelMenu();
});

// ---- Resize handler ----
window.addEventListener('resize',()=>{
  calcTileSize();
  setSpawns();
  renderLevel();
});

// ---- Init & Start ----
initLevel();
showLevelTransition();
setupPeer();
if(!roomCode)document.getElementById('waiting-overlay').classList.add('hidden');
requestAnimationFrame(gameLoop);

// If entered from game center, hide chapter nav and show return pill
const fromParam = new URLSearchParams(window.location.search).get('from');
if (fromParam === 'games' || fromParam === 'map') {
  document.getElementById('chapter-nav').style.display = 'none';
  document.getElementById('back-link').style.display = 'none';
  if (fromParam === 'map') {
    document.querySelector('.top-controls').style.display = 'none';
    document.getElementById('top-nav').style.display = 'flex';
    document.getElementById('top-nav-levels').addEventListener('click', openLevelMenu);
    document.getElementById('top-nav-restart').addEventListener('click', () => {
      won = false; deaths = 0; initLevel();
    });
  } else {
    document.querySelector('.top-controls').style.display = 'none';
    const pill = document.getElementById('return-pill');
    pill.style.display = '';
  }
}
</script>
