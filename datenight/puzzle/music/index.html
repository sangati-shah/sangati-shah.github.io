<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rhythm</title>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../hud.css" />
  <script src="../../theme.js"></script>
  <script src="../../hud.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      background: linear-gradient(145deg, #0f0a06 0%, #0a0a0f 40%, #100810 70%, #0a0608 100%);
      color: #f0e6d3;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* -- Ambient background -- */
    .bg-grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .bg-pulse {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 120vmax; height: 120vmax;
      background: radial-gradient(ellipse, rgba(212,155,60,0.05) 0%, rgba(140,60,180,0.02) 30%, transparent 55%);
      pointer-events: none; z-index: 0;
      animation: bg-breathe 4s ease-in-out infinite alternate;
    }
    @keyframes bg-breathe { 0% { transform: translate(-50%,-50%) scale(1); } 100% { transform: translate(-50%,-50%) scale(1.15); } }

    /* Floating particles */
    .particles-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }

    /* -- Top bar -- */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 1.5rem; z-index: 100;
    }
    .back-link {
      font-family: 'Caveat', cursive; font-size: 1.2rem;
      color: rgba(240,230,211,0.25); text-decoration: none; transition: color 0.3s;
    }
    .back-link:hover { color: rgba(240,230,211,0.6); }
    .pts-display {
      font-family: 'Caveat', cursive; font-size: 1.1rem;
      color: rgba(240,230,211,0.25);
    }
    .pts-num { color: #d49b3c; font-weight: 600; transition: transform 0.3s; }
    .pts-num.bump { transform: scale(1.4); display: inline-block; }

    /* -- Main -- */
    .music-app {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
      padding: 1rem 1.2rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
    }

    .page-title {
      font-family: 'Abril Fatface', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: #d49b3c; letter-spacing: 0.04em;
      cursor: pointer; user-select: none;
      text-shadow: 0 0 30px rgba(212,155,60,0.15);
    }
    .page-sub {
      font-family: 'Caveat', cursive;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: rgba(240,230,211,0.3); text-align: center;
      line-height: 1.4; margin-bottom: 0.3rem;
    }

    /* -- Beat Timeline -- */
    .timeline {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 0.6rem 0; gap: 8px;
      position: relative;
    }

    .beat-dot {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      transition: all 0.2s ease;
      position: relative;
      backdrop-filter: blur(4px);
    }
    .beat-dot .dot-label {
      font-family: 'Caveat', cursive; font-size: 0.65rem;
      color: rgba(240,230,211,0.2);
    }
    .beat-dot.active {
      border-color: rgba(212,155,60,0.5);
      background: rgba(212,155,60,0.1);
      box-shadow: 0 0 12px rgba(212,155,60,0.15);
    }
    .beat-dot.current-beat {
      border-color: rgba(212,155,60,0.8);
      background: rgba(212,155,60,0.2);
      box-shadow: 0 0 20px rgba(212,155,60,0.3);
      transform: scale(1.15);
    }
    .beat-dot.playing {
      background: rgba(212,155,60,0.3);
      border-color: #d49b3c;
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(212,155,60,0.4);
    }
    .beat-dot.correct {
      border-color: #4caf50;
      background: rgba(76,175,80,0.2);
      box-shadow: 0 0 12px rgba(76,175,80,0.2);
    }
    .beat-dot.wrong {
      border-color: #ef5350;
      background: rgba(239,83,80,0.15);
      box-shadow: 0 0 12px rgba(239,83,80,0.15);
    }

    /* -- Instrument Sections -- */
    .instrument-section {
      width: 100%; max-width: 400px;
    }
    .section-label {
      font-family: 'Caveat', cursive;
      font-size: 0.95rem;
      color: rgba(240,230,211,0.25);
      text-transform: lowercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      padding-left: 0.2rem;
    }
    .section-label.partner { color: rgba(240,230,211,0.15); }

    /* -- Pad Grid -- */
    .pad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.7rem;
      width: 100%; max-width: 400px;
    }

    .pad {
      aspect-ratio: 1;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.25rem;
      transition: all 0.12s ease;
      position: relative; overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .pad::before {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 20px;
      padding: 1.5px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 50%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none;
    }
    .pad:active, .pad.hit {
      transform: scale(0.94);
    }
    .pad .pad-emoji { font-size: clamp(1.6rem, 4.5vw, 2.2rem); pointer-events: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .pad .pad-name {
      font-family: 'Caveat', cursive; font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      pointer-events: none; opacity: 0.5;
      letter-spacing: 0.04em;
    }

    /* Pad glow animation for active pads */
    @keyframes pad-glow-pulse {
      0%, 100% { box-shadow: 0 0 15px color-mix(in srgb, var(--pad-color) 15%, transparent), 0 4px 16px rgba(0,0,0,0.2); }
      50% { box-shadow: 0 0 25px color-mix(in srgb, var(--pad-color) 25%, transparent), 0 4px 16px rgba(0,0,0,0.2); }
    }

    /* Ripple on hit */
    .pad .ripple {
      position: absolute; border-radius: 50%;
      transform: scale(0); opacity: 0.35;
      animation: ripple-out 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-out {
      to { transform: scale(3); opacity: 0; }
    }

    /* Pad colors */
    .pad[data-inst="tabla"]   { --pad-color: #d49b3c; }
    .pad[data-inst="sitar"]   { --pad-color: #c0392b; }
    .pad[data-inst="bansuri"]  { --pad-color: #27ae60; }
    .pad[data-inst="krar"]    { --pad-color: #8e44ad; }
    .pad[data-inst="kebero"]  { --pad-color: #e67e22; }
    .pad[data-inst="masinko"] { --pad-color: #2980b9; }

    .pad:hover:not(.locked) {
      border-color: color-mix(in srgb, var(--pad-color, #555) 50%, transparent);
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
    }
    .pad.hit {
      border-color: var(--pad-color, #d49b3c);
      box-shadow: 0 0 35px color-mix(in srgb, var(--pad-color, #d49b3c) 35%, transparent),
                  inset 0 0 25px color-mix(in srgb, var(--pad-color, #d49b3c) 12%, transparent);
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--pad-color, #d49b3c) 15%, transparent),
        color-mix(in srgb, var(--pad-color, #d49b3c) 5%, transparent));
    }

    /* Locked partner pads */
    .pad.locked {
      cursor: default;
      opacity: 0.35;
      filter: saturate(0.4);
    }
    .pad.locked:hover {
      border-color: rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      transform: none;
    }
    .pad.locked:active { transform: none; }
    .pad.locked .lock-icon {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 0.6rem;
      opacity: 0.5;
      pointer-events: none;
    }
    /* Partner flash: temporarily override locked styling */
    .pad.locked.partner-flash {
      opacity: 0.75;
      filter: saturate(0.8);
      border-color: var(--pad-color, #d49b3c);
      box-shadow: 0 0 25px color-mix(in srgb, var(--pad-color, #d49b3c) 25%, transparent);
    }

    /* -- Controls -- */
    .controls {
      display: flex; gap: 0.6rem; align-items: center;
      flex-wrap: wrap; justify-content: center;
      margin-top: 0.2rem;
    }

    .ctrl-btn {
      font-family: 'Caveat', cursive; font-size: 1.1rem;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 0.5em 1.6em;
      color: rgba(240,230,211,0.6); cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .ctrl-btn.active {
      border-color: #d49b3c; color: #d49b3c;
      background: rgba(212,155,60,0.12);
    }
    .ctrl-btn.success {
      border-color: #4caf50; color: #4caf50;
      background: rgba(76,175,80,0.12);
    }
    .ctrl-btn:disabled { opacity: 0.3; cursor: default; }

    .ctrl-btn-small {
      font-family: 'Caveat', cursive; font-size: 0.95rem;
      background: none; border: none;
      color: rgba(240,230,211,0.2); cursor: pointer;
      padding: 0.3em 0.8em; transition: color 0.3s;
    }
    .ctrl-btn-small:hover { color: rgba(240,230,211,0.5); }

    /* -- Status -- */
    .status {
      font-family: 'Caveat', cursive; font-size: 1.1rem;
      color: rgba(240,230,211,0.35);
      min-height: 1.4em; text-align: center;
      transition: all 0.3s ease;
    }
    .status.good { color: #4caf50; }
    .status.bad { color: #ef5350; }
    .status.gold { color: #d49b3c; }

    /* -- Victory -- */
    .victory-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9000; opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .victory-overlay.visible { opacity: 1; pointer-events: all; }
    .victory-card {
      text-align: center;
      background: linear-gradient(135deg, #1a1408, #0d0d0d);
      border: 1px solid rgba(212,155,60,0.3);
      border-radius: 24px;
      padding: 3rem 2.5rem; max-width: 380px; width: 90%;
      transform: scale(0.8);
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .victory-overlay.visible .victory-card { transform: scale(1); }
    .victory-emoji { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .victory-title { font-family: 'Abril Fatface', serif; font-size: 2rem; color: #d49b3c; margin-bottom: 0.3em; }
    .victory-pts { font-family: 'Caveat', cursive; font-size: 1.4rem; color: rgba(240,230,211,0.5); margin-bottom: 1.5rem; }
    .victory-btn {
      font-family: 'Caveat', cursive; font-size: 1.2rem;
      background: rgba(212,155,60,0.15); border: 1.5px solid rgba(212,155,60,0.3);
      border-radius: 50px; padding: 0.5em 2em; color: #d49b3c;
      text-decoration: none; transition: all 0.3s; display: inline-block;
    }
    .victory-btn:hover { background: rgba(212,155,60,0.25); transform: translateY(-2px); }

    /* -- Easter Eggs -- */
    .hidden-gem { position: fixed; font-size: 0.9rem; cursor: pointer; opacity: 0.05; transition: all 0.3s; z-index: 50; user-select: none; }
    .hidden-gem:hover { opacity: 0.35; transform: scale(1.3); }
    .hidden-gem.found { opacity: 1; transform: scale(1.5); }
    .gem-toast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      font-family: 'Caveat', cursive; font-size: 1.5rem; color: #d49b3c;
      background: #1a1408; border: 1px solid rgba(212,155,60,0.3);
      padding: 1rem 2rem; border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      z-index: 9999; pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
      opacity: 0;
    }
    .gem-toast.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }

    /* -- Responsive -- */
    @media (max-width: 420px) {
      .pad-grid { gap: 0.4rem; max-width: 300px; }
      .music-app { gap: 0.6rem; }
      .beat-dot { width: 32px; height: 32px; }
    }
    @media (min-height: 800px) {
      .pad-grid { gap: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="bg-grain"></div>
  <div class="bg-pulse"></div>
  <canvas class="particles-canvas" id="particles-canvas"></canvas>

  <div class="top-bar">
    <a href="../../world/" class="back-link">&larr; back to adventure</a>
    <div class="pts-display"><span class="pts-num" id="pts-num">0</span> pts</div>
  </div>

  <div class="music-app">
    <h1 class="page-title" data-dn-cycle>rhythm</h1>
    <p class="page-sub" id="page-sub">listen to the beat, then replay it together</p>

    <!-- Beat Timeline -->
    <div class="timeline" id="timeline"></div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Your instruments -->
    <div class="instrument-section" id="your-section">
      <div class="section-label">your instruments</div>
      <div class="pad-grid" id="your-pads"></div>
    </div>

    <!-- Partner instruments -->
    <div class="instrument-section" id="partner-section">
      <div class="section-label partner">their instruments</div>
      <div class="pad-grid" id="partner-pads"></div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls">
      <button class="ctrl-btn" id="listen-btn">listen</button>
      <button class="ctrl-btn" id="record-btn">tap the beat</button>
      <button class="ctrl-btn-small" id="skip-btn">skip &rarr;</button>
    </div>
  </div>

  <!-- Victory -->
  <div class="victory-overlay" id="victory-overlay">
    <div class="victory-card">
      <div class="victory-emoji">&#x1F3B6;</div>
      <div class="victory-title">perfect rhythm!</div>
      <div class="victory-pts" id="victory-pts">+60 pts</div>
      <a href="../../world/?level=2" class="victory-btn">continue adventure &rarr;</a>
    </div>
  </div>

  <!-- Easter eggs -->
  <div class="hidden-gem" id="gem-1" style="top: 14%; right: 6%;">&#x2B50;</div>
  <div class="hidden-gem" id="gem-2" style="bottom: 8%; left: 4%;">&#x1F3B5;</div>
  <div class="gem-toast" id="gem-toast"></div>

  <script>
    // ======================================
    // INSTRUMENTS
    // ======================================
    const INSTRUMENTS = [
      { id: 'tabla',   emoji: '\u{1F941}', name: 'tabla',   color: '#d49b3c' },
      { id: 'sitar',   emoji: '\u{1FA95}', name: 'sitar',   color: '#c0392b' },
      { id: 'bansuri', emoji: '\u{1FA88}', name: 'bansuri', color: '#27ae60' },
      { id: 'krar',    emoji: '\u{1F3BB}', name: 'krar',    color: '#8e44ad' },
      { id: 'kebero',  emoji: '\u{1FA98}', name: 'kebero',  color: '#e67e22' },
      { id: 'masinko', emoji: '\u{1F3BB}', name: 'masinko', color: '#2980b9' },
    ];

    const HOST_INSTRUMENTS = ['tabla', 'sitar', 'bansuri'];
    const GUEST_INSTRUMENTS = ['krar', 'kebero', 'masinko'];

    const isHost = sessionStorage.getItem('datenight-host') === '1';
    const myInstruments = isHost ? HOST_INSTRUMENTS : GUEST_INSTRUMENTS;
    const partnerInstruments = isHost ? GUEST_INSTRUMENTS : HOST_INSTRUMENTS;

    // Target beat uses instruments from BOTH players
    const TARGET_BEAT = ['tabla', 'kebero', 'sitar', 'krar', 'bansuri', 'masinko', 'tabla', 'kebero'];
    const BEAT_GAP = 0.45; // seconds between beats

    // ======================================
    // AUDIO SYNTHESIS
    // ======================================
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playSound(name) {
      const ctx = getCtx();
      const t = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.value = 0.55;
      master.connect(ctx.destination);

      if (name === 'tabla') {
        const osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.12);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.9, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        osc.connect(g); g.connect(master);
        osc.start(t); osc.stop(t + 0.25);
        // click
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.006));
        const src = ctx.createBufferSource(); src.buffer = buf;
        const ng = ctx.createGain(); ng.gain.value = 0.5;
        src.connect(ng); ng.connect(master); src.start(t); src.stop(t+0.04);
      }
      else if (name === 'sitar') {
        [261.6, 523.25, 784.9].forEach((f, i) => {
          const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = f;
          const g = ctx.createGain(); g.gain.setValueAtTime(i===0?0.35:0.08, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + (i===0?0.6:0.35));
          const flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=f*2; flt.Q.value=8;
          osc.connect(flt); flt.connect(g); g.connect(master);
          osc.start(t); osc.stop(t+0.7);
        });
      }
      else if (name === 'bansuri') {
        const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=587.33;
        const vib = ctx.createOscillator(); const vibG = ctx.createGain();
        vib.frequency.value=5.5; vibG.gain.value=8;
        vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t); vib.stop(t+0.7);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.4, t+0.06);
        g.gain.setValueAtTime(0.35, t+0.35); g.gain.linearRampToValueAtTime(0, t+0.6);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.65);
      }
      else if (name === 'krar') {
        [392, 493.88].forEach((f, i) => {
          const osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=f;
          const g = ctx.createGain(); g.gain.setValueAtTime(0.3, t+i*0.05);
          g.gain.exponentialRampToValueAtTime(0.01, t+i*0.05+0.45);
          osc.connect(g); g.connect(master); osc.start(t+i*0.05); osc.stop(t+i*0.05+0.5);
        });
      }
      else if (name === 'kebero') {
        const osc = ctx.createOscillator(); osc.type='sine';
        osc.frequency.setValueAtTime(110, t);
        osc.frequency.exponentialRampToValueAtTime(45, t+0.25);
        const g = ctx.createGain(); g.gain.setValueAtTime(1, t);
        g.gain.exponentialRampToValueAtTime(0.01, t+0.35);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.4);
        const buf = ctx.createBuffer(1, ctx.sampleRate*0.06, ctx.sampleRate);
        const dd = buf.getChannelData(0);
        for (let i=0; i<dd.length; i++) dd[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.012));
        const src = ctx.createBufferSource(); src.buffer=buf;
        const flt = ctx.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=180;
        const ng = ctx.createGain(); ng.gain.value=0.6;
        src.connect(flt); flt.connect(ng); ng.connect(master); src.start(t); src.stop(t+0.08);
      }
      else if (name === 'masinko') {
        const osc = ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=440;
        const vib = ctx.createOscillator(); const vibG = ctx.createGain();
        vib.frequency.value=6; vibG.gain.value=5;
        vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t); vib.stop(t+0.7);
        const flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=900; flt.Q.value=3;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.3, t+0.06);
        g.gain.setValueAtTime(0.25, t+0.4); g.gain.linearRampToValueAtTime(0, t+0.6);
        osc.connect(flt); flt.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.65);
      }
    }

    function playSoundAt(name, time) {
      const ctx = getCtx();
      const t = time;
      const master = ctx.createGain();
      master.gain.value = 0.5;
      master.connect(ctx.destination);

      if (name === 'tabla') {
        const osc = ctx.createOscillator(); osc.type='sine';
        osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(80, t+0.12);
        const g = ctx.createGain(); g.gain.setValueAtTime(0.9, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.2);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.25);
      } else if (name === 'sitar') {
        const osc = ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=261.6;
        const g = ctx.createGain(); g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
        const flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=523; flt.Q.value=8;
        osc.connect(flt); flt.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.6);
      } else if (name === 'bansuri') {
        const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=587.33;
        const g = ctx.createGain(); g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.4, t+0.04);
        g.gain.linearRampToValueAtTime(0, t+0.4);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.45);
      } else if (name === 'krar') {
        const osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=392;
        const g = ctx.createGain(); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.4);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.45);
      } else if (name === 'kebero') {
        const osc = ctx.createOscillator(); osc.type='sine';
        osc.frequency.setValueAtTime(110, t); osc.frequency.exponentialRampToValueAtTime(45, t+0.25);
        const g = ctx.createGain(); g.gain.setValueAtTime(1, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.35);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.4);
      } else if (name === 'masinko') {
        const osc = ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=440;
        const flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=900; flt.Q.value=3;
        const g = ctx.createGain(); g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.3, t+0.04);
        g.gain.linearRampToValueAtTime(0, t+0.4);
        osc.connect(flt); flt.connect(g); g.connect(master); osc.start(t); osc.stop(t+0.45);
      }
    }

    // ======================================
    // STATE
    // ======================================
    let mode = 'idle'; // idle, listening, recording, checking, jamming
    let playerBeat = Array(8).fill(null);
    let currentBeatIndex = 0;
    let beatTimer = null;
    let metronomeTimer = null;
    let solved = false;
    let attempts = 0;

    // Points
    function getPoints() { return parseInt(sessionStorage.getItem('puzzle-points') || '0'); }
    function addPoints(n) {
      const total = getPoints() + n;
      sessionStorage.setItem('puzzle-points', total);
      const el = document.getElementById('pts-num');
      if (el) { el.textContent = total; el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 300); }
      if (window.hudUpdatePoints) window.hudUpdatePoints();
      return total;
    }
    document.getElementById('pts-num').textContent = getPoints();

    // ======================================
    // FLOATING PARTICLES
    // ======================================
    function initParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx2d = canvas.getContext('2d');
      let w, h;
      const particles = [];
      const PARTICLE_COUNT = 40;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.5 + 0.5,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.2 - 0.1,
          alpha: Math.random() * 0.15 + 0.03,
          color: ['#d49b3c', '#c0392b', '#27ae60', '#8e44ad', '#e67e22', '#2980b9'][Math.floor(Math.random() * 6)],
        });
      }

      function draw() {
        ctx2d.clearRect(0, 0, w, h);
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < -10) p.x = w + 10;
          if (p.x > w + 10) p.x = -10;
          if (p.y < -10) p.y = h + 10;
          if (p.y > h + 10) p.y = -10;
          ctx2d.beginPath();
          ctx2d.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx2d.fillStyle = p.color;
          ctx2d.globalAlpha = p.alpha;
          ctx2d.fill();
        }
        ctx2d.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    }

    // ======================================
    // BUILD UI
    // ======================================
    function buildTimeline() {
      const tl = document.getElementById('timeline');
      tl.innerHTML = '';
      for (let i = 0; i < 8; i++) {
        const dot = document.createElement('div');
        dot.className = 'beat-dot';
        dot.dataset.index = i;
        dot.innerHTML = `<span class="dot-label">${i+1}</span>`;
        tl.appendChild(dot);
      }
    }

    function buildPads() {
      const yourGrid = document.getElementById('your-pads');
      const partnerGrid = document.getElementById('partner-pads');
      yourGrid.innerHTML = '';
      partnerGrid.innerHTML = '';

      const myInstData = INSTRUMENTS.filter(inst => myInstruments.includes(inst.id));
      const partnerInstData = INSTRUMENTS.filter(inst => partnerInstruments.includes(inst.id));

      myInstData.forEach(inst => {
        const pad = document.createElement('div');
        pad.className = 'pad';
        pad.dataset.inst = inst.id;
        pad.innerHTML = `<span class="pad-emoji">${inst.emoji}</span><span class="pad-name">${inst.name}</span>`;
        pad.addEventListener('pointerdown', e => { e.preventDefault(); hitPad(inst.id, pad); });
        yourGrid.appendChild(pad);
      });

      partnerInstData.forEach(inst => {
        const pad = document.createElement('div');
        pad.className = 'pad locked';
        pad.dataset.inst = inst.id;
        pad.innerHTML = `<span class="lock-icon">\u{1F512}</span><span class="pad-emoji">${inst.emoji}</span><span class="pad-name">${inst.name}</span>`;
        // No click handler - locked
        partnerGrid.appendChild(pad);
      });
    }

    function hitPad(id, padEl) {
      // Only allow hitting your own instruments
      if (!myInstruments.includes(id)) return;

      // Play sound
      playSound(id);

      // Visual hit
      padEl.classList.add('hit');
      setTimeout(() => padEl.classList.remove('hit'), 150);

      // Ripple
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      const color = padEl.style.getPropertyValue('--pad-color') ||
                    getComputedStyle(padEl).getPropertyValue('--pad-color') || '#d49b3c';
      ripple.style.cssText = `width:100%;height:100%;top:0;left:0;background:${color};`;
      padEl.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());

      // Record beat
      if (mode === 'recording' && currentBeatIndex < 8) {
        const neededInst = TARGET_BEAT[currentBeatIndex];
        if (neededInst && myInstruments.includes(neededInst) && id === neededInst) {
          // Correct instrument for this beat
          recordBeatHit(id);
        } else if (neededInst && myInstruments.includes(neededInst)) {
          // Wrong instrument but it was your turn
          recordBeatHit(id);
        }
        // If it's partner's turn, ignore our taps for recording (partner will fill it in)
      }

      // Send to partner
      sendPeerData({ type: 'hit', instrument: id, beatIndex: currentBeatIndex });
    }

    function recordBeatHit(id) {
      playerBeat[currentBeatIndex] = id;
      const dot = document.querySelector(`.beat-dot[data-index="${currentBeatIndex}"]`);
      const inst = INSTRUMENTS.find(i => i.id === id);
      dot.classList.add('active');
      dot.classList.remove('current-beat');
      dot.innerHTML = `<span style="font-size:0.85rem">${inst.emoji}</span>`;
      advanceToNextBeat();
    }

    function advanceToNextBeat() {
      currentBeatIndex++;
      clearTimeout(metronomeTimer);
      if (currentBeatIndex >= 8) {
        finishRecording();
      } else {
        highlightCurrentBeat();
        startMetronomeTick();
      }
    }

    function highlightCurrentBeat() {
      document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('current-beat'));
      if (currentBeatIndex < 8) {
        const dot = document.querySelector(`.beat-dot[data-index="${currentBeatIndex}"]`);
        if (dot) dot.classList.add('current-beat');
      }
    }

    function startMetronomeTick() {
      clearTimeout(metronomeTimer);
      metronomeTimer = setTimeout(() => {
        if (mode !== 'recording' || currentBeatIndex >= 8) return;
        // Auto-advance: if beat wasn't filled, mark as null (missed)
        if (playerBeat[currentBeatIndex] === null) {
          const dot = document.querySelector(`.beat-dot[data-index="${currentBeatIndex}"]`);
          dot.classList.remove('current-beat');
          // Check if this beat needed partner's instrument - show waiting indicator
          const needed = TARGET_BEAT[currentBeatIndex];
          if (needed && !myInstruments.includes(needed)) {
            // Partner's beat - if they haven't sent it, mark as missed
            dot.innerHTML = `<span style="font-size:0.7rem; opacity:0.3">-</span>`;
          } else {
            dot.innerHTML = `<span style="font-size:0.7rem; opacity:0.3">-</span>`;
          }
          advanceToNextBeat();
        }
      }, BEAT_GAP * 1000 * 2.5); // Give 2.5x beat gap to respond
    }

    // ======================================
    // LISTEN MODE
    // ======================================
    function startListening() {
      if (mode === 'listening') return;
      mode = 'listening';
      const listenBtn = document.getElementById('listen-btn');
      listenBtn.classList.add('active');
      listenBtn.textContent = 'playing...';
      setStatus('listen carefully...', 'gold');

      const ctx = getCtx();
      let time = ctx.currentTime + 0.15;

      TARGET_BEAT.forEach((inst, i) => {
        const playAt = time;
        setTimeout(() => {
          const dot = document.querySelector(`.beat-dot[data-index="${i}"]`);
          dot.classList.add('playing');
          if (inst) {
            const info = INSTRUMENTS.find(x => x.id === inst);
            dot.innerHTML = `<span style="font-size:0.85rem">${info.emoji}</span>`;
          }
          setTimeout(() => {
            dot.classList.remove('playing');
            dot.innerHTML = `<span class="dot-label">${i+1}</span>`;
          }, BEAT_GAP * 800);
        }, (playAt - ctx.currentTime) * 1000);

        if (inst) playSoundAt(inst, playAt);
        time += BEAT_GAP;
      });

      const total = 8 * BEAT_GAP + 0.3;
      setTimeout(() => {
        mode = 'idle';
        listenBtn.classList.remove('active');
        listenBtn.textContent = 'listen again';
        setStatus('now tap "start recording" and replay it together!');
      }, total * 1000);
    }

    // ======================================
    // RECORD MODE
    // ======================================
    function startRecording() {
      if (mode === 'listening') return;
      mode = 'recording';
      playerBeat = Array(8).fill(null);
      currentBeatIndex = 0;

      // Clear timeline
      document.querySelectorAll('.beat-dot').forEach((d, i) => {
        d.className = 'beat-dot';
        d.innerHTML = `<span class="dot-label">${i+1}</span>`;
      });

      document.getElementById('record-btn').classList.add('active');
      document.getElementById('record-btn').textContent = 'recording...';
      setStatus('tap your instruments when your beat comes up!', 'gold');

      // Notify partner
      sendPeerData({ type: 'recording-start' });

      // Highlight first beat
      highlightCurrentBeat();
      startMetronomeTick();
    }

    function finishRecording() {
      mode = 'checking';
      attempts++;
      clearTimeout(metronomeTimer);
      document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('current-beat'));
      document.getElementById('record-btn').classList.remove('active');
      document.getElementById('record-btn').textContent = 'tap the beat';

      // Check each beat
      let correct = 0;
      playerBeat.forEach((hit, i) => {
        const dot = document.querySelector(`.beat-dot[data-index="${i}"]`);
        const target = TARGET_BEAT[i];
        if (hit === target) {
          dot.classList.add('correct');
          correct++;
        } else {
          dot.classList.add('wrong');
        }
      });

      sendPeerData({ type: 'attempt', correct, total: 8 });

      if (correct === 8) {
        // Perfect!
        solved = true;
        const pts = attempts === 1 ? 80 : attempts === 2 ? 60 : 40;
        addPoints(pts);
        markCompleted('music');
        setStatus('perfect rhythm!', 'good');
        document.getElementById('victory-pts').textContent = '+' + pts + ' pts';
        setTimeout(() => document.getElementById('victory-overlay').classList.add('visible'), 1000);
      } else if (correct >= 6) {
        setStatus(correct + '/8 \u2014 so close! listen again and retry', 'gold');
        const pts = correct * 3;
        addPoints(pts);
        setTimeout(() => { mode = 'idle'; }, 1500);
      } else {
        setStatus(correct + '/8 \u2014 listen again and try to match each beat');
        setTimeout(() => { mode = 'idle'; }, 1500);
      }
    }

    // ======================================
    // HELPERS
    // ======================================
    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }

    function markCompleted(id) {
      let completed;
      try { completed = JSON.parse(sessionStorage.getItem('puzzle-completed') || '[]'); } catch { completed = []; }
      if (!completed.includes(id)) { completed.push(id); sessionStorage.setItem('puzzle-completed', JSON.stringify(completed)); }
    }

    // ======================================
    // PEERJS
    // ======================================
    const roomCode = sessionStorage.getItem('datenight-room');
    let peer = null, conn = null;

    function peerIdForPuzzle(code) { return 'shahhub-puzzle-music-' + code; }
    function sendPeerData(data) { if (conn && conn.open) conn.send(data); }

    function setupPeer() {
      if (!roomCode) return;
      if (isHost) {
        peer = new Peer(peerIdForPuzzle(roomCode));
        peer.on('open', () => {
          peer.on('connection', c => {
            conn = c;
            c.on('data', handlePeerData);
            c.on('close', () => { conn = null; });
          });
        });
        peer.on('error', () => {});
      } else {
        peer = new Peer();
        peer.on('open', () => tryConnect(0));
        peer.on('error', () => {});
      }
    }

    function tryConnect(attempt) {
      if (attempt > 15) return;
      const c = peer.connect(peerIdForPuzzle(roomCode), { reliable: true });
      c.on('open', () => { conn = c; c.on('data', handlePeerData); });
      c.on('error', () => setTimeout(() => tryConnect(attempt + 1), 1000));
    }

    function handlePeerData(data) {
      if (data.type === 'hit') {
        // Partner hit a pad -- play the sound and flash their pad
        playSound(data.instrument);
        const pad = document.querySelector(`.pad[data-inst="${data.instrument}"]`);
        if (pad) {
          pad.classList.add('partner-flash');
          pad.classList.add('hit');
          setTimeout(() => {
            pad.classList.remove('partner-flash');
            pad.classList.remove('hit');
          }, 200);
        }

        // If we're recording and this beat needs partner's instrument, record it
        if (mode === 'recording' && currentBeatIndex < 8) {
          const neededInst = TARGET_BEAT[currentBeatIndex];
          if (neededInst && partnerInstruments.includes(neededInst) && data.instrument === neededInst) {
            recordBeatHit(data.instrument);
          } else if (neededInst && partnerInstruments.includes(neededInst)) {
            // Partner hit wrong instrument but it was their turn
            recordBeatHit(data.instrument);
          }
        }
      } else if (data.type === 'recording-start') {
        // Partner started recording - sync up
        if (mode !== 'recording') {
          startRecording();
        }
      } else if (data.type === 'attempt') {
        if (data.correct === 8 && !solved) {
          solved = true; addPoints(60); markCompleted('music');
          setStatus('your partner got it!', 'good');
          setTimeout(() => document.getElementById('victory-overlay').classList.add('visible'), 1000);
        }
      }
    }

    // ======================================
    // EASTER EGGS
    // ======================================
    function setupEasterEggs() {
      [{ id: 'gem-1', key: 'gem-music-1', msg: 'hidden star!' },
       { id: 'gem-2', key: 'gem-music-2', msg: 'secret note!' }].forEach(g => {
        const el = document.getElementById(g.id);
        if (!el) return;
        if (sessionStorage.getItem(g.key) === '1') { el.style.display = 'none'; return; }
        el.addEventListener('click', () => {
          if (sessionStorage.getItem(g.key) === '1') return;
          sessionStorage.setItem(g.key, '1'); el.classList.add('found');
          addPoints(15);
          const toast = document.getElementById('gem-toast');
          toast.textContent = '\u{1F48E} +15 pts! ' + g.msg;
          toast.classList.add('show');
          setTimeout(() => { toast.classList.remove('show'); el.style.display = 'none'; }, 2000);
        });
      });

      let tc = 0, tt = null;
      document.querySelector('.page-title').addEventListener('click', () => {
        tc++; clearTimeout(tt); tt = setTimeout(() => tc = 0, 1500);
        if (tc >= 5 && sessionStorage.getItem('gem-music-title') !== '1') {
          sessionStorage.setItem('gem-music-title', '1'); addPoints(25);
          const toast = document.getElementById('gem-toast');
          toast.textContent = '\u{1F389} +25 pts! secret rhythm found!';
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2500); tc = 0;
        }
      });
    }

    // ======================================
    // KEYBOARD SHORTCUTS (only YOUR instruments)
    // ======================================
    const ALL_KEY_MAP = {
      '1': 'tabla', '2': 'sitar', '3': 'bansuri',
      '4': 'krar', '5': 'kebero', '6': 'masinko',
      'q': 'tabla', 'w': 'sitar', 'e': 'bansuri',
      'a': 'krar', 's': 'kebero', 'd': 'masinko'
    };
    document.addEventListener('keydown', e => {
      const inst = ALL_KEY_MAP[e.key.toLowerCase()];
      if (inst && myInstruments.includes(inst)) {
        e.preventDefault();
        const pad = document.querySelector(`#your-pads .pad[data-inst="${inst}"]`);
        if (pad) hitPad(inst, pad);
      }
    });

    // ======================================
    // INIT
    // ======================================
    buildTimeline();
    buildPads();
    initParticles();

    document.getElementById('listen-btn').addEventListener('click', startListening);
    document.getElementById('record-btn').addEventListener('click', startRecording);
    document.getElementById('skip-btn').addEventListener('click', () => {
      markCompleted('music');
      window.location.href = '../../world/?level=2';
    });

    if (roomCode) setupPeer();
    setupEasterEggs();
  </script>
