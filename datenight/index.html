<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>date night</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Password Gate -->
  <div class="password-gate" id="password-gate">
    <div class="password-content">
      <span class="password-lock">🔒</span>
      <h1 class="password-title">this is a secret place</h1>
      <p class="password-hint">what's the magic words?</p>
      <input
        type="password"
        class="password-input"
        id="password-input"
        placeholder="type here..."
        autocomplete="off"
        autofocus
      />
      <p class="password-error" id="password-error">hmm, try again</p>
    </div>
  </div>

  <!-- Main Content (hidden until password entered) -->
  <div class="home-content" id="home-content" style="display:none;">
    <h1 class="home-title">date night</h1>
    <p class="home-sub" id="home-sub">a little corner of the internet, just for us</p>
    <div class="home-buttons">
      <a href="intrusive/" class="home-btn" id="question-jar-btn">
        <span class="btn-icon">🫙</span>
      </a>
      <a href="games/" class="home-btn" id="games-btn">
        <span class="btn-icon">🎮</span>
      </a>
    </div>
  </div>

  <script>
    const gate = document.getElementById('password-gate');
    const content = document.getElementById('home-content');
    const input = document.getElementById('password-input');
    const error = document.getElementById('password-error');
    const PASSWORD = 'iluvumore';

    // Check if already authenticated this session
    if (sessionStorage.getItem('datenight-auth') === '1') {
      gate.style.display = 'none';
      content.style.display = '';
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (input.value.toLowerCase().replace(/\s/g, '') === PASSWORD) {
          sessionStorage.setItem('datenight-auth', '1');
          gate.classList.add('gate-unlock');
          setTimeout(() => {
            gate.style.display = 'none';
            content.style.display = '';
          }, 600);
        } else {
          error.classList.add('show');
          input.classList.add('shake');
          setTimeout(() => {
            input.classList.remove('shake');
          }, 500);
          setTimeout(() => {
            error.classList.remove('show');
          }, 2000);
        }
      }
    });

    // Color theme toggle on title click
    const themes = [
      { bg: '#faf8f5', text: '#2c2c2c', sub: '#888' },
      { bg: '#2c2c2c', text: '#ffd700', sub: '#ccc' },
      { bg: '#1a1a2e', text: '#e94560', sub: '#a3a3c2' },
      { bg: '#f0e6ef', text: '#6b2fa0', sub: '#9a7baa' },
      { bg: '#e8f5e9', text: '#2e7d32', sub: '#6a9b6e' },
      { bg: '#fff3e0', text: '#e65100', sub: '#b08060' },
    ];
    let themeIndex = 0;
    const title = document.querySelector('.home-title');
    const sub = document.getElementById('home-sub');
    title.addEventListener('click', () => {
      themeIndex = (themeIndex + 1) % themes.length;
      const t = themes[themeIndex];
      document.body.style.background = t.bg;
      title.style.color = t.text;
      sub.style.color = t.sub;
    });

    // Check if coming back scared from the dark
    const params = new URLSearchParams(window.location.search);
    if (params.get('scared') === '1') {
      document.getElementById('home-sub').textContent = 'phew that was scary, should we try something different?';
      // Clean up the URL without reloading
      history.replaceState(null, '', './');
    }
  </script>
</body>
</html>
