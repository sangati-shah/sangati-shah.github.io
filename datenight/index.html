<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>our corner</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="hud.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Comfortaa:wght@400;600&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400&family=Lora:wght@400;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <script src="theme.js"></script>
  <script src="hud.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <!-- One unified component — steps revealed progressively -->
  <div class="room-gate" id="room-gate">

    <!-- Step 1: Choose join or new -->
    <div class="room-content" id="gate-step-1">
      <h1 class="room-title" data-dn-cycle>our corner</h1>
      <p class="room-hint">where it's always just the two of us</p>

      <div class="room-buttons">
        <button class="room-btn" id="goto-join-btn">join room</button>
        <button class="room-btn room-btn-alt" id="goto-new-btn">new room</button>
      </div>
    </div>

    <!-- Step 2a: Join — enter code -->
    <div class="room-content" id="gate-step-join" style="display:none;">
      <h1 class="room-title" data-dn-cycle>our corner</h1>
      <p class="room-hint">enter the room code</p>

      <div class="room-code-display">
        <input type="text" class="room-code-input" id="join-code-input"
          maxlength="4" placeholder="----" autocomplete="off" spellcheck="false" />
      </div>

      <div class="room-buttons">
        <button class="room-btn" id="join-btn">join room</button>
        <button class="room-btn room-btn-alt" id="join-back-btn">&larr; back</button>
      </div>

      <div id="join-status" class="room-status"></div>
    </div>

    <!-- Step 2b: New — pick a code -->
    <div class="room-content" id="gate-step-new" style="display:none;">
      <h1 class="room-title" data-dn-cycle>our corner</h1>
      <p class="room-hint">pick a code for your room</p>

      <div class="room-code-display">
        <input type="text" class="room-code-input" id="new-code-input"
          maxlength="4" placeholder="----" autocomplete="off" spellcheck="false" />
      </div>

      <div class="room-buttons">
        <button class="room-btn" id="create-btn">create room</button>
        <button class="room-btn room-btn-alt" id="new-back-btn">&larr; back</button>
      </div>

      <div id="new-status" class="room-status"></div>
    </div>

    <!-- Step 3: Home — same component, more stuff visible -->
    <div class="room-content" id="gate-step-home" style="display:none;">
      <h1 class="room-title" data-dn-cycle>our corner</h1>
      <p class="room-hint" id="home-flavor">every love story needs an adventure</p>

      <!-- Congrats banner (hidden by default, shown after completing adventure) -->
      <div class="room-congrats" id="room-congrats" style="display:none;">
        <p class="congrats-text" id="congrats-text"></p>
      </div>

      <!-- Character previews — left (me) and right (partner) -->
      <div class="home-chars-row" id="home-chars-row">
        <div class="home-char-slot" id="my-char-slot">
          <div class="home-char" id="my-char-sprite"></div>
          <div class="home-char-name" id="my-char-name"></div>
        </div>
        <div class="home-char-slot" id="partner-char-slot" style="opacity:0.25;">
          <div class="home-char" id="partner-char-sprite"></div>
          <div class="home-char-name" id="partner-char-name">waiting...</div>
        </div>
      </div>

      <p class="waiting-banner" id="waiting-banner" style="display:none;">waiting for partner &middot; <span id="waiting-code"></span></p>

      <div class="room-buttons" style="flex-direction:column;align-items:center;">
        <div class="home-actions">
          <a href="character/" class="home-action-btn home-action-create">
            <span class="ha-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="2"/></svg></span>
            <span class="ha-label">create me</span>
          </a>
          <a href="#" class="home-action-btn home-action-go" id="start-adventure-btn">
            <span class="ha-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-6.36 2.12-2.12 6.36 6.36-2.12z"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg></span>
            <span class="ha-label" id="adventure-label">start adventure</span>
          </a>
        </div>
        <div class="home-actions" style="margin-top:0.5rem;">
          <a href="art/" class="home-action-btn home-action-secondary">
            <span class="ha-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></span>
            <span class="ha-label">art exhibit</span>
          </a>
          <a href="intrusive/" class="home-action-btn home-action-secondary">
            <span class="ha-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4"/><path d="M9 10h6v8a2 2 0 01-2 2h-2a2 2 0 01-2-2v-8z"/><path d="M9 10c0-2 1.5-4 3-4s3 2 3 4"/></svg></span>
            <span class="ha-label">the jar</span>
          </a>
          <a href="games/" class="home-action-btn home-action-secondary">
            <span class="ha-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="3"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="4" y1="12" x2="8" y2="12"/><circle cx="16" cy="10" r="1" fill="currentColor"/><circle cx="18" cy="12" r="1" fill="currentColor"/></svg></span>
            <span class="ha-label">game center</span>
          </a>
        </div>
      </div>

      <div class="home-sparkles" id="home-sparkles"></div>
      <p class="room-info" id="room-info"></p>
    </div>

  </div>

  <!-- Partner cursor -->
  <div class="partner-cursor" id="partner-cursor">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M5 3l14 8-6 2-3 6z" fill="#e85d75" stroke="#fff" stroke-width="1.5"/>
    </svg>
    <span class="partner-label">them</span>
  </div>

  <script>
    const gate = document.getElementById('room-gate');
    const partnerCursor = document.getElementById('partner-cursor');

    // Gate steps
    const step1 = document.getElementById('gate-step-1');
    const stepJoin = document.getElementById('gate-step-join');
    const stepNew = document.getElementById('gate-step-new');
    const stepHome = document.getElementById('gate-step-home');
    const joinCodeInput = document.getElementById('join-code-input');
    const newCodeInput = document.getElementById('new-code-input');
    const joinBtn = document.getElementById('join-btn');
    const createBtn = document.getElementById('create-btn');

    let peer = null;
    let conn = null;
    let roomCode = null;
    let isHost = false;

    // ── Supabase (optional — falls back to PeerJS-only if not configured) ──
    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    const supabaseConfigured = !SUPABASE_URL.includes('YOUR_PROJECT');
    let supabase = null;
    if (supabaseConfigured) {
      try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch {}
    }

    async function dbCreateRoom(code) {
      if (!supabase) return;
      try { await supabase.from('rooms').upsert({ code, created_at: new Date().toISOString() }); } catch {}
    }
    async function dbRoomExists(code) {
      if (!supabase) return true; // skip check — PeerJS will fail if host isn't there
      try {
        const { data } = await supabase.from('rooms').select('code').eq('code', code).single();
        return !!data;
      } catch { return true; }
    }
    async function dbDeleteRoom(code) {
      if (!supabase) return;
      try { await supabase.from('rooms').delete().eq('code', code); } catch {}
    }

    function peerIdFromCode(code) {
      return 'shahhub-datenight-' + code;
    }

    function showStep(step) {
      step1.style.display = 'none';
      stepJoin.style.display = 'none';
      stepNew.style.display = 'none';
      stepHome.style.display = 'none';
      step.style.display = '';
      const input = step.querySelector('.room-code-input');
      if (input) setTimeout(() => input.focus(), 50);
    }

    function showStatus(elementId, msg, isError) {
      const el = document.getElementById(elementId);
      el.textContent = msg;
      el.className = 'room-status' + (isError ? ' room-error' : '');
    }

    const ROOM_TTL = 24 * 60 * 60 * 1000; // 24 hours

    function saveRoomExpiry(code) {
      localStorage.setItem('datenight-room-created', JSON.stringify({ code, ts: Date.now() }));
    }
    function isRoomExpired() {
      try {
        const d = JSON.parse(localStorage.getItem('datenight-room-created'));
        if (!d) return false;
        return Date.now() - d.ts > ROOM_TTL;
      } catch { return false; }
    }
    function clearExpiredRoom() {
      localStorage.removeItem('datenight-room-created');
      sessionStorage.removeItem('datenight-room');
      sessionStorage.removeItem('datenight-host');
      sessionStorage.removeItem('datenight-completed');
      sessionStorage.removeItem('datenight-hearts');
      sessionStorage.removeItem('partner-character');
      sessionStorage.removeItem('puzzle-points');
    }

    function enterRoom(code) {
      roomCode = code;
      sessionStorage.setItem('datenight-room', code);
      sessionStorage.setItem('datenight-host', isHost ? '1' : '0');
      saveRoomExpiry(code);

      // Smooth transition to home step (same component, no overlay shift)
      showStep(stepHome);
      document.getElementById('room-info').textContent = 'room ' + code;
      showHomeChars();
      showCongrats();
    }

    // Auto-format inputs
    function formatInput(input) {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 4);
      });
    }
    formatInput(joinCodeInput);
    formatInput(newCodeInput);

    // Step navigation
    document.getElementById('goto-join-btn').addEventListener('click', () => showStep(stepJoin));
    document.getElementById('goto-new-btn').addEventListener('click', () => showStep(stepNew));
    document.getElementById('join-back-btn').addEventListener('click', () => showStep(step1));
    document.getElementById('new-back-btn').addEventListener('click', () => showStep(step1));

    joinCodeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && joinCodeInput.value.length === 4) joinBtn.click();
    });
    newCodeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && newCodeInput.value.length === 4) createBtn.click();
    });

    // ── Create room ──
    createBtn.addEventListener('click', () => {
      const code = newCodeInput.value.trim().toUpperCase();
      if (code.length !== 4) {
        showStatus('new-status', 'enter exactly 4 letters', true);
        return;
      }

      const id = peerIdFromCode(code);
      createBtn.disabled = true;
      showStatus('new-status', 'creating room...');

      peer = new Peer(id);

      peer.on('open', async () => {
        isHost = true;
        await dbCreateRoom(code);
        enterRoom(code);

        const banner = document.getElementById('waiting-banner');
        banner.style.display = '';
        document.getElementById('waiting-code').textContent = code;

        peer.on('connection', (c) => {
          conn = c;
          c.on('open', () => {
            c.send({ type: 'welcome' });
            sendMyCharacter();
            setupCursorSharing();
            banner.style.display = 'none';
            document.getElementById('room-info').textContent = 'room ' + code + ' (partner connected)';
          });
          c.on('data', handleData);
          c.on('close', onPartnerDisconnect);
        });
      });

      peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          showStatus('new-status', 'that code is taken, try another', true);
        } else {
          showStatus('new-status', 'connection error, try again', true);
        }
        createBtn.disabled = false;
        peer.destroy();
        peer = null;
      });
    });

    // ── Join room ──
    joinBtn.addEventListener('click', async () => {
      const code = joinCodeInput.value.trim().toUpperCase();
      if (code.length !== 4) {
        showStatus('join-status', 'enter exactly 4 letters', true);
        return;
      }

      joinBtn.disabled = true;
      showStatus('join-status', 'joining room...');

      const exists = await dbRoomExists(code);
      if (!exists) {
        showStatus('join-status', 'room not found', true);
        joinBtn.disabled = false;
        return;
      }

      peer = new Peer();

      let joinTimeout;

      peer.on('open', () => {
        const c = peer.connect(peerIdFromCode(code), { reliable: true });

        c.on('open', () => {
          clearTimeout(joinTimeout);
          conn = c;
          c.on('data', (data) => {
            if (data.type === 'welcome') {
              enterRoom(code);
              sendMyCharacter();
              setupCursorSharing();
            }
            handleData(data);
          });
          c.on('close', onPartnerDisconnect);
        });

        joinTimeout = setTimeout(() => {
          if (!conn) {
            showStatus('join-status', 'couldn\'t find that room', true);
            joinBtn.disabled = false;
            peer.destroy();
            peer = null;
          }
        }, 8000);
      });

      peer.on('error', () => {
        clearTimeout(joinTimeout);
        showStatus('join-status', 'connection error, check the code', true);
        joinBtn.disabled = false;
        peer.destroy();
        peer = null;
      });
    });

    // ── Data & cursor sharing ──
    function handleData(data) {
      if (data.type === 'cursor') {
        partnerCursor.style.display = '';
        partnerCursor.style.left = (data.x * window.innerWidth) + 'px';
        partnerCursor.style.top = (data.y * window.innerHeight) + 'px';
      } else if (data.type === 'character') {
        sessionStorage.setItem('partner-character', JSON.stringify(data.char));
        showPartnerChar(data.char);
        // Update cursor label with partner name
        const label = document.querySelector('.partner-label');
        if (label && data.char.name) label.textContent = data.char.name;
      } else if (data.type === 'start') {
        playExitAndNavigate();
      }
    }

    function setupCursorSharing() {
      let lastSend = 0;
      document.addEventListener('mousemove', (e) => {
        const now = Date.now();
        if (now - lastSend < 50) return;
        lastSend = now;
        if (conn && conn.open) {
          conn.send({ type: 'cursor', x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight });
        }
      });

      document.addEventListener('touchmove', (e) => {
        const now = Date.now();
        if (now - lastSend < 50) return;
        lastSend = now;
        const touch = e.touches[0];
        if (conn && conn.open) {
          conn.send({ type: 'cursor', x: touch.clientX / window.innerWidth, y: touch.clientY / window.innerHeight });
        }
      });
    }

    function onPartnerDisconnect() {
      partnerCursor.style.display = 'none';
      document.getElementById('room-info').textContent = 'room ' + roomCode + ' (partner disconnected)';
    }

    // Clean up room in database when leaving
    window.addEventListener('beforeunload', () => {
      if (roomCode && isHost) {
        dbDeleteRoom(roomCode);
      }
    });

    // ── Congrats & journey progress ──
    function showCongrats() {
      const congratsEl = document.getElementById('room-congrats');
      const congratsText = document.getElementById('congrats-text');
      const flavorEl = document.getElementById('home-flavor');
      const labelEl = document.getElementById('adventure-label');

      let completed = [];
      try { completed = JSON.parse(sessionStorage.getItem('datenight-completed') || '[]'); } catch {}
      let heartCount = 0;
      try { heartCount = JSON.parse(sessionStorage.getItem('datenight-hearts') || '[]').length; } catch {}

      const allDone = completed.length >= 3;
      const someDone = completed.length > 0;

      if (allDone) {
        congratsEl.style.display = '';
        congratsText.textContent = 'you finished the adventure together!';
        flavorEl.textContent = 'your journey doesn\'t end here — there\'s always more to explore';
        labelEl.textContent = 'continue journey';
      } else if (someDone) {
        const progress = completed.length === 1 ? 'one adventure down' : completed.length + ' adventures down';
        const heartsMsg = heartCount > 0 ? ' \u00b7 ' + heartCount + ' hearts found' : '';
        congratsEl.style.display = '';
        congratsText.textContent = progress + heartsMsg + ' — keep going!';
        flavorEl.textContent = 'your adventure continues...';
        labelEl.textContent = 'continue adventure';
      }
    }

    // ── Reconnect peer after returning from sub-pages ──
    function reconnectPeer() {
      if (!roomCode) return;
      if (isHost) {
        peer = new Peer(peerIdFromCode(roomCode));
        peer.on('open', () => {
          peer.on('connection', (c) => {
            conn = c;
            c.on('open', () => {
              sendMyCharacter();
              setupCursorSharing();
              document.getElementById('room-info').textContent = 'room ' + roomCode + ' (partner connected)';
            });
            c.on('data', handleData);
            c.on('close', onPartnerDisconnect);
          });
        });
        peer.on('error', () => {});
      } else {
        peer = new Peer();
        peer.on('open', () => {
          function tryReconnect(attempt) {
            if (attempt > 20) return;
            const c = peer.connect(peerIdFromCode(roomCode), { reliable: true });
            let settled = false;
            c.on('open', () => {
              if (settled) return;
              settled = true;
              conn = c;
              sendMyCharacter();
              setupCursorSharing();
              document.getElementById('room-info').textContent = 'room ' + roomCode + ' (partner connected)';
              c.on('data', handleData);
              c.on('close', onPartnerDisconnect);
            });
            c.on('error', () => {
              if (settled) return;
              settled = true;
              setTimeout(() => tryReconnect(attempt + 1), 1000);
            });
            setTimeout(() => {
              if (!settled) {
                settled = true;
                try { c.close(); } catch(e) {}
                tryReconnect(attempt + 1);
              }
            }, 3000);
          }
          tryReconnect(0);
        });
        peer.on('error', () => {});
      }
    }

    // ── Check room expiry ──
    if (isRoomExpired()) clearExpiredRoom();

    // ── URL params ──
    const params = new URLSearchParams(window.location.search);
    const urlRoom = params.get('room');
    const fromParam = params.get('from');

    if (urlRoom && urlRoom.length === 4) {
      showStep(stepJoin);
      joinCodeInput.value = urlRoom;
      history.replaceState(null, '', './');
      setTimeout(() => joinBtn.click(), 300);
    } else if ((fromParam === 'character' || fromParam === 'map') && sessionStorage.getItem('datenight-room')) {
      roomCode = sessionStorage.getItem('datenight-room');
      isHost = sessionStorage.getItem('datenight-host') === '1';
      showStep(stepHome);
      document.getElementById('room-info').textContent = 'room ' + roomCode;
      history.replaceState(null, '', './');
      showHomeChars();
      showCongrats();
      // Re-establish peer connection for cursor sharing
      reconnectPeer();
    } else if (params.get('scared') === '1') {
      showStep(stepHome);
      document.getElementById('home-flavor').textContent = 'phew that was scary, should we try something different?';
      history.replaceState(null, '', './');
    }

    // ── Character colors ──
    const HAIR_COLORS = ['#1a1a1a', '#4a3728', '#8b6914', '#d4a843', '#c0392b', '#e67e22', '#ecf0f1', '#6c3483', '#2e86c1'];
    const SKIN_COLORS = ['#fde7d1', '#f5cba7', '#e0ac69', '#c68642', '#8d5524', '#5c3a1e', '#3b2412', '#f8d5c2', '#a0522d'];
    const SHIRT_COLORS = ['#e85d75', '#4a7c9b', '#2e7d32', '#f9a825', '#7b1fa2', '#ff6d00', '#1565c0', '#ec407a', '#26a69a'];
    const PANTS_COLORS = ['#3a3a5c', '#1a1a2e', '#2c3e50', '#4a3728', '#1b5e20', '#4a148c', '#b71c1c', '#f5f5dc', '#37474f'];
    const RANDOM_NAMES = ['ember', 'clover', 'dusk', 'wren', 'sage', 'fox', 'nova', 'fern', 'lark', 'blaze', 'coral', 'river'];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function generateRandomChar() {
      return {
        name: pick(RANDOM_NAMES),
        hair: pick(HAIR_COLORS),
        skin: pick(SKIN_COLORS),
        shirt: pick(SHIRT_COLORS),
        pants: pick(PANTS_COLORS),
      };
    }

    function ensureMyChar() {
      let c = null;
      try { c = JSON.parse(sessionStorage.getItem('my-character')); } catch {}
      if (!c || !c.name) {
        c = generateRandomChar();
        sessionStorage.setItem('my-character', JSON.stringify(c));
      }
      return c;
    }

    function renderCharSprite(spriteEl, c) {
      spriteEl.innerHTML = `
        <div class="hc-hair" style="background:${c.hair}"></div>
        <div class="hc-face" style="background:${c.skin}"></div>
        <div class="hc-eyes"><div class="hc-eye"></div><div class="hc-eye"></div></div>
        <div class="hc-mouth"></div>
        <div class="hc-body" style="background:${c.shirt}"></div>
        <div class="hc-legs">
          <div class="hc-leg" style="background:${c.pants || '#3a3a5c'}"></div>
          <div class="hc-leg" style="background:${c.pants || '#3a3a5c'}"></div>
        </div>`;
    }

    function showHomeChars() {
      const c = ensureMyChar();
      renderCharSprite(document.getElementById('my-char-sprite'), c);
      document.getElementById('my-char-name').textContent = c.name;

      // Show partner if we have their data
      let pc = null;
      try { pc = JSON.parse(sessionStorage.getItem('partner-character')); } catch {}
      if (pc && pc.name) showPartnerChar(pc);

      // Update flavor text
      let completed = [];
      try { completed = JSON.parse(sessionStorage.getItem('datenight-completed') || '[]'); } catch {}
      if (completed.length === 0) {
        const greetings = [
          'ready for an adventure, ' + c.name + '?',
          'looking good, ' + c.name + '!',
          'let\'s make some memories, ' + c.name,
          c.name + '! our story awaits...',
        ];
        document.getElementById('home-flavor').textContent =
          greetings[Math.floor(Math.random() * greetings.length)];
      }
    }

    function showPartnerChar(pc) {
      renderCharSprite(document.getElementById('partner-char-sprite'), pc);
      document.getElementById('partner-char-name').textContent = pc.name;
      document.getElementById('partner-char-slot').style.opacity = '1';
    }

    function sendMyCharacter() {
      const c = ensureMyChar();
      if (conn && conn.open) {
        conn.send({ type: 'character', char: c });
      }
    }

    showHomeChars();
    showCongrats();

    // ── Click → particle burst ──
    document.addEventListener('click', (e) => {
      if (e.target.closest('button, a, input, [data-dn-cycle]')) return;
      const theme = DN_THEMES[dnThemeIndex];
      dnSpawnParticles(e.clientX, e.clientY, theme);
    });

    // ── Sparkles ──
    function spawnSparkles() {
      const container = document.getElementById('home-sparkles');
      if (!container) return;
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = ['\u2726', '\u00b7', '\u2727', '\u02da', '\u2239'][Math.floor(Math.random() * 5)];
        s.style.left = (10 + Math.random() * 80) + '%';
        s.style.animationDelay = (Math.random() * 4) + 's';
        s.style.animationDuration = (3 + Math.random() * 3) + 's';
        s.style.fontSize = (0.5 + Math.random() * 0.8) + 'rem';
        container.appendChild(s);
      }
    }
    spawnSparkles();

    // ── Start Adventure Transition ──
    function playExitAndNavigate() {
      const mySlot = document.getElementById('my-char-slot');
      const mySprite = document.getElementById('my-char-sprite');
      const charRect = mySprite ? mySprite.getBoundingClientRect() : null;

      // Zoom away all content except character
      const allContent = stepHome.querySelectorAll('.room-title, .room-hint, .room-congrats, .room-buttons, .home-sparkles, .room-info, .waiting-banner, .home-char-name, #partner-char-slot');
      allContent.forEach(el => {
        el.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 1, 1), opacity 0.4s ease';
        el.style.transform = 'scale(2.5)';
        el.style.opacity = '0';
      });

      // Move character to center
      if (mySprite && charRect) {
        mySprite.style.animation = 'none';
        mySlot.style.transition = 'none';
        mySlot.style.position = 'fixed';
        mySlot.style.top = charRect.top + 'px';
        mySlot.style.left = charRect.left + 'px';
        mySlot.style.width = charRect.width + 'px';
        mySlot.style.zIndex = '10000';
        mySlot.style.margin = '0';

        requestAnimationFrame(() => {
          mySlot.style.transition = 'top 0.5s ease, left 0.5s ease';
          mySlot.style.top = (window.innerHeight / 2 - charRect.height / 2) + 'px';
          mySlot.style.left = (window.innerWidth / 2 - charRect.width / 2) + 'px';
        });
      }

      // Fade and navigate
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.25s ease';
        document.body.style.opacity = '0';
        sessionStorage.setItem('datenight-drop-in', '1');
        setTimeout(() => { window.location.href = 'world/'; }, 280);
      }, 550);
    }

    document.getElementById('start-adventure-btn').addEventListener('click', (e) => {
      e.preventDefault();
      if (conn && conn.open) conn.send({ type: 'start' });
      playExitAndNavigate();
    });
  </script>
</body>
</html>
