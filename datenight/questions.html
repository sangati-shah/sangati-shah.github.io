<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>question jar</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- LIGHTS ON STATE -->
  <div id="lights-on" class="jar-state active">
    <a href="index.html" class="back-btn">← back</a>
    <div class="lights-on-content">
      <p class="jar-prompt">let's turn off the lights<br/>and get deep</p>

      <!-- Tent Toggle Switch (from uiverse.io/m1her) -->
      <div class="tent-switch vertical" id="tent-switch-container">
        <div class="tent-switch-inner">
          <div class="tent-dot"></div>
          <label for="lights-toggle" class="tent-label">
            <input type="checkbox" id="lights-toggle" />
            <div class="tent">
              <div class="tent-top">
                <div class="tent-top-inner"></div>
              </div>
              <div class="tent-left"></div>
              <div class="tent-right"></div>
            </div>
          </label>
          <div class="tent-line"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- LIGHTS OFF STATE (campfire) -->
  <div id="lights-off" class="jar-state">

    <!-- Fireflies -->
    <div id="fireflies"></div>

    <!-- Campfire -->
    <div class="campfire-scene">
      <div class="campfire">
        <div class="flame-wrapper">
          <div class="flame flame-1"></div>
          <div class="flame flame-2"></div>
          <div class="flame flame-3"></div>
          <div class="flame flame-inner"></div>
        </div>
        <div class="logs">
          <div class="log log-1"></div>
          <div class="log log-2"></div>
        </div>
        <div class="fire-glow"></div>
      </div>

      <!-- The Jar -->
      <div class="jar-container" onclick="drawQuestion()">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
            <div class="paper paper-4"></div>
            <div class="paper paper-5"></div>
          </div>
          <div class="jar-label">tap me</div>
        </div>
      </div>
    </div>

    <!-- Scared switch in bottom-right corner -->
    <div class="scared-corner" id="scared-corner">
      <p class="scared-text">i'm scared of the dark<br/>turn the lights back on</p>
      <div class="tent-switch vertical small" id="tent-switch-dark">
        <div class="tent-switch-inner">
          <div class="tent-dot"></div>
          <label for="lights-back-on" class="tent-label">
            <input type="checkbox" id="lights-back-on" />
            <div class="tent">
              <div class="tent-top">
                <div class="tent-top-inner"></div>
              </div>
              <div class="tent-left"></div>
              <div class="tent-right"></div>
            </div>
          </label>
          <div class="tent-line"></div>
        </div>
      </div>
    </div>

    <!-- Question Display (paper unfurl) -->
    <div id="question-display" class="question-display">
      <div class="paper-unfurl">
        <div class="paper-scroll">
          <p id="question-text" class="question-text"></p>
        </div>
      </div>
      <button class="next-btn" onclick="drawQuestion()">draw another</button>
      <button class="close-btn" onclick="closeQuestion()">put it back</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
