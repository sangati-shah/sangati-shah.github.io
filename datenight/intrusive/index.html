<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>question jar</title>
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- LIGHTS ON STATE -->
  <div id="lights-on" class="jar-state active">
    <a href="../" class="back-btn">← back</a>
    <div class="lights-on-content">
      <p class="jar-prompt">let's turn off the lights<br/>and get deep</p>

      <!-- Tent Toggle Switch (from uiverse.io/m1her) -->
      <div class="tent-switch vertical" id="tent-switch-container">
        <div class="tent-switch-inner">
          <div class="tent-dot"></div>
          <label for="lights-toggle" class="tent-label">
            <input type="checkbox" id="lights-toggle" />
            <div class="tent">
              <div class="tent-top">
                <div class="tent-top-inner"></div>
              </div>
              <div class="tent-left"></div>
              <div class="tent-right"></div>
            </div>
          </label>
          <div class="tent-line"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- LIGHTS OFF STATE (campfire) -->
  <div id="lights-off" class="jar-state">

    <!-- Fireflies -->
    <div id="fireflies"></div>

    <!-- Jar Grid (one jar per category) -->
    <div class="jar-grid">
      <div class="deck-jar active" data-deck="deep" onclick="selectDeckAndDraw('deep')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">deep</div>
      </div>
      <div class="deck-jar" data-deck="dreams" onclick="selectDeckAndDraw('dreams')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">dreams</div>
      </div>
      <div class="deck-jar" data-deck="memories" onclick="selectDeckAndDraw('memories')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">memories</div>
      </div>
      <div class="deck-jar" data-deck="vulnerable" onclick="selectDeckAndDraw('vulnerable')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">vulnerable</div>
      </div>
      <div class="deck-jar" data-deck="gratitude" onclick="selectDeckAndDraw('gratitude')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">gratitude</div>
      </div>
      <div class="deck-jar" data-deck="spicy" onclick="selectDeckAndDraw('spicy')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">spicy</div>
      </div>
      <div class="deck-jar" data-deck="silly" onclick="selectDeckAndDraw('silly')">
        <div class="jar">
          <div class="jar-lid"></div>
          <div class="jar-body">
            <div class="paper paper-1"></div>
            <div class="paper paper-2"></div>
            <div class="paper paper-3"></div>
          </div>
        </div>
        <div class="tape-label">silly</div>
      </div>
    </div>

    <!-- Campfire scene (bottom of screen) -->
    <div class="campfire-scene">
      <!-- Person left: Indian girl with curly black hair -->
      <div class="person person-left">
        <div class="person-head">
          <div class="hair-curly-black">
            <div class="curl curl-1"></div>
            <div class="curl curl-2"></div>
            <div class="curl curl-3"></div>
            <div class="curl curl-4"></div>
            <div class="curl curl-5"></div>
            <div class="curl curl-6"></div>
          </div>
          <div class="face face-brown"></div>
        </div>
        <div class="person-body body-left"></div>
        <div class="marshmallow-stick stick-left">
          <div class="stick"></div>
          <div class="marshmallow"></div>
        </div>
      </div>

      <div class="campfire">
        <div class="flame-wrapper">
          <div class="flame flame-1"></div>
          <div class="flame flame-2"></div>
          <div class="flame flame-3"></div>
          <div class="flame flame-inner"></div>
        </div>
        <div class="logs">
          <div class="log log-1"></div>
          <div class="log log-2"></div>
        </div>
        <div class="fire-glow"></div>
      </div>

      <!-- Person right: Black man with afro with blond tips -->
      <div class="person person-right">
        <div class="person-head">
          <div class="hair-afro">
            <div class="afro-base"></div>
            <div class="afro-tips"></div>
          </div>
          <div class="face face-dark"></div>
        </div>
        <div class="person-body body-right"></div>
        <div class="marshmallow-stick stick-right">
          <div class="stick"></div>
          <div class="marshmallow"></div>
        </div>
      </div>
    </div>

    <!-- Scared link in bottom-right corner -->
    <div class="scared-corner" id="scared-corner">
      <a href="../?scared=1" class="scared-text">i'm scared of the dark<br/>turn the lights back on</a>
    </div>

    <!-- Question Display (paper unfurl) -->
    <div id="question-display" class="question-display">
      <div class="paper-unfurl">
        <div class="paper-scroll">
          <p id="question-text" class="question-text"></p>
        </div>
      </div>
      <button class="next-btn" onclick="drawQuestion()">draw another</button>
      <button class="close-btn" onclick="closeQuestion()">put it back</button>
    </div>
  </div>

  <script src="../app.js"></script>
</body>
</html>
