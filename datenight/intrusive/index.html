<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>question jar</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Comfortaa:wght@400;600&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400&family=Lora:wght@400;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <script src="../theme.js"></script>
</head>
<body class="lights-off" style="background:#0a0a12;">

  <a href="../?from=map" class="back-btn" style="color:rgba(255,255,255,0.4);">← home</a>

  <!-- LIGHTS ON STATE (hidden - go straight to campfire) -->
  <div id="lights-on" class="jar-state">
    <input type="checkbox" id="lights-toggle" style="display:none;" checked />
  </div>

  <!-- LIGHTS OFF STATE (campfire) -->
  <div id="lights-off" class="jar-state active">

    <!-- Fireflies -->
    <div id="fireflies"></div>

    <!-- Single Jar -->
    <p class="jar-prompt-text">open a jar for questions</p>
    <div class="single-jar" id="single-jar">
      <div class="jar">
        <div class="jar-lid"></div>
        <div class="jar-body">
          <div class="paper paper-1"></div>
          <div class="paper paper-2"></div>
          <div class="paper paper-3"></div>
        </div>
      </div>
    </div>

    <!-- Campfire scene (bottom of screen) -->
    <div class="campfire-scene">
      <!-- Person left: Indian girl with curly black hair -->
      <div class="person person-left">
        <div class="person-head">
          <div class="hair-curly-black">
            <div class="curl curl-1"></div>
            <div class="curl curl-2"></div>
            <div class="curl curl-3"></div>
            <div class="curl curl-4"></div>
            <div class="curl curl-5"></div>
            <div class="curl curl-6"></div>
          </div>
          <div class="face face-brown"></div>
        </div>
        <div class="person-body body-left"></div>
        <div class="marshmallow-stick stick-left">
          <div class="stick"></div>
          <div class="marshmallow"></div>
        </div>
      </div>

      <div class="campfire">
        <div class="flame-wrapper">
          <div class="flame flame-1"></div>
          <div class="flame flame-2"></div>
          <div class="flame flame-3"></div>
          <div class="flame flame-inner"></div>
        </div>
        <div class="logs">
          <div class="log log-1"></div>
          <div class="log log-2"></div>
        </div>
        <div class="fire-glow"></div>
      </div>

      <!-- Person right: Black man with afro with blond tips -->
      <div class="person person-right">
        <div class="person-head">
          <div class="hair-afro">
            <div class="afro-base"></div>
            <div class="afro-tips"></div>
          </div>
          <div class="face face-dark"></div>
        </div>
        <div class="person-body body-right"></div>
        <div class="marshmallow-stick stick-right">
          <div class="stick"></div>
          <div class="marshmallow"></div>
        </div>
      </div>
    </div>

    <!-- Scared link in bottom-right corner -->
    <div class="scared-corner" id="scared-corner">
      <a href="../?scared=1" class="scared-text">i'm scared of the dark<br/>turn the lights back on</a>
    </div>

    <!-- Question Display (paper unfurl) -->
    <div id="question-display" class="question-display">
      <div class="paper-unfurl">
        <div class="paper-scroll">
          <p id="question-text" class="question-text"></p>
        </div>
      </div>
      <button class="next-btn" id="draw-btn">draw another</button>
      <button class="close-btn" id="close-btn">put it back</button>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    document.getElementById('single-jar').addEventListener('click', drawQuestion);
    document.getElementById('draw-btn').addEventListener('click', drawQuestion);
    document.getElementById('close-btn').addEventListener('click', closeQuestion);
  </script>
</body>
</html>
