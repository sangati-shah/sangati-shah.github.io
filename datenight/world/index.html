<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>adventure</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../hud.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Comfortaa:wght@400;600&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400&family=Lora:wght@400;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <script src="../theme.js"></script>
  <script src="../hud.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      background: var(--dn-bg, #f7f2e7);
      user-select: none;
      -webkit-user-select: none;
      transition: background 1.5s ease;
    }

    .viewport { position: fixed; inset: 0; overflow: hidden; }

    .world {
      position: absolute;
      height: 100%;
    }

    /* ── Ground Line (segmented) ── */
    .ground-segment {
      position: absolute;
      bottom: 80px;
      height: 3px;
      background: var(--dn-accent, #e85d75);
      z-index: 10;
      transition: opacity 2s ease;
    }

    /* ── Obstacles: simple boxes ── */
    .obstacle {
      position: absolute;
      z-index: 20;
      background: var(--dn-accent, #e85d75);
      border-radius: 4px;
      opacity: 0.7;
    }

    .obstacle-float {
      opacity: 0.5;
      border-radius: 3px;
    }

    /* ── Bounce Pads ── */
    .bounce-pad {
      position: absolute;
      z-index: 22;
      border-radius: 50% 50% 4px 4px;
      background: var(--dn-accent, #e85d75);
      opacity: 0.6;
      transition: transform 0.1s ease;
    }
    .bounce-pad.squish {
      transform: scaleY(0.5) scaleX(1.3);
      transform-origin: bottom center;
    }

    /* ── Speed Zones ── */
    .speed-zone {
      position: absolute;
      z-index: 8;
      opacity: 0.15;
      pointer-events: none;
    }
    .speed-zone .sz-arrow {
      position: absolute;
      width: 12px; height: 12px;
      border-right: 2.5px solid var(--dn-accent, #e85d75);
      border-top: 2.5px solid var(--dn-accent, #e85d75);
      transform: rotate(45deg);
      animation: sz-drift 1s ease-in-out infinite;
    }
    @keyframes sz-drift {
      0%, 100% { opacity: 0.3; transform: rotate(45deg) translateX(0); }
      50% { opacity: 1; transform: rotate(45deg) translateX(4px); }
    }

    /* ── Floating Hearts ── */
    .heart-pickup {
      position: absolute;
      z-index: 24;
      width: 18px; height: 18px;
      cursor: pointer;
      animation: heart-bob 2s ease-in-out infinite;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .heart-pickup.collected {
      transform: scale(1.8);
      opacity: 0;
      pointer-events: none;
    }
    .heart-pickup svg {
      width: 100%; height: 100%;
      display: block;
    }
    @keyframes heart-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ── Heart Counter ── */
    .heart-counter {
      position: fixed;
      top: 1.2rem; right: 1.2rem;
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: var(--dn-sub, #999);
      z-index: 300;
      display: flex; align-items: center; gap: 6px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .heart-counter.visible { opacity: 1; }
    .heart-counter .hc-icon {
      width: 16px; height: 16px;
      display: inline-flex;
    }
    .heart-counter .hc-icon svg {
      width: 100%; height: 100%;
    }
    .heart-counter.bump .hc-icon {
      animation: hc-bump 0.3s ease;
    }
    @keyframes hc-bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    /* ── Points Counter ── */
    .points-counter {
      position: fixed;
      top: 3rem; right: 1.2rem;
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: var(--dn-sub, #999);
      z-index: 300;
      display: flex; align-items: center; gap: 6px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .points-counter.visible { opacity: 1; }
    .points-label { font-size: 0.85rem; opacity: 0.7; }

    .point-float {
      position: fixed;
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: var(--dn-accent, #e85d75);
      pointer-events: none;
      z-index: 400;
      animation: float-up 1.2s ease-out forwards;
      white-space: nowrap;
    }
    @keyframes float-up {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      60% { opacity: 1; transform: translateY(-30px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
    }

    /* ── Endless HUD ── */
    .endless-hud {
      position: fixed;
      top: 1.2rem; left: 50%; transform: translateX(-50%);
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      color: var(--dn-text, #555);
      z-index: 300;
      display: flex; align-items: center; gap: 8px;
    }
    .endless-label {
      font-size: 0.85rem;
      color: var(--dn-sub, #999);
    }

    /* ── Moving Platforms ── */
    .moving-platform {
      position: absolute;
      z-index: 20;
      background: var(--dn-accent, #e85d75);
      border-radius: 3px;
      opacity: 0.55;
    }

    /* ── Chapter Nav ── */
    .chapter-nav {
      position: fixed; top: 0.8rem; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.15rem;
      z-index: 310;
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: 0.85rem;
      background: color-mix(in srgb, var(--dn-bg, #f7f2e7) 85%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--dn-accent, #e85d75) 18%, transparent);
      border-radius: 20px;
      padding: 3px 4px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .chapter-btn {
      background: none; border: none;
      padding: 4px 10px;
      border-radius: 14px;
      font-family: inherit; font-size: inherit;
      color: var(--dn-sub, #999);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .chapter-btn:hover {
      background: color-mix(in srgb, var(--dn-accent, #e85d75) 12%, transparent);
      color: var(--dn-text, #555);
    }
    .chapter-sep {
      width: 1px; height: 16px;
      background: color-mix(in srgb, var(--dn-accent, #e85d75) 25%, transparent);
      margin: 0 4px;
    }
    .chapter-btn.active {
      background: color-mix(in srgb, var(--dn-accent, #e85d75) 18%, transparent);
      color: var(--dn-text, #555);
    }
    .chapter-dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: color-mix(in srgb, var(--dn-accent, #e85d75) 25%, transparent);
      flex-shrink: 0;
    }

    /* ── Glowing Adventure Box ── */
    .adventure-box {
      position: absolute;
      z-index: 25;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--orb-color, var(--dn-accent, #e85d75));
      box-shadow:
        0 0 20px var(--orb-color, var(--dn-accent, #e85d75)),
        0 0 40px color-mix(in srgb, var(--orb-color, var(--dn-accent, #e85d75)) 50%, transparent),
        0 0 80px color-mix(in srgb, var(--orb-color, var(--dn-accent, #e85d75)) 25%, transparent);
      animation: glow-box 1.5s ease-in-out infinite alternate;
      cursor: pointer;
      pointer-events: auto;
    }

    .adventure-box.completed {
      opacity: 0.35;
      animation: none;
      box-shadow: 0 0 10px color-mix(in srgb, var(--orb-color, var(--dn-accent, #e85d75)) 20%, transparent);
    }

    @keyframes glow-box {
      0% { transform: scale(1); box-shadow: 0 0 20px var(--orb-color, var(--dn-accent)), 0 0 40px color-mix(in srgb, var(--orb-color, var(--dn-accent)) 40%, transparent); }
      100% { transform: scale(1.08); box-shadow: 0 0 30px var(--orb-color, var(--dn-accent)), 0 0 60px color-mix(in srgb, var(--orb-color, var(--dn-accent)) 55%, transparent), 0 0 100px color-mix(in srgb, var(--orb-color, var(--dn-accent)) 25%, transparent); }
    }

    /* ── Enter-box animation ── */
    .enter-vortex {
      position: fixed; inset: 0;
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .enter-vortex.active { opacity: 1; }

    .enter-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid var(--dn-accent, #e85d75);
      opacity: 0;
    }

    @keyframes ring-collapse {
      0% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
      40% { opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    }

    .enter-flash {
      position: fixed; inset: 0;
      z-index: 9999;
      background: var(--dn-accent, #e85d75);
      opacity: 0;
      pointer-events: none;
    }
    .enter-flash.show {
      animation: flash-in 0.6s ease forwards;
    }
    @keyframes flash-in {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 1; }
    }

    /* ── Character Sprite ── */
    .sprite {
      position: absolute;
      z-index: 50;
    }

    .sprite-inner {
      position: relative;
      width: 32px; height: 52px;
    }

    .sprite .s-hair {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 22px; height: 14px; border-radius: 50% 50% 30% 30%; z-index: 3;
    }
    .sprite .s-face {
      position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 20px; border-radius: 50%; z-index: 2;
    }
    .sprite .s-eyes {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 10px; display: flex; justify-content: space-between; z-index: 4;
    }
    .sprite .s-eye { width: 3px; height: 3px; background: #1a1a1a; border-radius: 50%; }
    .sprite .s-body {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 16px; border-radius: 5px 5px 3px 3px; z-index: 1;
    }
    .sprite .s-legs {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      display: flex; gap: 3px;
    }
    .sprite .s-leg {
      width: 7px; height: 14px;
      border-radius: 3px 3px 4px 4px; transition: transform 0.15s;
    }

    .sprite.walking .s-leg:first-child { animation: walk-l 0.3s ease-in-out infinite alternate; }
    .sprite.walking .s-leg:last-child { animation: walk-r 0.3s ease-in-out infinite alternate; }
    @keyframes walk-l { 0% { transform: rotate(-18deg); } 100% { transform: rotate(18deg); } }
    @keyframes walk-r { 0% { transform: rotate(18deg); } 100% { transform: rotate(-18deg); } }

    .sprite.jumping .s-leg { animation: none !important; transform: rotate(0deg) !important; }
    .sprite.ducking .sprite-inner { transform: scaleY(0.58); transform-origin: bottom center; }
    .sprite.ducking.facing-left .sprite-inner { transform: scaleX(-1) scaleY(0.58); transform-origin: bottom center; }
    .sprite.facing-left .sprite-inner { transform: scaleX(-1); }

    /* Player getting sucked into box */
    .sprite.entering {
      transition: transform 0.5s cubic-bezier(0.6, 0, 1, 1), opacity 0.4s ease 0.2s;
      opacity: 0;
    }

    .sprite-name {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      font-family: 'Caveat', cursive; font-size: 0.65rem;
      color: var(--dn-sub, #999); white-space: nowrap; pointer-events: none;
    }

    /* ── Intro Text ── */
    .intro-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: var(--dn-sub, #999);
      text-align: center;
      z-index: 100;
      line-height: 1.6;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }
    .intro-text.fade { opacity: 0; }

    /* ── Mobile Controls ── */
    .mobile-controls {
      position: fixed; bottom: 1.2rem; left: 0; right: 0;
      display: none; justify-content: space-between;
      padding: 0 1.2rem; z-index: 200; pointer-events: none;
    }
    .ctrl-group { display: flex; gap: 0.4rem; pointer-events: auto; }
    .ctrl-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: color-mix(in srgb, var(--dn-accent, #e85d75) 15%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--dn-accent, #e85d75) 30%, transparent);
      color: var(--dn-sub, #999); font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .ctrl-btn:active { background: color-mix(in srgb, var(--dn-accent, #e85d75) 30%, transparent); }
    .ctrl-btn.jump-btn { width: 58px; height: 58px; font-size: 0.75rem; font-family: 'Caveat', cursive; }
    @media (pointer: coarse) { .mobile-controls { display: flex; } }
    @media (max-width: 360px) {
      .ctrl-btn { width: 44px; height: 44px; font-size: 1.1rem; }
      .ctrl-btn.jump-btn { width: 50px; height: 50px; }
      .mobile-controls { padding: 0 0.8rem; bottom: 0.8rem; }
    }

    /* ── Drop-in animation ── */
    .drop-in-overlay {
      position: fixed; inset: 0;
      background: var(--dn-bg, #f7f2e7);
      z-index: 8000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    .drop-in-overlay.fade-out { opacity: 0; pointer-events: none; }
    .drop-in-char { position: relative; width: 72px; height: 108px; }
    .drop-in-char .dc-hair { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 42px; height: 24px; border-radius: 50% 50% 30% 30%; z-index: 3; }
    .drop-in-char .dc-face { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 34px; height: 36px; border-radius: 50%; z-index: 2; }
    .drop-in-char .dc-eyes { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); width: 20px; display: flex; justify-content: space-between; z-index: 4; }
    .drop-in-char .dc-eye { width: 5px; height: 6px; background: #1a1a1a; border-radius: 50%; }
    .drop-in-char .dc-mouth { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 10px; height: 5px; border-bottom: 2px solid #c0756b; border-radius: 0 0 50% 50%; z-index: 4; }
    .drop-in-char .dc-body { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); width: 36px; height: 30px; border-radius: 8px 8px 4px 4px; z-index: 1; }
    .drop-in-char .dc-legs { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
    .drop-in-char .dc-leg { width: 12px; height: 24px; border-radius: 4px 4px 6px 6px; }
    .drop-in-wrapper { transition: transform 0.6s cubic-bezier(0.22, 1.2, 0.36, 1); }

    @keyframes squish-land {
      0% { transform: scaleY(1) scaleX(1); }
      30% { transform: scaleY(0.75) scaleX(1.2); }
      60% { transform: scaleY(1.05) scaleX(0.97); }
      100% { transform: scaleY(1) scaleX(1); }
    }
    .drop-in-char.landed { animation: squish-land 0.35s ease forwards; transform-origin: bottom center; }

    /* ── Ending Overlay ── */
    .ending-overlay {
      position: fixed; inset: 0;
      z-index: 7000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
      overflow: hidden;
    }
    .ending-overlay.active { opacity: 1; pointer-events: auto; }

    .ending-sky {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, #0a0a2e 0%, #1a1a4e 40%, #2d1b4e 70%, #3d1b3e 100%);
    }

    .ending-star {
      position: absolute;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .ending-ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(to bottom, transparent, #0a0a2e);
    }

    .ending-chars {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
      z-index: 10;
    }
    .ending-chars > div { animation: ending-jump 0.6s ease-in-out infinite; }
    .ending-chars > div:nth-child(2) { animation-delay: 0.3s; }
    @keyframes ending-jump {
      0%, 100% { transform: translateY(0); }
      40% { transform: translateY(-18px); }
    }

    .ending-message {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Caveat', cursive;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.8;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .ending-message.visible { opacity: 1; }

    .ending-stats {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .ending-stats.visible { opacity: 1; }

    .ending-actions {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 24px;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .ending-actions.visible { opacity: 1; }
    .ending-actions a {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s;
    }
    .ending-actions a:hover { color: rgba(255,255,255,0.9); }

    .firework {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      opacity: 0;
      animation: firework-burst 1.2s ease-out forwards;
    }
    @keyframes firework-burst {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      50% { opacity: 0.8; }
      100% { opacity: 0; transform: translate(var(--fw-dx), var(--fw-dy)) scale(0.3); }
    }

    .ending-heart-float {
      position: absolute;
      width: 16px; height: 16px;
      opacity: 0;
      animation: heart-float-up 4s ease-in-out forwards;
    }
    .ending-heart-float svg {
      width: 100%; height: 100%;
      display: block;
    }
    @keyframes heart-float-up {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      15% { opacity: 0.7; }
      85% { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-200px) scale(1) rotate(15deg); }
    }

    /* ── Gauntlet section marker ── */
    .gauntlet-gate {
      position: absolute;
      z-index: 15;
      font-family: 'Caveat', cursive;
      font-size: 0.8rem;
      color: var(--dn-sub, #999);
      opacity: 0.4;
      text-align: center;
      pointer-events: none;
    }

    /* ── End tunnel (Mario pipe style) ── */
    .end-tunnel {
      position: absolute;
      z-index: 25;
    }
    .tunnel-body {
      position: absolute;
      bottom: 0;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(90deg, #2a6e2a 0%, #3d9b3d 30%, #2d7a2d 70%, #1f5c1f 100%);
      border: 3px solid #1a4d1a;
      border-bottom: none;
    }
    .tunnel-lip {
      position: absolute;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(90deg, #235f23 0%, #3d9b3d 25%, #4aad4a 50%, #3d9b3d 75%, #235f23 100%);
      border: 3px solid #1a4d1a;
    }
    .tunnel-opening {
      position: absolute;
      border-radius: 4px 4px 0 0;
      background: #0a0a0a;
    }
    .tunnel-shine {
      position: absolute;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
    }

    /* ── Tunnel enter animation ── */
    .ending-tunnel-overlay {
      position: fixed; inset: 0;
      z-index: 6500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .ending-tunnel-overlay.active { opacity: 1; }

    @keyframes walk-into-tunnel {
      0% { transform: translateX(0) scale(1); opacity: 1; }
      60% { transform: translateX(30px) scale(0.7); opacity: 0.8; }
      100% { transform: translateX(35px) scale(0.2); opacity: 0; }
    }
    .player-entering-tunnel {
      animation: walk-into-tunnel 1.2s ease-in forwards;
    }

    /* ── Improved ending overlay ── */
    .ending-shooting-star {
      position: absolute;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: shoot-star 1.5s ease-out forwards;
    }
    .ending-shooting-star::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40px; height: 1px;
      background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
      transform-origin: right center;
      transform: rotate(0deg);
    }
    @keyframes shoot-star {
      0% { opacity: 0; transform: translate(0, 0); }
      10% { opacity: 1; }
      100% { opacity: 0; transform: translate(-200px, 120px); }
    }

    .ending-moon {
      position: absolute;
      top: 8%;
      right: 15%;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffeebb, #f5d98a);
      box-shadow: 0 0 40px rgba(255,238,187,0.4), 0 0 80px rgba(255,238,187,0.15);
      opacity: 0;
      transition: opacity 2s ease;
    }
    .ending-moon.visible { opacity: 1; }

    .ending-message-line {
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .ending-message-line.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Drop-in overlay -->
  <div class="drop-in-overlay" id="drop-in-overlay" style="display:none;">

  <!-- Heart counter -->

  <!-- Mobile Controls -->
  <div class="mobile-controls">

  <script>
    // ══════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════
    const isEndless = new URLSearchParams(window.location.search).get('mode') === 'endless';
    let WORLD_W = isEndless ? 4000 : 12400;
    const LINE_BOTTOM = 80;
    const SPRITE_W = 32;
    const SPRITE_H = 52;
    const GRAVITY = 0.55;
    const JUMP_VEL = -9.5;
    const SPEED = 2.4;
    const DUCK_H = 30;
    const BOX_SIZE = 50;
    const BOUNCE_VEL = -14;
    const ENDING_X = 11900;

    function groundY() { return window.innerHeight - LINE_BOTTOM - 3 - SPRITE_H; }

    // ══════════════════════════════════════
    // OBSTACLES
    // ══════════════════════════════════════
    function ob(x, w, h, type) {
      return { x, w, h, type: type || 'ground' };
    }

    const OBSTACLE_DEFS = [
      // Section 1 — before first adventure box
      ob(400, 30, 28),
      ob(620, 30, 28),
      ob(850, 120, 18, 'float'),
      ob(1100, 30, 35),
      ob(1350, 30, 28),
      ob(1550, 140, 18, 'float'),
      ob(2100, 120, 18, 'float'),
      ob(2400, 30, 28),
      // Section 2 — between box 1 and box 2
      ob(3200, 35, 28),
      ob(3400, 30, 32),
      ob(3600, 130, 18, 'float'),
      ob(3950, 35, 35),
      ob(4150, 30, 28),
      ob(4350, 150, 18, 'float'),
      ob(4550, 40, 28),
      ob(5000, 45, 28),
      // Section 3 — between box 2 and box 3
      ob(5700, 30, 28),
      ob(6350, 30, 28),
      ob(6550, 40, 35),
      ob(6750, 130, 18, 'float'),
      ob(6950, 35, 28),
      ob(7550, 40, 28),
      ob(7750, 35, 28),
      // Section 4 — THE GAUNTLET (after 3rd orb)
      // Staircase climb
      ob(8500, 60, 20),
      ob(8620, 60, 40),
      ob(8740, 60, 60),
      ob(8860, 60, 80),
      ob(8980, 80, 18, 'float'),  // high float — need stacking + jump
      // Bounce chain valley
      ob(9300, 30, 45),           // wall before bounce zone
      ob(9700, 30, 45),           // wall after bounce zone
      // (moving platforms bridge this gap — no floating obstacles here)
      // Final push — duck-under barriers + tall walls
      ob(10750, 100, 18, 'float'),  // duck under this
      ob(10900, 30, 50),            // tall wall
      ob(11050, 120, 18, 'float'),  // duck under
      ob(11200, 30, 50),            // tall wall
      ob(11350, 100, 18, 'float'),  // duck under
      // Victory run-up
      ob(11550, 40, 28),
      ob(11700, 40, 28),
    ];

    // ══════════════════════════════════════
    // BOUNCE PADS
    // ══════════════════════════════════════
    const BOUNCE_DEFS = [
      // Section 1 — bounce right before the gap at 1800
      { x: 1770, w: 30, h: 10 },
      // Section 2 — bounce before each gap
      { x: 3590, w: 30, h: 10 },   // gap at 3620
      { x: 4650, w: 30, h: 10 },   // gap at 4680
      // Section 3 — bounce before each gap
      { x: 5860, w: 30, h: 10 },   // gap at 5890
      { x: 7070, w: 30, h: 10 },   // gap at 7100
      // Section 4 — bounce before gauntlet gap + chain
      { x: 9050, w: 30, h: 10 },   // gap at 9080
      { x: 9400, w: 30, h: 10 },   // bounce chain
      { x: 9500, w: 30, h: 10 },
      { x: 9600, w: 30, h: 10 },
      // Victory bounce
      { x: 11850, w: 40, h: 10 },
    ];

    // ══════════════════════════════════════
    // SPEED ZONES
    // ══════════════════════════════════════
    const SPEED_ZONE_DEFS = [
      // Section 1
      { x: 200, w: 120 },
      { x: 1200, w: 100 },
      // Section 2
      { x: 3500, w: 130 },
      { x: 4400, w: 110 },
      // Section 3
      { x: 6200, w: 120 },
      { x: 7400, w: 130 },
      // Section 4
      { x: 8400, w: 80 },    // boost into staircase
      { x: 9800, w: 80 },    // boost into float course
      { x: 11450, w: 100 },  // victory sprint
    ];
    const SPEED_BOOST = 1.8;

    // ══════════════════════════════════════
    // FLOATING HEARTS
    // ══════════════════════════════════════
    const HEART_DEFS = [
      // Section 1
      { x: 300, elevation: 30 },
      { x: 720, elevation: 110 },
      { x: 900, elevation: 55 },
      { x: 1250, elevation: 30 },
      { x: 1600, elevation: 55 },
      { x: 1720, elevation: 120 },
      { x: 2150, elevation: 55 },
      { x: 2600, elevation: 30 },
      // Section 2
      { x: 3120, elevation: 110 },
      { x: 3300, elevation: 30 },
      { x: 4070, elevation: 120 },
      { x: 4400, elevation: 55 },
      // Section 3
      { x: 5820, elevation: 110 },
      { x: 6470, elevation: 120 },
      { x: 6800, elevation: 55 },
      { x: 7070, elevation: 110 },
      { x: 7400, elevation: 55 },
      { x: 7600, elevation: 30 },
      // Section 4 — Gauntlet hearts (hard to get!)
      { x: 8650, elevation: 90 },   // on staircase
      { x: 8900, elevation: 120 },  // top of stairs
      { x: 9010, elevation: 160 },  // above high float — HARD
      { x: 9450, elevation: 130 },  // above bounce chain
      { x: 9550, elevation: 140 },  // above bounce chain
      { x: 9950, elevation: 75 },   // on float course
      { x: 10150, elevation: 75 },  // on float course
      { x: 10350, elevation: 75 },  // on float course
      { x: 10550, elevation: 75 },  // on float course
      { x: 10800, elevation: 10 },  // duck section
      { x: 11100, elevation: 10 },  // duck section
      { x: 11400, elevation: 10 },  // duck section
      // Grand finale heart
      { x: 11870, elevation: 150 }, // above final bounce — the last heart
    ];

    // ══════════════════════════════════════
    // MOVING PLATFORMS
    // ══════════════════════════════════════
    const MOVING_PLAT_DEFS = [
      // Section 1
      { x: 1900, w: 100, h: 14, range: 100, speed: 0.65, elevation: 50 },
      // Section 2
      { x: 3700, w: 100, h: 14, range: 90, speed: 0.7, elevation: 55 },
      { x: 4800, w: 110, h: 14, range: 110, speed: 0.6, elevation: 45 },
      // Section 3
      { x: 6000, w: 100, h: 14, range: 110, speed: 0.7, elevation: 50 },
      { x: 7200, w: 110, h: 14, range: 100, speed: 0.65, elevation: 55 },
      // Section 4 — gauntlet moving platforms
      { x: 9150, w: 90, h: 14, range: 70, speed: 0.9, elevation: 65 },   // between staircase and bounce chain
      { x: 10050, w: 90, h: 14, range: 80, speed: 0.8, elevation: 50 },  // gap filler in float course
      { x: 10250, w: 90, h: 14, range: 80, speed: 0.85, elevation: 50 }, // gap filler
      { x: 10400, w: 90, h: 14, range: 80, speed: 0.75, elevation: 50 }, // gap filler
    ];

    // ══════════════════════════════════════
    // GROUND GAPS — where the ground drops away (must ride moving platforms)
    // ══════════════════════════════════════
    const GROUND_GAPS = [
      // Section 1
      { start: 1800, end: 2060, respawnX: 1760 },
      // Section 2
      { start: 3620, end: 3860, respawnX: 3580 },
      { start: 4680, end: 4960, respawnX: 4640 },
      // Section 3
      { start: 5890, end: 6180, respawnX: 5850 },
      { start: 7100, end: 7380, respawnX: 7060 },
      // Section 4
      { start: 9080, end: 9280, respawnX: 9040 },
      { start: 9920, end: 10500, respawnX: 9880 },  // big gap — 3 moving platforms
    ];

    function isOverGap(px) {
      for (const g of GROUND_GAPS) {
        if (px + SPRITE_W > g.start && px < g.end) return g;
      }
      return null;
    }

    // ══════════════════════════════════════
    // ADVENTURE BOXES
    // ══════════════════════════════════════
    const ADVENTURES = [
      { id: 'music',    x: 2850, elevation: 70,  url: '../puzzle/music/',    hint: 'reach the light to begin your first adventure', color: '#d49b3c' },
      { id: 'elements', x: 5300, elevation: 130, url: '../puzzle/elements/', hint: 'this one is high... try standing on each other!', color: '#4fc3f7' },
      { id: 'mystery',  x: 8100, elevation: 70,  url: '../puzzle/mystery/',  hint: 'one more light ahead...', color: '#b388ff' },
      { id: 'art',      x: 10600, elevation: 70, url: '../art/',             hint: 'a little gallery before the grand finale...', color: '#e8a87c' },
    ];

    // ══════════════════════════════════════
    // CHAPTER NAV
    // ══════════════════════════════════════
    const CHAPTERS = [
      { label: 'home',      action: 'home' },
      { label: 'start',     x: 0 },
      { label: 'rhythm',    x: 2750 },
      { label: 'elements',  x: 5200 },
      { label: 'mystery',   x: 8000 },
      { label: 'gallery',   x: 10500 },
    ];

    // ══════════════════════════════════════
    // SPAWN POSITION
    // ══════════════════════════════════════
    const urlParams = new URLSearchParams(window.location.search);
    const spawnAfter = urlParams.get('after');
    if (spawnAfter) history.replaceState(null, '', window.location.pathname);

    function getSpawnX() {
      if (spawnAfter) {
        const adv = ADVENTURES.find(a => a.id === spawnAfter);
        if (adv) return adv.x + BOX_SIZE / 2 - SPRITE_W / 2;
      }
      const savedX = localStorage.getItem('datenight-map-x');
      if (savedX) {
        localStorage.removeItem('datenight-map-x');
        return parseInt(savedX) || 120;
      }
      return 120;
    }

    function getSpawnY() {
      if (spawnAfter) {
        const adv = ADVENTURES.find(a => a.id === spawnAfter);
        if (adv) {
          const lineY = window.innerHeight - LINE_BOTTOM - 3;
          return lineY - BOX_SIZE - adv.elevation - SPRITE_H;
        }
      }
      return null;
    }

    // Track completed adventures
    function getCompleted() {
      try { return JSON.parse(localStorage.getItem('datenight-completed') || '[]'); } catch { return []; }
    }
    function markCompleted(id) {
      const c = getCompleted();
      if (!c.includes(id)) { c.push(id); localStorage.setItem('datenight-completed', JSON.stringify(c)); }
    }

    // Track collected hearts
    function getCollectedHearts() {
      try { return JSON.parse(localStorage.getItem('datenight-hearts') || '[]'); } catch { return []; }
    }
    function saveCollectedHearts(arr) {
      localStorage.setItem('datenight-hearts', JSON.stringify(arr));
    }

    // ══════════════════════════════════════
    // COMPUTED STATE
    // ══════════════════════════════════════
    let obstacles = [];
    let bouncePads = [];
    let speedZones = [];
    let hearts = [];
    let movingPlats = [];
    let collectedHearts = getCollectedHearts();
    let endingTriggered = false;

    function computeObstacles() {
      const lineY = window.innerHeight - LINE_BOTTOM - 3;
      obstacles = OBSTACLE_DEFS.map(o => {
        if (o.type === 'float') {
          return { x: o.x, y: lineY - DUCK_H - o.h - 2, w: o.w, h: o.h, type: 'float' };
        }
        return { x: o.x, y: lineY - o.h, w: o.w, h: o.h, type: 'ground' };
      });

      bouncePads = BOUNCE_DEFS.map(b => ({
        x: b.x, y: lineY - b.h, w: b.w, h: b.h
      }));

      speedZones = SPEED_ZONE_DEFS.map(s => ({
        x: s.x, y: lineY - 20, w: s.w, h: 20
      }));

      hearts = HEART_DEFS.map((h, i) => ({
        x: h.x, y: lineY - 18 - h.elevation, w: 18, h: 18, idx: i, collected: collectedHearts.includes(i)
      }));

      movingPlats = MOVING_PLAT_DEFS.map(m => ({
        baseX: m.x, x: m.x, y: lineY - m.elevation - m.h, w: m.w, h: m.h,
        range: m.range, speed: m.speed, phase: 0
      }));
    }

    // ══════════════════════════════════════
    // ENDLESS MODE — procedural generation
    // ══════════════════════════════════════
    let endlessGenerated = 0;  // how far we've generated
    let endlessDistance = 0;
    let endlessChunkIdx = 0;

    function endlessDifficulty() {
      // 0 → 1 scale, reaches ~0.8 around 20000px
      return Math.min(1, endlessGenerated / 25000);
    }

    function endlessGenerateChunk() {
      const lineY = window.innerHeight - LINE_BOTTOM - 3;
      const d = endlessDifficulty();
      const chunkW = 800 + Math.floor(Math.random() * 400);
      const startX = endlessGenerated;
      const endX = startX + chunkW;
      endlessChunkIdx++;

      // Ground gap (probability increases with difficulty)
      if (Math.random() < 0.3 + d * 0.35) {
        const gapW = 180 + Math.floor(d * 200 + Math.random() * 100);
        const gapStart = startX + 200 + Math.floor(Math.random() * (chunkW - gapW - 300));
        GROUND_GAPS.push({ start: gapStart, end: gapStart + gapW, respawnX: gapStart - 40 });

        // Bounce pad before gap
        BOUNCE_DEFS.push({ x: gapStart - 30, w: 30, h: 10 });
        bouncePads.push({ x: gapStart - 30, y: lineY - 10, w: 30, h: 10 });

        // Moving platform over gap (slower at start, faster later)
        const platSpeed = 0.5 + d * 0.6 + Math.random() * 0.2;
        const platW = Math.max(60, 100 - Math.floor(d * 30));
        MOVING_PLAT_DEFS.push({ x: gapStart + gapW / 2 - platW / 2, w: platW, h: 14, range: 60 + Math.floor(d * 40), speed: platSpeed, elevation: 45 + Math.floor(Math.random() * 20) });
        const mIdx = movingPlats.length;
        const m = MOVING_PLAT_DEFS[MOVING_PLAT_DEFS.length - 1];
        movingPlats.push({ baseX: m.x, x: m.x, y: lineY - m.elevation - m.h, w: m.w, h: m.h, range: m.range, speed: m.speed, phase: 0 });
        // render it
        const platEl = document.createElement('div');
        platEl.className = 'moving-platform';
        platEl.dataset.idx = mIdx;
        platEl.style.cssText = `left:${m.x}px; top:${lineY - m.elevation - m.h}px; width:${m.w}px; height:${m.h}px;`;
        document.getElementById('moving-platforms').appendChild(platEl);
      }

      // Obstacles (more and taller with difficulty)
      const numObs = 1 + Math.floor(Math.random() * (2 + d * 3));
      for (let i = 0; i < numObs; i++) {
        const ox = startX + 50 + Math.floor(Math.random() * (chunkW - 100));
        const isFloat = Math.random() < 0.25 + d * 0.15;
        if (isFloat) {
          const ow = 80 + Math.floor(Math.random() * 60);
          const oh = 16 + Math.floor(Math.random() * 4);
          OBSTACLE_DEFS.push(ob(ox, ow, oh, 'float'));
          const o = { x: ox, y: lineY - DUCK_H - oh - 2, w: ow, h: oh, type: 'float' };
          obstacles.push(o);
          const el = document.createElement('div');
          el.className = 'obstacle obstacle-float';
          el.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.w}px; height:${o.h}px; position:absolute;`;
          document.getElementById('obstacles').appendChild(el);
        } else {
          const ow = 25 + Math.floor(Math.random() * 20);
          const oh = 24 + Math.floor(d * 30 + Math.random() * 15);
          OBSTACLE_DEFS.push(ob(ox, ow, oh));
          const o = { x: ox, y: lineY - oh, w: ow, h: oh, type: 'ground' };
          obstacles.push(o);
          const el = document.createElement('div');
          el.className = 'obstacle';
          el.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.w}px; height:${o.h}px; position:absolute;`;
          document.getElementById('obstacles').appendChild(el);
        }
      }

      // Hearts (occasional)
      if (Math.random() < 0.5) {
        const hx = startX + 100 + Math.floor(Math.random() * (chunkW - 200));
        const he = 30 + Math.floor(Math.random() * 100);
        const hIdx = hearts.length;
        const h = { x: hx, y: lineY - 18 - he, w: 18, h: 18, idx: hIdx, collected: false };
        hearts.push(h);
        const el = document.createElement('div');
        el.className = 'heart-pickup';
        el.dataset.idx = hIdx;
        el.style.cssText = `left:${hx}px; top:${h.y}px;`;
        el.innerHTML = HEART_SVG;
        document.getElementById('hearts').appendChild(el);
      }

      // Speed zone (occasional)
      if (Math.random() < 0.3) {
        const sx = startX + Math.floor(Math.random() * (chunkW - 120));
        const sz = { x: sx, y: lineY - 20, w: 100, h: 20 };
        speedZones.push(sz);
        const el = document.createElement('div');
        el.className = 'speed-zone';
        el.style.cssText = `left:${sz.x}px; top:${sz.y}px; width:${sz.w}px; height:${sz.h}px;`;
        const arrowCount = 3;
        for (let i = 0; i < arrowCount; i++) {
          const arrow = document.createElement('div');
          arrow.className = 'sz-arrow';
          arrow.style.cssText = `left:${10 + i * 30}px; top:3px; animation-delay:${i * 0.15}s;`;
          el.appendChild(arrow);
        }
        document.getElementById('speed-zones').appendChild(el);
      }

      // Extend ground segment
      const seg = document.createElement('div');
      seg.className = 'ground-segment';
      seg.style.left = startX + 'px';
      seg.style.width = chunkW + 'px';
      document.getElementById('ground-segments').appendChild(seg);

      endlessGenerated = endX;
      WORLD_W = endX + 2000;
      worldEl.style.width = WORLD_W + 'px';
    }

    function updateEndless() {
      if (!isEndless) return;
      endlessDistance = Math.max(endlessDistance, Math.floor(player.x / 10));
      const distEl = document.getElementById('endless-dist');
      if (distEl) distEl.textContent = endlessDistance + 'm';

      // Generate ahead of player
      while (endlessGenerated < player.x + 3000) {
        endlessGenerateChunk();
      }
    }

    function renderGroundSegments() {
      const container = document.getElementById('ground-segments');
      container.innerHTML = '';
      // Sort gaps by start position
      const sorted = [...GROUND_GAPS].sort((a, b) => a.start - b.start);
      let cursor = 0;
      for (const gap of sorted) {
        if (gap.start > cursor) {
          const seg = document.createElement('div');
          seg.className = 'ground-segment';
          seg.style.left = cursor + 'px';
          seg.style.width = (gap.start - cursor) + 'px';
          container.appendChild(seg);
        }
        cursor = gap.end;
      }
      // Final segment after last gap
      if (cursor < WORLD_W) {
        const seg = document.createElement('div');
        seg.className = 'ground-segment';
        seg.style.left = cursor + 'px';
        seg.style.width = (WORLD_W - cursor) + 'px';
        container.appendChild(seg);
      }
    }

    function renderObstacles() {
      const container = document.getElementById('obstacles');
      container.innerHTML = '';
      obstacles.forEach(o => {
        const el = document.createElement('div');

    // COLLISION
    // ══════════════════════════════════════
    function collideDuck(px, py, ph) {
      const pw = SPRITE_W;

      for (const o of obstacles) {
        if (px + pw <= o.x || px >= o.x + o.w || py + ph <= o.y || py >= o.y + o.h) continue;
        const overlapL = (px + pw) - o.x;
        const overlapR = (o.x + o.w) - px;
        const overlapT = (py + ph) - o.y;
        const overlapB = (o.y + o.h) - py;
        const min = Math.min(overlapL, overlapR, overlapT, overlapB);

        if (min === overlapT) { player.y = o.y - SPRITE_H; player.vy = 0; player.jumping = false; }
        else if (min === overlapB) { player.y = o.y + o.h - (SPRITE_H - ph); player.vy = 1; }
        else if (min === overlapL) { player.x = o.x - pw; player.vx = 0; }
        else { player.x = o.x + o.w; player.vx = 0; }
      }

      for (const m of movingPlats) {
        if (px + pw <= m.x || px >= m.x + m.w || py + ph <= m.y || py >= m.y + m.h) continue;
        const overlapT = (py + ph) - m.y;
        const overlapB = (m.y + m.h) - py;
        if (overlapT < overlapB && player.vy >= 0) {
          player.y = m.y - SPRITE_H; player.vy = 0; player.jumping = false;
          player.x += m.dx || 0;
        }
      }
    }

    // ══════════════════════════════════════
    function checkBouncePads() {
      const pw = SPRITE_W;
      const pFeetY = player.y + SPRITE_H;
      for (let i = 0; i < bouncePads.length; i++) {
        const b = bouncePads[i];
        if (player.x + pw > b.x && player.x < b.x + b.w &&
            pFeetY >= b.y && pFeetY <= b.y + b.h + 6 && player.vy >= 0) {
          player.vy = BOUNCE_VEL;
          player.jumping = true;
          const el = document.querySelector(`.bounce-pad[data-idx="${i}"]`);
          if (el) { el.classList.add('squish'); setTimeout(() => el.classList.remove('squish'), 150); }
          return;
        }
      }
    }

    // ══════════════════════════════════════
    function checkSpeedZones() {
      const px = player.x + SPRITE_W / 2;
      const py = player.y + SPRITE_H;
      player.speedBoost = 0;
      for (const s of speedZones) {
        if (px > s.x && px < s.x + s.w && py > s.y && py < s.y + s.h + 10) {
          player.speedBoost = SPEED_BOOST;
          return;
        }
      }
    }

    function checkHearts() {
      const pw = SPRITE_W;
      for (const h of hearts) {
        if (h.collected) continue;
        if (player.x + pw > h.x && player.x < h.x + h.w &&
            player.y + SPRITE_H > h.y && player.y < h.y + h.h) {
          h.collected = true;
          collectedHearts.push(h.idx);

    // ══════════════════════════════════════
    // MOVING PLATFORMS
    // ══════════════════════════════════════
    function updateMovingPlatforms() {
      const container = document.getElementById('moving-platforms');
      const t = Date.now() / 1000;
      // Save previous positions for dx calculation
      const prevPositions = movingPlats.map(m => m.x);

      movingPlats.forEach((m) => {
        m.phase = t * m.speed;
        m.x = m.baseX + Math.sin(m.phase) * m.range;
      });

      // Resolve overlaps — push apart platforms at similar Y
      const gap = 4;
      for (let i = 0; i < movingPlats.length; i++) {
        for (let j = i + 1; j < movingPlats.length; j++) {
          const a = movingPlats[i], b = movingPlats[j];
          if (Math.abs(a.y - b.y) > 30) continue;
          const left = a.x < b.x ? a : b;
          const right = a.x < b.x ? b : a;
          const overlap = (left.x + left.w + gap) - right.x;
          if (overlap > 0) {
            const half = overlap / 2;
            left.x -= half;
            right.x += half;
          }
        }
      }

      // Compute dx from final positions and update DOM
      movingPlats.forEach((m, i) => {
        m.dx = m.x - prevPositions[i];
        const el = container.children[i];
        if (el) el.style.left = m.x + 'px';
      });
    }

    function checkAdventureBoxes() {

      const lineY = window.innerHeight - LINE_BOTTOM - 3;
      ADVENTURES.forEach(adv => {
        const bx = adv.x, by = lineY - BOX_SIZE - adv.elevation;
        if (player.x + SPRITE_W > bx && player.x < bx + BOX_SIZE &&
            player.y + SPRITE_H > by && player.y < by + BOX_SIZE) {
          enterAdventure(adv);
        }
      });
    }

    function enterAdventure(adv) {
      if (entering) return;
      entering = true;
      markCompleted(adv.id);
      sendPeer({ type: 'enter', id: adv.id });

      const lineY = window.innerHeight - LINE_BOTTOM - 3;
      const boxWorldX = adv.x + BOX_SIZE / 2;
      const boxWorldY = lineY - BOX_SIZE - adv.elevation + BOX_SIZE / 2;
      const camX = smoothCamX !== null ? smoothCamX : computeCamX();
      const boxScreenX = boxWorldX + camX;
      const boxScreenY = boxWorldY;

      const dx = adv.x + BOX_SIZE / 2 - player.x - SPRITE_W / 2;
      const dy = (lineY - BOX_SIZE - adv.elevation + BOX_SIZE / 2) - player.y - SPRITE_H / 2;

      playerEl.style.transform = `translate(${dx}px, ${dy}px) scale(0.2)`;

      const vortex = document.getElementById('enter-vortex');
      vortex.classList.add('active');
      const orbColor = adv.color || 'var(--dn-accent, #e85d75)';

        ring.className = 'enter-ring';

        ring.style.cssText = `width:${size}px;height:${size}px;left:${boxScreenX}px;top:${boxScreenY}px;border-color:${orbColor};animation:ring-collapse ${0.5 + i * 0.08}s ease-in ${i * 0.08}s forwards;`;
        vortex.appendChild(ring);

        flash.style.background = orbColor;
        flash.classList.add('show');
        setTimeout(() => { window.location.href = adv.url + '?from=map'; }, 500);

        statsEl.classList.add('visible');
      }, 5500);

      // Show actions
      setTimeout(() => {
        actionsEl.classList.add('visible');
      }, 7000);

      // Action handlers
      document.getElementById('ending-replay').onclick = () => {
        localStorage.removeItem('datenight-completed');
        localStorage.removeItem('datenight-hearts');
        window.location.reload();
      };
      document.getElementById('ending-home').onclick = () => {
        window.location.href = '../?from=map';
      };
    }

    // ══════════════════════════════════════
    // NAV MENU
    // ══════════════════════════════════════
    function setupNavMenu() {
      const nav = document.getElementById('chapter-nav');
      nav.innerHTML = '';

      CHAPTERS.forEach((ch, i) => {
        if (i > 0 && i !== 2) {
          const dot = document.createElement('span');
          dot.className = 'chapter-dot';
          nav.appendChild(dot);
        }
        if (i === 2) {
          const sep = document.createElement('span');
          sep.className = 'chapter-sep';
          nav.appendChild(sep);
        }
        const btn = document.createElement('button');
        btn.className = 'chapter-btn';
        btn.textContent = ch.label;
        btn.dataset.idx = i;
        btn.onclick = () => {
          if (ch.action === 'home') {
            sessionStorage.setItem('datenight-map-x', Math.round(player.x));
            window.location.href = '../?from=map';
          } else {
            teleportTo(ch.x);
          }
        };
        nav.appendChild(btn);
      });

      updateChapterHighlight();
    }

    function updateChapterHighlight() {
      const nav = document.getElementById('chapter-nav');
      if (!nav) return;
      const btns = nav.querySelectorAll('.chapter-btn');
      // Find which chapter the player is closest to (skip home/start at 0-1)
      let activeIdx = 1; // default to 'start'
      for (let i = CHAPTERS.length - 1; i >= 2; i--) {
        if (player.x >= CHAPTERS[i].x - 400) { activeIdx = i; break; }
      }
      btns.forEach((b, i) => b.classList.toggle('active', i === activeIdx));
    }

    function teleportTo(targetX) {
      const flash = document.getElementById('enter-flash');
      flash.style.background = 'var(--dn-accent, #e85d75)';
      flash.style.opacity = '1';
      flash.style.transition = 'opacity 0.3s ease';
      setTimeout(() => {
        player.x = targetX;
        player.y = groundY();
        player.vx = 0; player.vy = 0; player.jumping = false;
        flash.style.opacity = '0';
        setTimeout(() => { flash.style.transition = ''; }, 300);
      }, 250);
    }

    // ══════════════════════════════════════
    // GAME LOOP
    // ══════════════════════════════════════
    let lastPeerSend = 0;

    function gameLoop() {
      if (entering || endingTriggered) { requestAnimationFrame(gameLoop); return; }

      // Track player movement for intro fade
      if (!introPlayerMoved && (keys['ArrowLeft'] || keys['ArrowRight'] || keys['Space'] || keys['ArrowDown'])) {
        introPlayerMoved = true;
        fadeIntroIfReady();
      }

      // Contextual hints as player progresses (story mode only)
      if (isEndless) {} else if (!passedFirstOrb && !firstOrbDone && introPhase === 1 && player.x > 2900) {
        passedFirstOrb = true;
        introEl.classList.remove('fade');
        introEl.style.whiteSpace = '';
        introEl.textContent = "this one's a little tall...";
        introFaded = false; introTimerDone = false; introPlayerMoved = true;
        setTimeout(() => { introTimerDone = true; fadeIntroIfReady(); }, 15000);
        introPhase = 2;
      }

      if (!passedSecondOrb && !secondOrbDone && introPhase === 2 && player.x > 5400) {
        passedSecondOrb = true;
        introEl.classList.remove('fade');
        introEl.style.whiteSpace = '';
        introEl.textContent = 'one more light ahead...';
        introFaded = false; introTimerDone = false; introPlayerMoved = true;
        setTimeout(() => { introTimerDone = true; fadeIntroIfReady(); }, 15000);
        introPhase = 3;
      }

      if (!passedThirdOrb && introPhase === 3 && player.x > 8200) {
        passedThirdOrb = true;
        introEl.classList.remove('fade');
        introEl.style.whiteSpace = '';
        introEl.textContent = 'almost there... one last stop';
        introFaded = false; introTimerDone = false; introPlayerMoved = true;
        setTimeout(() => { introTimerDone = true; fadeIntroIfReady(); }, 12000);
        introPhase = 4;
      }

      if (!passedFourthOrb && introPhase === 4 && player.x > 10700) {
        passedFourthOrb = true;
        introEl.classList.remove('fade');
        introEl.style.whiteSpace = '';
        introEl.textContent = 'the final stretch... are you ready?';
        introFaded = false; introTimerDone = false; introPlayerMoved = true;
        setTimeout(() => { introTimerDone = true; fadeIntroIfReady(); }, 12000);
        introPhase = 5;
      }

      // Check for ending trigger
      if (!isEndless && player.x >= ENDING_X) {
        triggerEnding();
      }

      // Ducking
      player.ducking = !!(keys['ArrowDown'] && !player.jumping);

      checkSpeedZones();
      const effectiveSpeed = SPEED + player.speedBoost;

      if (keys['ArrowLeft']) { player.vx = -effectiveSpeed; player.facing = 'left'; }
      else if (keys['ArrowRight']) { player.vx = effectiveSpeed; player.facing = 'right'; }
      else { player.vx = 0; }

      if ((keys['Space'] || keys['ArrowUp']) && !player.jumping && !player.ducking) {
        player.vy = JUMP_VEL;
        player.jumping = true;
      }

      player.vy += GRAVITY;
      player.x += player.vx;
      player.y += player.vy;

      const gy = groundY();
      const gap = isOverGap(player.x);
      if (gap) {
        // Over a gap — no ground, check if fallen off screen
        if (player.y > window.innerHeight + 50) {
          player.x = gap.respawnX;
          player.y = gy;
          player.vy = 0;
          player.vx = 0;
          player.jumping = false;
        }
      } else {
        if (player.y >= gy) { player.y = gy; player.vy = 0; player.jumping = false; spawnImmunity = false; }
      }
      if (player.x < 0) player.x = 0;
      if (player.x > WORLD_W - SPRITE_W) player.x = WORLD_W - SPRITE_W;

      // Stacking
      if (partnerEl.style.display !== 'none' && !partner.jumping && player.vy >= 0) {
        const pFeetY = player.y + SPRITE_H;
        const partnerTopY = partner.y;
        const xOverlap = player.x + SPRITE_W > partner.x && player.x < partner.x + SPRITE_W;
        if (xOverlap && pFeetY >= partnerTopY && pFeetY <= partnerTopY + 8) {
          player.y = partner.y - SPRITE_H; player.vy = 0; player.jumping = false;
        }
      }

      checkBouncePads();

      const effectiveH = player.ducking ? DUCK_H : SPRITE_H;
      const effectiveY = player.ducking ? (player.y + SPRITE_H - DUCK_H) : player.y;
      collideDuck(player.x, effectiveY, effectiveH);

      checkHearts();
      updateMovingPlatforms();

      const walking = Math.abs(player.vx) > 0 && !player.jumping;
      playerEl.classList.toggle('walking', walking);
      playerEl.classList.toggle('jumping', player.jumping);
      playerEl.classList.toggle('ducking', player.ducking);
      playerEl.classList.toggle('facing-left', player.facing === 'left');
      playerEl.style.left = player.x + 'px';
      playerEl.style.top = player.y + 'px';

      // Staleness check — mark partner invisible if no message in 3s
      if (partnerVisible && Date.now() - lastPartnerMsg > 3000) {
        partnerVisible = false;
      }

      // Shared camera: center on midpoint when partner is visible
      let camX = computeCamX();
      if (smoothCamX === null) smoothCamX = camX;
      smoothCamX += (camX - smoothCamX) * 0.12;
      worldEl.style.transform = `translateX(${smoothCamX}px)`;

      // Tether: prevent player from moving off-screen when partner is visible
      if (partnerVisible) {
        const vpW = window.innerWidth;
        const margin = 40;
        const playerScreenX = player.x + smoothCamX;
        if (playerScreenX < margin) {
          player.x = margin - smoothCamX;
          player.vx = 0;
        } else if (playerScreenX + SPRITE_W > vpW - margin) {
          player.x = vpW - margin - SPRITE_W - smoothCamX;
          player.vx = 0;
        }
        playerEl.style.left = player.x + 'px';
      }

      checkAdventureBoxes();
      updateChapterHighlight();
      updateEndless();

      const now = Date.now();
      if (now - lastPeerSend > 50) {
        lastPeerSend = now;
        sendPeer({ type: 'pos', x: player.x, y: player.y, vx: player.vx, jumping: player.jumping, ducking: player.ducking, facing: player.facing });
      }

      requestAnimationFrame(gameLoop);
    }

    // ══════════════════════════════════════
    // PARTNER
    // ══════════════════════════════════════
    function updatePartner(data) {
      partner.x = data.x;
      partner.y = data.y;
      partner.jumping = data.jumping;
      partner.ducking = !!data.ducking;
      partnerEl.style.display = '';
      partnerEl.style.left = data.x + 'px';
      partnerEl.style.top = data.y + 'px';
      partnerEl.classList.toggle('walking', Math.abs(data.vx) > 0 && !data.jumping);
      partnerEl.classList.toggle('jumping', data.jumping);
      partnerEl.classList.toggle('ducking', !!data.ducking);
      partnerEl.classList.toggle('facing-left', data.facing === 'left');
      partnerVisible = true;
      lastPartnerMsg = Date.now();
    }

    function computeCamX() {
      const vpW = window.innerWidth;
      let camX;
      if (partnerVisible) {
        const midX = (player.x + partner.x) / 2;
        camX = -(midX - vpW / 2 + 16);
      } else {
        camX = -(player.x - vpW / 2 + 16);
      }
      return Math.min(0, Math.max(camX, -(WORLD_W - vpW)));
    }

    // ══════════════════════════════════════
    // PEERJS
    // ══════════════════════════════════════
    const roomCode = localStorage.getItem('datenight-room');
    const isHost = localStorage.getItem('datenight-host') === '1';
    let peer = null, conn = null;

    function peerIdForWorld(code) { return 'shahhub-world-' + code; }
    function sendPeer(data) { if (conn && conn.open) conn.send(data); }

    function handlePeerData(data) {
      if (data.type === 'pos') updatePartner(data);
      else if (data.type === 'character') {
        partnerChar = { ...partnerChar, ...data.data };
        buildSprite(partnerEl, partnerChar);
        if (window.hudUpdatePartner) window.hudUpdatePartner(data.data);
      }
      else if (data.type === 'enter') {
        const adv = ADVENTURES.find(a => a.id === data.id);
        if (adv) enterAdventure(adv);
      }
      else if (data.type === 'heart') {
        const h = hearts.find(h => h.idx === data.idx);
        if (h && !h.collected) {
          h.collected = true;
          if (!collectedHearts.includes(data.idx)) { collectedHearts.push(data.idx); saveCollectedHearts(collectedHearts); }
          const el = document.querySelector(`.heart-pickup[data-idx="${data.idx}"]`);
          if (el) el.classList.add('collected');
          updateHeartCounter();
          addPoints(HEART_POINTS);
          const counter = document.getElementById('heart-counter');
          counter.classList.remove('bump'); void counter.offsetWidth; counter.classList.add('bump');
        }
      }
      else if (data.type === 'ending') {
        triggerEnding();
      }
    }

    function setupPeer() {
      if (!roomCode) return;
      if (isHost) {
        peer = new Peer(peerIdForWorld(roomCode));
        peer.on('open', () => {
          peer.on('connection', c => {
            conn = c;
            c.on('open', () => c.send({ type: 'character', data: myChar }));
            c.on('data', handlePeerData);
          });
        });
        peer.on('error', () => {});
      } else {
        peer = new Peer();
        peer.on('open', () => tryConnect(0));
        peer.on('error', () => {});
      }
    }

    function tryConnect(attempt) {
      if (attempt > 20) return;
      const c = peer.connect(peerIdForWorld(roomCode), { reliable: true });
      let settled = false;
      c.on('open', () => {
        if (settled) return;
        settled = true;
        conn = c;
        c.send({ type: 'character', data: myChar });
        c.on('data', handlePeerData);
      });
      c.on('error', () => {
        if (settled) return;
        settled = true;
        setTimeout(() => tryConnect(attempt + 1), 1000);
      });
      // Timeout fallback — peer-unavailable errors fire on the peer object, not the connection
      setTimeout(() => {
        if (!settled) {
          settled = true;
          try { c.close(); } catch(e) {}
          tryConnect(attempt + 1);
        }
      }, 3000);
    }

    // ══════════════════════════════════════
    // INIT
    // ══════════════════════════════════════
    const completed = getCompleted();
    const introEl = document.getElementById('intro-text');
    const firstOrbDone = completed.includes('music');
    const secondOrbDone = completed.includes('elements');
    const thirdOrbDone = completed.includes('mystery');
    const fourthOrbDone = completed.includes('art');

    if (fourthOrbDone) {
      introEl.textContent = 'the final stretch... are you ready?';
    } else if (thirdOrbDone) {
      introEl.textContent = 'almost there... one last stop';
    } else if (secondOrbDone) {
      introEl.textContent = 'one more light ahead...';
    } else if (firstOrbDone) {
      introEl.textContent = "this one's a little tall...";
    } else {
      introEl.textContent = 'let the adventure begin\ngo find your first orb';
      introEl.style.whiteSpace = 'pre-line';
    }

    let introTimerDone = false;
    let introPlayerMoved = false;
    let introFaded = false;
    let introPhase = fourthOrbDone ? 5 : (thirdOrbDone ? 4 : (secondOrbDone ? 3 : (firstOrbDone ? 2 : 1)));

    function fadeIntroIfReady() {
      if (introFaded) return;
      if (introTimerDone && introPlayerMoved) { introEl.classList.add('fade'); introFaded = true; }
    }

    setTimeout(() => { introTimerDone = true; fadeIntroIfReady(); }, 15000);

    let passedFirstOrb = false;
    let passedSecondOrb = false;
    let passedThirdOrb = false;
    let passedFourthOrb = false;

    worldEl.style.width = WORLD_W + 'px';

    if (isEndless) {
      // Clear static definitions for endless mode
      OBSTACLE_DEFS.length = 0;
      BOUNCE_DEFS.length = 0;
      SPEED_ZONE_DEFS.length = 0;
      HEART_DEFS.length = 0;
      MOVING_PLAT_DEFS.length = 0;
      GROUND_GAPS.length = 0;

      // Empty compute
      obstacles = [];
      bouncePads = [];
      speedZones = [];
      hearts = [];
      movingPlats = [];
      collectedHearts = [];

      // Show endless HUD, hide story elements
      document.getElementById('endless-hud').style.display = '';
      document.getElementById('chapter-nav').style.display = 'none';
      document.getElementById('end-tunnel').style.display = 'none';
      introEl.textContent = 'endless mode\nhow far can you go?';
      introEl.style.whiteSpace = 'pre-line';

      // Render empty containers
      renderObstacles();
      renderBouncePads();
      renderSpeedZones();
      renderHearts();
      renderMovingPlatforms();

      // Generate initial ground + first chunks
      const initSeg = document.createElement('div');
      initSeg.className = 'ground-segment';
      initSeg.style.left = '0px';
      initSeg.style.width = '600px';
      document.getElementById('ground-segments').innerHTML = '';
      document.getElementById('ground-segments').appendChild(initSeg);
      endlessGenerated = 600;

      // Pre-generate a few chunks ahead
      for (let i = 0; i < 5; i++) endlessGenerateChunk();

      worldEl.style.width = WORLD_W + 'px';
    } else {
      computeObstacles();
      renderObstacles();
      renderBouncePads();
      renderSpeedZones();
      renderHearts();
      renderMovingPlatforms();
      renderGroundSegments();
      renderAdventureBoxes();
      renderEndTunnel();
    }
    setupNavMenu();

    if (orbSpawnY !== null) {
      player.y = orbSpawnY;
      player.vy = 0;
      player.jumping = true;
      partner.y = orbSpawnY - SPRITE_H;
      partner.jumping = true;
    } else {
      player.y = groundY();
      partner.y = groundY();
    }

    buildSprite(playerEl, myChar);
    buildSprite(partnerEl, partnerChar);
    playerEl.style.left = player.x + 'px';
    playerEl.style.top = player.y + 'px';

    // Drop-in animation
    const dropIn = localStorage.getItem('datenight-drop-in') === '1';
    if (dropIn) {
      localStorage.removeItem('datenight-drop-in');
      playerEl.style.opacity = '0';
      document.getElementById('intro-text').style.opacity = '0';
      document.getElementById('chapter-nav').style.opacity = '0';

      const overlay = document.getElementById('drop-in-overlay');
      const wrapper = document.getElementById('drop-in-wrapper');
      const dropChar = document.getElementById('drop-in-char');
      overlay.style.display = '';

      dropChar.innerHTML = `
        <div class="dc-hair" style="background:${myChar.hair}"></div>
        <div class="dc-face" style="background:${myChar.skin}"></div>
        <div class="dc-eyes"><div class="dc-eye"></div><div class="dc-eye"></div></div>
        <div class="dc-mouth"></div>
        <div class="dc-body" style="background:${myChar.shirt}"></div>
        <div class="dc-legs">
          <div class="dc-leg" style="background:${myChar.pants || '#3a3a5c'}"></div>
          <div class="dc-leg" style="background:${myChar.pants || '#3a3a5c'}"></div>
        </div>`;

      const lineScreenY = window.innerHeight - LINE_BOTTOM - 3;
      const charH = 108;
      const landY = lineScreenY - charH;
      const centerY = window.innerHeight / 2 - charH / 2;
      const dropDistance = landY - centerY;

      setTimeout(() => {
        wrapper.style.transform = `translateY(${dropDistance}px)`;
        setTimeout(() => {
          dropChar.classList.add('landed');
          setTimeout(() => {
            playerEl.style.transition = 'opacity 0.2s';
            playerEl.style.opacity = '1';
            overlay.classList.add('fade-out');
            const intro = document.getElementById('intro-text');
            intro.style.transition = 'opacity 0.8s ease';
            intro.style.opacity = '1';
            document.getElementById('chapter-nav').style.transition = 'opacity 0.5s';
            document.getElementById('chapter-nav').style.opacity = '1';
            setTimeout(() => overlay.remove(), 500);
          }, 400);
        }, 650);
      }, 300);
    }

    setupPeer();
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', () => {
      computeObstacles();
      renderObstacles();
      renderBouncePads();
      renderSpeedZones();
      renderHearts();
      renderMovingPlatforms();
      renderGroundSegments();
      renderAdventureBoxes();
      renderEndTunnel();
      player.y = Math.min(player.y, groundY());
    });
  </script>
</body>
</html>
