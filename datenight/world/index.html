<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>adventure</title>
  <link rel="stylesheet" href="../hud.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Comfortaa:wght@400;600&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400&family=Lora:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <script src="../theme.js"></script>
  <script src="../hud.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      background: #0a0a1a;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Viewport & World ── */
    .viewport { position: fixed; inset: 0; overflow: hidden; }

    .world {
      position: absolute;
      width: 3200px;
      height: 100%;
    }

    /* ── Sky ── */
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #0a0a2e 0%, #1a1a4e 30%, #2d1b4e 60%, #4a2040 100%);
    }

    .star {
      position: absolute;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.6;
    }
    .star.twinkle { animation: twinkle 2s ease-in-out infinite alternate; }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .moon {
      position: absolute;
      top: 8%; right: 20%;
      width: 50px; height: 50px;
      background: radial-gradient(circle at 35% 35%, #fffde7, #ffd54f);
      border-radius: 50%;
      box-shadow: 0 0 40px 10px rgba(255,213,79,0.15);
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 80px;
      background: linear-gradient(to bottom, #2d5a27, #1a3d16);
      z-index: 10;
    }
    .ground::before {
      content: '';
      position: absolute;
      top: -6px; left: 0; width: 100%; height: 12px;
      background: #3a7a30;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    /* ── Obstacles ── */
    .obstacle {
      position: absolute;
      z-index: 20;
    }

    .block {
      background: linear-gradient(135deg, #5a4a3a, #7a6a5a, #5a4a3a);
      border: 2px solid #4a3a2a;
      border-radius: 4px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.08), 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Brick lines */
    .block::before {
      content: '';
      position: absolute;
      inset: 4px;
      background:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 10px,
          rgba(0,0,0,0.15) 10px, rgba(0,0,0,0.15) 12px
        ),
        repeating-linear-gradient(
          90deg,
          transparent, transparent 18px,
          rgba(0,0,0,0.1) 18px, rgba(0,0,0,0.1) 20px
        );
      border-radius: 2px;
    }

    .beam {
      background: linear-gradient(to bottom, #8b6914, #6d5210, #8b6914);
      border: 2px solid #5c4310;
      border-radius: 3px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .beam::after {
      content: '';
      position: absolute;
      top: 2px; left: 4px; right: 4px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }

    /* ── Glowing Finish Box ── */
    .finish-box {
      position: absolute;
      z-index: 25;
      width: 60px; height: 60px;
      border-radius: 12px;
      background: var(--dn-accent, #e85d75);
      box-shadow:
        0 0 20px var(--dn-accent, #e85d75),
        0 0 40px color-mix(in srgb, var(--dn-accent, #e85d75) 50%, transparent),
        0 0 80px color-mix(in srgb, var(--dn-accent, #e85d75) 25%, transparent);
      animation: glow-box 1.5s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .finish-box::before {
      content: '\2728';
      font-size: 1.6rem;
    }

    @keyframes glow-box {
      0% { transform: scale(1); box-shadow: 0 0 20px var(--dn-accent, #e85d75), 0 0 40px rgba(232,93,117,0.3); }
      100% { transform: scale(1.08); box-shadow: 0 0 30px var(--dn-accent, #e85d75), 0 0 60px rgba(232,93,117,0.5), 0 0 100px rgba(232,93,117,0.2); }
    }

    /* ── Decorative Trees ── */
    .tree { position: absolute; bottom: 74px; z-index: 8; }
    .tree-trunk {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 10px; height: 35px;
      background: linear-gradient(to right, #5c3317, #8b4513, #5c3317);
      border-radius: 3px;
    }
    .tree-top {
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 45px;
      background: #1a4a1a; border-radius: 50% 50% 45% 45%;
    }
    .tree-top::after {
      content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      width: 28px; height: 32px; background: #1f5a1f; border-radius: 50%;
    }

    /* ── Character Sprite ── */
    .sprite {
      position: absolute;
      z-index: 50;
    }

    .sprite-inner {
      position: relative;
      width: 32px; height: 52px;
    }

    .sprite .s-hair {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 22px; height: 14px; border-radius: 50% 50% 30% 30%; z-index: 3;
    }
    .sprite .s-face {
      position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 20px; border-radius: 50%; z-index: 2;
    }
    .sprite .s-eyes {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 10px; display: flex; justify-content: space-between; z-index: 4;
    }
    .sprite .s-eye { width: 3px; height: 3px; background: #1a1a1a; border-radius: 50%; }
    .sprite .s-body {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 16px; border-radius: 5px 5px 3px 3px; z-index: 1;
    }
    .sprite .s-legs {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      display: flex; gap: 3px;
    }
    .sprite .s-leg {
      width: 7px; height: 14px;
      border-radius: 3px 3px 4px 4px; transition: transform 0.15s;
    }

    .sprite.walking .s-leg:first-child { animation: walk-l 0.3s ease-in-out infinite alternate; }
    .sprite.walking .s-leg:last-child { animation: walk-r 0.3s ease-in-out infinite alternate; }
    @keyframes walk-l { 0% { transform: rotate(-18deg); } 100% { transform: rotate(18deg); } }
    @keyframes walk-r { 0% { transform: rotate(18deg); } 100% { transform: rotate(-18deg); } }

    .sprite.jumping .s-leg { animation: none !important; transform: rotate(0deg) !important; }
    .sprite.facing-left .sprite-inner { transform: scaleX(-1); }

    .sprite-name {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      font-family: 'Caveat', cursive; font-size: 0.65rem;
      color: rgba(255,255,255,0.6); white-space: nowrap; pointer-events: none;
    }

    /* ── Intro Text ── */
    .intro-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: rgba(255,255,255,0.7);
      text-align: center;
      z-index: 100;
      line-height: 1.6;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }
    .intro-text.fade { opacity: 0; }

    /* ── Victory Flash ── */
    .victory-flash {
      position: fixed; inset: 0;
      background: var(--dn-accent, #e85d75);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .victory-flash.show { opacity: 1; }

    .victory-msg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: clamp(2rem, 5vw, 3rem);
      color: #fff;
      z-index: 10000;
      text-align: center;
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .victory-msg.show { transform: translate(-50%, -50%) scale(1); }

    /* ── Mobile Controls ── */
    .mobile-controls {
      position: fixed; bottom: 1.2rem; left: 0; right: 0;
      display: none; justify-content: space-between;
      padding: 0 1.2rem; z-index: 200; pointer-events: none;
    }
    .ctrl-group { display: flex; gap: 0.4rem; pointer-events: auto; }
    .ctrl-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6); font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.25); }
    .ctrl-btn.jump-btn { width: 58px; height: 58px; font-size: 0.75rem; font-family: 'Caveat', cursive; }
    @media (pointer: coarse) { .mobile-controls { display: flex; } }

    /* ── hint arrows ── */
    .hint {
      position: absolute;
      z-index: 30;
      font-family: 'Caveat', cursive;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body class="dark-hud">

  <div class="intro-text" id="intro-text">
    reach the glowing light to begin<br/>your first adventure together
  </div>

  <div class="victory-flash" id="victory-flash"></div>
  <div class="victory-msg" id="victory-msg">adventure begins!</div>

  <div class="viewport">
    <div class="world" id="world">
      <div class="sky" id="sky"></div>
      <div class="moon"></div>
      <div class="ground"></div>

      <!-- Decorative trees (behind obstacles) -->
      <div class="tree" style="left:80px;"><div class="tree-top"></div><div class="tree-trunk"></div></div>
      <div class="tree" style="left:750px;"><div class="tree-top"></div><div class="tree-trunk"></div></div>
      <div class="tree" style="left:1350px;"><div class="tree-top"></div><div class="tree-trunk"></div></div>
      <div class="tree" style="left:2100px;"><div class="tree-top"></div><div class="tree-trunk"></div></div>
      <div class="tree" style="left:2700px;"><div class="tree-top"></div><div class="tree-trunk"></div></div>

      <!-- Hints -->
      <div class="hint" id="hint-jump" style="left:340px; bottom:170px;">jump! &uarr;</div>
      <div class="hint" id="hint-duck" style="left:870px; bottom:170px;">walk under &darr;</div>

      <!-- Obstacles built by JS -->
      <div id="obstacles"></div>

      <!-- Finish box -->
      <div class="finish-box" id="finish-box"></div>

      <!-- Player -->
      <div class="sprite" id="player"></div>
      <!-- Partner -->
      <div class="sprite" id="partner" style="display:none;"></div>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div class="mobile-controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-left">&larr;</button>
      <button class="ctrl-btn" id="btn-right">&rarr;</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn jump-btn" id="btn-jump">jump</button>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════
    const WORLD_W = 3200;
    const GROUND_H = 80;
    const SPRITE_W = 32;
    const SPRITE_H = 52;
    const GRAVITY = 0.55;
    const JUMP_VEL = -11.5;
    const SPEED = 3.8;

    function groundY() { return window.innerHeight - GROUND_H - SPRITE_H; }

    // ══════════════════════════════════════
    // OBSTACLES
    // ══════════════════════════════════════
    // { x, y (from top of screen), w, h, type: 'block'|'beam' }
    // y is computed relative to ground for convenience then converted
    function ob(x, fromGround, w, h, type) {
      return { x, fromGround, w, h, type };
    }

    const OBSTACLE_DEFS = [
      // Ground blocks to jump over
      ob(400, 0, 55, 50, 'block'),
      ob(650, 0, 55, 50, 'block'),
      // Overhead beam — walk under
      ob(880, 68, 220, 18, 'beam'),
      // Taller block
      ob(1200, 0, 55, 75, 'block'),
      // Another block
      ob(1450, 0, 55, 50, 'block'),
      // Overhead beam
      ob(1600, 65, 240, 18, 'beam'),
      // Double wide block
      ob(1950, 0, 100, 55, 'block'),
      // Overhead beam
      ob(2200, 68, 220, 18, 'beam'),
      // Final block
      ob(2550, 0, 55, 55, 'block'),
    ];

    const FINISH_X = 2850;
    const FINISH_SIZE = 60;

    let obstacles = []; // computed with real y values

    function computeObstacles() {
      const gy = window.innerHeight - GROUND_H;
      obstacles = OBSTACLE_DEFS.map(o => ({
        x: o.x,
        y: gy - o.fromGround - o.h,
        w: o.w,
        h: o.h,
        type: o.type,
      }));
    }

    function renderObstacles() {
      const container = document.getElementById('obstacles');
      container.innerHTML = '';
      obstacles.forEach(o => {
        const el = document.createElement('div');
        el.className = 'obstacle ' + o.type;
        el.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.w}px; height:${o.h}px; position:absolute;`;
        container.appendChild(el);
      });

      // Finish box
      const fb = document.getElementById('finish-box');
      const gy = window.innerHeight - GROUND_H;
      fb.style.left = FINISH_X + 'px';
      fb.style.top = (gy - FINISH_SIZE) + 'px';
    }

    // ══════════════════════════════════════
    // CHARACTER DATA
    // ══════════════════════════════════════
    const DEFAULT_CHAR = { name: 'you', hair: '#1a1a1a', skin: '#c68642', shirt: '#e85d75', pants: '#3a3a5c' };
    let myChar = { ...DEFAULT_CHAR };
    try { const s = JSON.parse(sessionStorage.getItem('my-character')); if (s) myChar = { ...myChar, ...s }; } catch {}

    let partnerChar = { name: 'them', hair: '#4a3728', skin: '#f5cba7', shirt: '#4a7c9b', pants: '#1a1a2e' };

    function buildSprite(el, c) {
      el.innerHTML = `
        <div class="sprite-name">${c.name || ''}</div>
        <div class="sprite-inner">
          <div class="s-hair" style="background:${c.hair}"></div>
          <div class="s-face" style="background:${c.skin}"></div>
          <div class="s-eyes"><div class="s-eye"></div><div class="s-eye"></div></div>
          <div class="s-body" style="background:${c.shirt}"></div>
          <div class="s-legs"><div class="s-leg" style="background:${c.pants || '#3a3a5c'}"></div><div class="s-leg" style="background:${c.pants || '#3a3a5c'}"></div></div>
        </div>`;
    }

    // ══════════════════════════════════════
    // STARS
    // ══════════════════════════════════════
    function generateStars() {
      const sky = document.getElementById('sky');
      for (let i = 0; i < 70; i++) {
        const s = document.createElement('div');
        s.className = 'star' + (Math.random() > 0.6 ? ' twinkle' : '');
        s.style.left = Math.random() * WORLD_W + 'px';
        s.style.top = Math.random() * 50 + '%';
        s.style.width = s.style.height = (2 + Math.random() * 2) + 'px';
        s.style.animationDelay = Math.random() * 3 + 's';
        sky.appendChild(s);
      }
    }

    // ══════════════════════════════════════
    // PLAYER STATE
    // ══════════════════════════════════════
    const player = { x: 120, y: 0, vx: 0, vy: 0, jumping: false, facing: 'right' };
    const partner = { x: 160, y: 0 };
    let finished = false;

    const playerEl = document.getElementById('player');
    const partnerEl = document.getElementById('partner');
    const worldEl = document.getElementById('world');

    // ══════════════════════════════════════
    // INPUT
    // ══════════════════════════════════════
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    function setupMobileBtn(id, code) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); keys[code] = true; });
      btn.addEventListener('touchend', e => { e.preventDefault(); keys[code] = false; });
      btn.addEventListener('touchcancel', () => { keys[code] = false; });
    }
    setupMobileBtn('btn-left', 'ArrowLeft');
    setupMobileBtn('btn-right', 'ArrowRight');
    setupMobileBtn('btn-jump', 'Space');

    // ══════════════════════════════════════
    // COLLISION
    // ══════════════════════════════════════
    function collide(px, py) {
      const pw = SPRITE_W, ph = SPRITE_H;
      for (const o of obstacles) {
        // AABB overlap check
        if (px + pw <= o.x || px >= o.x + o.w || py + ph <= o.y || py >= o.y + o.h) continue;

        const overlapL = (px + pw) - o.x;
        const overlapR = (o.x + o.w) - px;
        const overlapT = (py + ph) - o.y;
        const overlapB = (o.y + o.h) - py;
        const min = Math.min(overlapL, overlapR, overlapT, overlapB);

        if (min === overlapT) {
          player.y = o.y - ph;
          player.vy = 0;
          player.jumping = false;
        } else if (min === overlapB) {
          player.y = o.y + o.h;
          player.vy = 1;
        } else if (min === overlapL) {
          player.x = o.x - pw;
          player.vx = 0;
        } else {
          player.x = o.x + o.w;
          player.vx = 0;
        }
      }
    }

    // ══════════════════════════════════════
    // FINISH CHECK
    // ══════════════════════════════════════
    function checkFinish() {
      const gy = window.innerHeight - GROUND_H;
      const fbY = gy - FINISH_SIZE;
      const px = player.x, py = player.y;

      if (px + SPRITE_W > FINISH_X && px < FINISH_X + FINISH_SIZE &&
          py + SPRITE_H > fbY && py < fbY + FINISH_SIZE) {
        triggerFinish();
      }
    }

    function triggerFinish() {
      if (finished) return;
      finished = true;

      // Flash + message
      const flash = document.getElementById('victory-flash');
      const msg = document.getElementById('victory-msg');
      flash.classList.add('show');
      msg.classList.add('show');

      sendPeer({ type: 'finish' });

      setTimeout(() => {
        window.location.href = '../puzzle/music/';
      }, 1800);
    }

    // ══════════════════════════════════════
    // GAME LOOP
    // ══════════════════════════════════════
    let lastPeerSend = 0;
    let introShown = true;

    function gameLoop() {
      if (finished) { requestAnimationFrame(gameLoop); return; }

      // Fade intro text after first move
      if (introShown && (keys['ArrowLeft'] || keys['ArrowRight'] || keys['Space'])) {
        document.getElementById('intro-text').classList.add('fade');
        introShown = false;
      }

      // Input
      if (keys['ArrowLeft']) { player.vx = -SPEED; player.facing = 'left'; }
      else if (keys['ArrowRight']) { player.vx = SPEED; player.facing = 'right'; }
      else { player.vx = 0; }

      if (keys['Space'] && !player.jumping) {
        player.vy = JUMP_VEL;
        player.jumping = true;
      }

      // Physics
      player.vy += GRAVITY;
      player.x += player.vx;
      player.y += player.vy;

      // Ground
      const gy = groundY();
      if (player.y >= gy) {
        player.y = gy;
        player.vy = 0;
        player.jumping = false;
      }

      // Bounds
      if (player.x < 0) player.x = 0;
      if (player.x > WORLD_W - SPRITE_W) player.x = WORLD_W - SPRITE_W;

      // Obstacle collision
      collide(player.x, player.y);

      // Sprite state
      const walking = Math.abs(player.vx) > 0 && !player.jumping;
      playerEl.classList.toggle('walking', walking);
      playerEl.classList.toggle('jumping', player.jumping);
      playerEl.classList.toggle('facing-left', player.facing === 'left');
      playerEl.style.left = player.x + 'px';
      playerEl.style.top = player.y + 'px';

      // Camera
      const vpW = window.innerWidth;
      let camX = -(player.x - vpW / 2 + 16);
      camX = Math.min(0, Math.max(camX, -(WORLD_W - vpW)));
      worldEl.style.transform = `translateX(${camX}px)`;

      // Finish check
      checkFinish();

      // Peer sync
      const now = Date.now();
      if (now - lastPeerSend > 50) {
        lastPeerSend = now;
        sendPeer({ type: 'pos', x: player.x, y: player.y, vx: player.vx, jumping: player.jumping, facing: player.facing });
      }

      requestAnimationFrame(gameLoop);
    }

    // ══════════════════════════════════════
    // PARTNER
    // ══════════════════════════════════════
    function updatePartner(data) {
      partnerEl.style.display = '';
      partnerEl.style.left = data.x + 'px';
      partnerEl.style.top = data.y + 'px';
      partnerEl.classList.toggle('walking', Math.abs(data.vx) > 0 && !data.jumping);
      partnerEl.classList.toggle('jumping', data.jumping);
      partnerEl.classList.toggle('facing-left', data.facing === 'left');
    }

    // ══════════════════════════════════════
    // PEERJS
    // ══════════════════════════════════════
    const roomCode = sessionStorage.getItem('datenight-room');
    const isHost = sessionStorage.getItem('datenight-host') === '1';
    let peer = null, conn = null;

    function peerIdForWorld(code) { return 'shahhub-world-' + code; }
    function sendPeer(data) { if (conn && conn.open) conn.send(data); }

    function handlePeerData(data) {
      if (data.type === 'pos') updatePartner(data);
      else if (data.type === 'character') {
        partnerChar = { ...partnerChar, ...data.data };
        buildSprite(partnerEl, partnerChar);
        if (window.hudUpdatePartner) window.hudUpdatePartner(data.data);
      }
      else if (data.type === 'finish') triggerFinish();
    }

    function setupPeer() {
      if (!roomCode) return;
      if (isHost) {
        peer = new Peer(peerIdForWorld(roomCode));
        peer.on('open', () => {
          peer.on('connection', c => {
            conn = c;
            c.on('open', () => c.send({ type: 'character', data: myChar }));
            c.on('data', handlePeerData);
          });
        });
        peer.on('error', () => {});
      } else {
        peer = new Peer();
        peer.on('open', () => tryConnect(0));
        peer.on('error', () => {});
      }
    }

    function tryConnect(attempt) {
      if (attempt > 15) return;
      const c = peer.connect(peerIdForWorld(roomCode), { reliable: true });
      c.on('open', () => {
        conn = c;
        c.send({ type: 'character', data: myChar });
        c.on('data', handlePeerData);
      });
      c.on('error', () => setTimeout(() => tryConnect(attempt + 1), 1000));
    }

    // ══════════════════════════════════════
    // INIT
    // ══════════════════════════════════════
    generateStars();
    computeObstacles();
    renderObstacles();

    player.y = groundY();
    partner.y = groundY();

    buildSprite(playerEl, myChar);
    buildSprite(partnerEl, partnerChar);
    playerEl.style.left = player.x + 'px';
    playerEl.style.top = player.y + 'px';

    setupPeer();
    requestAnimationFrame(gameLoop);

    // Recompute on resize
    window.addEventListener('resize', () => {
      computeObstacles();
      renderObstacles();
      player.y = Math.min(player.y, groundY());
    });
  </script>
</body>
</html>
