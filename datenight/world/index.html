<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>adventure</title>
  <link rel="stylesheet" href="../hud.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Caveat:wght@400;600&family=Comfortaa:wght@400;600&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400&family=Lora:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <script src="../theme.js"></script>
  <script src="../hud.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      background: var(--dn-bg, #fef0f5);
      user-select: none;
      -webkit-user-select: none;
      transition: background 1.5s ease;
    }

    .viewport { position: fixed; inset: 0; overflow: hidden; }

    .world {
      position: absolute;
      width: 3600px;
      height: 100%;
    }

    /* ── Ground Line ── */
    .ground-line {
      position: absolute;
      bottom: 80px; left: 0;
      width: 100%; height: 3px;
      background: var(--dn-accent, #e85d75);
      z-index: 10;
    }

    /* ── Obstacles: simple boxes ── */
    .obstacle {
      position: absolute;
      z-index: 20;
      background: var(--dn-accent, #e85d75);
      border-radius: 4px;
      opacity: 0.7;
    }

    .obstacle-float {
      opacity: 0.5;
      border-radius: 3px;
    }

    /* ── Glowing Finish Box ── */
    .finish-box {
      position: absolute;
      z-index: 25;
      width: 60px; height: 60px;
      border-radius: 12px;
      background: var(--dn-accent, #e85d75);
      box-shadow:
        0 0 20px var(--dn-accent, #e85d75),
        0 0 40px color-mix(in srgb, var(--dn-accent, #e85d75) 50%, transparent),
        0 0 80px color-mix(in srgb, var(--dn-accent, #e85d75) 25%, transparent);
      animation: glow-box 1.5s ease-in-out infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .finish-box::before {
      content: '\2728';
      font-size: 1.6rem;
    }

    @keyframes glow-box {
      0% { transform: scale(1); box-shadow: 0 0 20px var(--dn-accent, #e85d75), 0 0 40px rgba(232,93,117,0.3); }
      100% { transform: scale(1.08); box-shadow: 0 0 30px var(--dn-accent, #e85d75), 0 0 60px rgba(232,93,117,0.5), 0 0 100px rgba(232,93,117,0.2); }
    }

    /* ── Character Sprite ── */
    .sprite {
      position: absolute;
      z-index: 50;
    }

    .sprite-inner {
      position: relative;
      width: 32px; height: 52px;
    }

    .sprite .s-hair {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 22px; height: 14px; border-radius: 50% 50% 30% 30%; z-index: 3;
    }
    .sprite .s-face {
      position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 20px; border-radius: 50%; z-index: 2;
    }
    .sprite .s-eyes {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 10px; display: flex; justify-content: space-between; z-index: 4;
    }
    .sprite .s-eye { width: 3px; height: 3px; background: #1a1a1a; border-radius: 50%; }
    .sprite .s-body {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 16px; border-radius: 5px 5px 3px 3px; z-index: 1;
    }
    .sprite .s-legs {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      display: flex; gap: 3px;
    }
    .sprite .s-leg {
      width: 7px; height: 14px;
      border-radius: 3px 3px 4px 4px; transition: transform 0.15s;
    }

    .sprite.walking .s-leg:first-child { animation: walk-l 0.3s ease-in-out infinite alternate; }
    .sprite.walking .s-leg:last-child { animation: walk-r 0.3s ease-in-out infinite alternate; }
    @keyframes walk-l { 0% { transform: rotate(-18deg); } 100% { transform: rotate(18deg); } }
    @keyframes walk-r { 0% { transform: rotate(18deg); } 100% { transform: rotate(-18deg); } }

    .sprite.jumping .s-leg { animation: none !important; transform: rotate(0deg) !important; }
    .sprite.ducking .sprite-inner { transform: scaleY(0.58); transform-origin: bottom center; }
    .sprite.ducking.facing-left .sprite-inner { transform: scaleX(-1) scaleY(0.58); transform-origin: bottom center; }
    .sprite.facing-left .sprite-inner { transform: scaleX(-1); }

    .sprite-name {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      font-family: 'Caveat', cursive; font-size: 0.65rem;
      color: var(--dn-sub, #999); white-space: nowrap; pointer-events: none;
    }

    /* ── Intro Text ── */
    .intro-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: var(--dn-sub, #999);
      text-align: center;
      z-index: 100;
      line-height: 1.6;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }
    .intro-text.fade { opacity: 0; }

    /* ── Victory Flash ── */
    .victory-flash {
      position: fixed; inset: 0;
      background: var(--dn-accent, #e85d75);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .victory-flash.show { opacity: 1; }

    .victory-msg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: clamp(2rem, 5vw, 3rem);
      color: #fff;
      z-index: 10000;
      text-align: center;
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .victory-msg.show { transform: translate(-50%, -50%) scale(1); }

    /* ── Mobile Controls ── */
    .mobile-controls {
      position: fixed; bottom: 1.2rem; left: 0; right: 0;
      display: none; justify-content: space-between;
      padding: 0 1.2rem; z-index: 200; pointer-events: none;
    }
    .ctrl-group { display: flex; gap: 0.4rem; pointer-events: auto; }
    .ctrl-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: color-mix(in srgb, var(--dn-accent, #e85d75) 15%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--dn-accent, #e85d75) 30%, transparent);
      color: var(--dn-sub, #999); font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .ctrl-btn:active { background: color-mix(in srgb, var(--dn-accent, #e85d75) 30%, transparent); }
    .ctrl-btn.jump-btn { width: 58px; height: 58px; font-size: 0.75rem; font-family: 'Caveat', cursive; }
    @media (pointer: coarse) { .mobile-controls { display: flex; } }

    .back-btn {
      position: fixed; top: 1.2rem; left: 1.2rem;
      font-family: var(--dn-heading-font, 'Caveat', cursive);
      font-size: 1.1rem; color: var(--dn-sub, #999);
      text-decoration: none; z-index: 300;
      transition: color 0.3s;
    }
    .back-btn:hover { color: var(--dn-text, #555); }

    /* ── Drop-in animation ── */
    .drop-in-overlay {
      position: fixed; inset: 0;
      background: var(--dn-bg, #fef0f5);
      z-index: 8000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    .drop-in-overlay.fade-out {
      opacity: 0; pointer-events: none;
    }
    .drop-in-char {
      position: relative;
      width: 72px; height: 108px;
    }
    .drop-in-char .dc-hair {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 42px; height: 24px; border-radius: 50% 50% 30% 30%; z-index: 3;
    }
    .drop-in-char .dc-face {
      position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
      width: 34px; height: 36px; border-radius: 50%; z-index: 2;
    }
    .drop-in-char .dc-eyes {
      position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
      width: 20px; display: flex; justify-content: space-between; z-index: 4;
    }
    .drop-in-char .dc-eye { width: 5px; height: 6px; background: #1a1a1a; border-radius: 50%; }
    .drop-in-char .dc-mouth {
      position: absolute; top: 35px; left: 50%; transform: translateX(-50%);
      width: 10px; height: 5px; border-bottom: 2px solid #c0756b; border-radius: 0 0 50% 50%; z-index: 4;
    }
    .drop-in-char .dc-body {
      position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 30px; border-radius: 8px 8px 4px 4px; z-index: 1;
    }
    .drop-in-char .dc-legs {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px;
    }
    .drop-in-char .dc-leg {
      width: 12px; height: 24px; border-radius: 4px 4px 6px 6px;
    }

    .drop-in-wrapper {
      transition: transform 0.6s cubic-bezier(0.22, 1.2, 0.36, 1);
    }
    .drop-in-wrapper.dropping {
      /* set dynamically via JS */
    }

    @keyframes squish-land {
      0% { transform: scaleY(1) scaleX(1); }
      30% { transform: scaleY(0.75) scaleX(1.2); }
      60% { transform: scaleY(1.05) scaleX(0.97); }
      100% { transform: scaleY(1) scaleX(1); }
    }
    .drop-in-char.landed {
      animation: squish-land 0.35s ease forwards;
      transform-origin: bottom center;
    }
  </style>
</head>
<body>

  <!-- Drop-in overlay (shown when transitioning from home) -->
  <div class="drop-in-overlay" id="drop-in-overlay" style="display:none;">
    <div class="drop-in-wrapper" id="drop-in-wrapper">
      <div class="drop-in-char" id="drop-in-char"></div>
    </div>
  </div>

  <a href="../" class="back-btn">&larr; home</a>

  <div class="intro-text" id="intro-text"></div>

  <div class="victory-flash" id="victory-flash"></div>
  <div class="victory-msg" id="victory-msg"></div>

  <div class="viewport">
    <div class="world" id="world">
      <div class="ground-line"></div>

      <!-- Obstacles built by JS -->
      <div id="obstacles"></div>

      <!-- Finish box -->
      <div class="finish-box" id="finish-box"></div>

      <!-- Player -->
      <div class="sprite" id="player"></div>
      <!-- Partner -->
      <div class="sprite" id="partner" style="display:none;"></div>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div class="mobile-controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-left">&larr;</button>
      <button class="ctrl-btn" id="btn-right">&rarr;</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-duck">&darr;</button>
      <button class="ctrl-btn jump-btn" id="btn-jump">jump</button>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════
    // ── Level system ──
    const urlParams = new URLSearchParams(window.location.search);
    const LEVEL = parseInt(urlParams.get('level')) || 1;
    if (LEVEL === 2) history.replaceState(null, '', window.location.pathname);

    const WORLD_W = LEVEL === 1 ? 3200 : 3600;
    const GROUND_H = 80;  // ground line is at bottom: 80px
    const LINE_BOTTOM = 80;
    const SPRITE_W = 32;
    const SPRITE_H = 52;
    const GRAVITY = 0.55;
    const JUMP_VEL = -9.5;
    const SPEED = 2.4;
    const DUCK_H = 30; // sprite height when ducking

    function groundY() { return window.innerHeight - LINE_BOTTOM - 3 - SPRITE_H; }

    // ══════════════════════════════════════
    // OBSTACLES — ground boxes + floating blocks to duck under
    // ══════════════════════════════════════
    // type: 'ground' = sits on line, 'float' = hovers above (duck under)
    function ob(x, w, h, type) {
      return { x, w, h, type: type || 'ground' };
    }

    const OBSTACLE_DEFS_L1 = [
      ob(400, 30, 28),
      ob(620, 30, 28),
      ob(850, 120, 18, 'float'),   // duck under
      ob(1100, 30, 35),
      ob(1350, 30, 28),
      ob(1550, 140, 18, 'float'),  // duck under
      ob(1850, 45, 28),
      ob(2100, 120, 18, 'float'),  // duck under
      ob(2400, 30, 28),
    ];

    const OBSTACLE_DEFS_L2 = [
      ob(350, 35, 28),
      ob(550, 30, 32),
      ob(750, 130, 18, 'float'),   // duck under
      ob(950, 40, 28),
      ob(1100, 35, 35),
      ob(1300, 30, 28),
      ob(1500, 150, 18, 'float'),  // duck under
      ob(1700, 40, 28),
      ob(1900, 35, 32),
      ob(2050, 120, 18, 'float'),  // duck under
      ob(2250, 45, 28),
      ob(2450, 30, 35),
      ob(2600, 140, 18, 'float'),  // duck under
      ob(2750, 120, 20),           // stacking platform — wide ground block near finish
    ];

    const OBSTACLE_DEFS = LEVEL === 1 ? OBSTACLE_DEFS_L1 : OBSTACLE_DEFS_L2;

    const FINISH_X = LEVEL === 1 ? 2850 : 2850;
    const FINISH_SIZE = 60;
    const FINISH_ELEVATION = LEVEL === 1 ? 70 : 170; // level 2 is too high for a single jump

    let obstacles = [];

    function computeObstacles() {
      const lineY = window.innerHeight - LINE_BOTTOM - 3; // top of line
      obstacles = OBSTACLE_DEFS.map(o => {
        if (o.type === 'float') {
          // Float 20px above the ground — player must duck (30px) to fit under
          return { x: o.x, y: lineY - DUCK_H - o.h - 2, w: o.w, h: o.h, type: 'float' };
        }
        return { x: o.x, y: lineY - o.h, w: o.w, h: o.h, type: 'ground' };
      });
    }

    function renderObstacles() {
      const container = document.getElementById('obstacles');
      container.innerHTML = '';
      obstacles.forEach(o => {
        const el = document.createElement('div');
        el.className = 'obstacle' + (o.type === 'float' ? ' obstacle-float' : '');
        el.style.cssText = `left:${o.x}px; top:${o.y}px; width:${o.w}px; height:${o.h}px; position:absolute;`;
        container.appendChild(el);
      });

      // Finish box — elevated so player must jump to reach it
      const fb = document.getElementById('finish-box');
      const lineY = window.innerHeight - LINE_BOTTOM - 3;
      fb.style.left = FINISH_X + 'px';
      fb.style.top = (lineY - FINISH_SIZE - FINISH_ELEVATION) + 'px';
      fb.style.cursor = 'pointer';
      fb.style.pointerEvents = 'auto';
    }

    // ══════════════════════════════════════
    // CHARACTER DATA
    // ══════════════════════════════════════
    const DEFAULT_CHAR = { name: 'you', hair: '#1a1a1a', skin: '#c68642', shirt: '#e85d75', pants: '#3a3a5c' };
    let myChar = { ...DEFAULT_CHAR };
    try { const s = JSON.parse(sessionStorage.getItem('my-character')); if (s) myChar = { ...myChar, ...s }; } catch {}

    let partnerChar = { name: 'them', hair: '#4a3728', skin: '#f5cba7', shirt: '#4a7c9b', pants: '#1a1a2e' };

    function buildSprite(el, c) {
      el.innerHTML = `
        <div class="sprite-name">${c.name || ''}</div>
        <div class="sprite-inner">
          <div class="s-hair" style="background:${c.hair}"></div>
          <div class="s-face" style="background:${c.skin}"></div>
          <div class="s-eyes"><div class="s-eye"></div><div class="s-eye"></div></div>
          <div class="s-body" style="background:${c.shirt}"></div>
          <div class="s-legs"><div class="s-leg" style="background:${c.pants || '#3a3a5c'}"></div><div class="s-leg" style="background:${c.pants || '#3a3a5c'}"></div></div>
        </div>`;
    }

    // ══════════════════════════════════════
    // PLAYER STATE
    // ══════════════════════════════════════
    const player = { x: 120, y: 0, vx: 0, vy: 0, jumping: false, ducking: false, facing: 'right' };
    const partner = { x: 160, y: 0, jumping: false, ducking: false };
    let finished = false;

    const playerEl = document.getElementById('player');
    const partnerEl = document.getElementById('partner');
    const worldEl = document.getElementById('world');

    // ══════════════════════════════════════
    // INPUT
    // ══════════════════════════════════════
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    function setupMobileBtn(id, code) {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); keys[code] = true; });
      btn.addEventListener('touchend', e => { e.preventDefault(); keys[code] = false; });
      btn.addEventListener('touchcancel', () => { keys[code] = false; });
    }
    setupMobileBtn('btn-left', 'ArrowLeft');
    setupMobileBtn('btn-right', 'ArrowRight');
    setupMobileBtn('btn-duck', 'ArrowDown');
    setupMobileBtn('btn-jump', 'Space');

    // ══════════════════════════════════════
    // COLLISION
    // ══════════════════════════════════════
    function collideDuck(px, py, ph) {
      const pw = SPRITE_W;
      for (const o of obstacles) {
        if (px + pw <= o.x || px >= o.x + o.w || py + ph <= o.y || py >= o.y + o.h) continue;

        const overlapL = (px + pw) - o.x;
        const overlapR = (o.x + o.w) - px;
        const overlapT = (py + ph) - o.y;
        const overlapB = (o.y + o.h) - py;
        const min = Math.min(overlapL, overlapR, overlapT, overlapB);

        if (min === overlapT) {
          // Land on top
          player.y = o.y - SPRITE_H; // always use full height for positioning
          player.vy = 0;
          player.jumping = false;
        } else if (min === overlapB) {
          player.y = o.y + o.h - (SPRITE_H - ph); // adjust for duck offset
          player.vy = 1;
        } else if (min === overlapL) {
          player.x = o.x - pw;
          player.vx = 0;
        } else {
          player.x = o.x + o.w;
          player.vx = 0;
        }
      }
    }

    // ══════════════════════════════════════
    // FINISH CHECK
    // ══════════════════════════════════════
    function checkFinish() {
      const lineY = window.innerHeight - LINE_BOTTOM - 3;
      const fbY = lineY - FINISH_SIZE - FINISH_ELEVATION;
      const px = player.x, py = player.y;

      if (px + SPRITE_W > FINISH_X && px < FINISH_X + FINISH_SIZE &&
          py + SPRITE_H > fbY && py < fbY + FINISH_SIZE) {
        triggerFinish();
      }
    }

    function triggerFinish() {
      if (finished) return;
      finished = true;

      const flash = document.getElementById('victory-flash');
      const msg = document.getElementById('victory-msg');
      flash.classList.add('show');
      msg.classList.add('show');

      sendPeer({ type: 'finish' });

      const nextURL = LEVEL === 1 ? '../puzzle/music/' : '../';
      setTimeout(() => {
        window.location.href = nextURL;
      }, 1800);
    }

    // ══════════════════════════════════════
    // GAME LOOP
    // ══════════════════════════════════════
    let lastPeerSend = 0;
    let introShown = true;

    function gameLoop() {
      if (finished) { requestAnimationFrame(gameLoop); return; }

      if (introShown && (keys['ArrowLeft'] || keys['ArrowRight'] || keys['Space'] || keys['ArrowDown'])) {
        document.getElementById('intro-text').classList.add('fade');
        introShown = false;
      }

      // Ducking
      player.ducking = !!(keys['ArrowDown'] && !player.jumping);

      if (keys['ArrowLeft']) { player.vx = -SPEED; player.facing = 'left'; }
      else if (keys['ArrowRight']) { player.vx = SPEED; player.facing = 'right'; }
      else { player.vx = 0; }

      if (keys['Space'] && !player.jumping && !player.ducking) {
        player.vy = JUMP_VEL;
        player.jumping = true;
      }

      player.vy += GRAVITY;
      player.x += player.vx;
      player.y += player.vy;

      const gy = groundY();
      if (player.y >= gy) {
        player.y = gy;
        player.vy = 0;
        player.jumping = false;
      }

      if (player.x < 0) player.x = 0;
      if (player.x > WORLD_W - SPRITE_W) player.x = WORLD_W - SPRITE_W;

      // ── Stacking mechanic: land on partner's head ──
      if (partnerEl.style.display !== 'none' && !partner.jumping && player.vy >= 0) {
        const pFeetY = player.y + SPRITE_H;
        const partnerTopY = partner.y;
        const xOverlap = player.x + SPRITE_W > partner.x && player.x < partner.x + SPRITE_W;
        if (xOverlap && pFeetY >= partnerTopY && pFeetY <= partnerTopY + 8) {
          player.y = partner.y - SPRITE_H;
          player.vy = 0;
          player.jumping = false;
        }
      }

      // Use shorter hitbox when ducking
      const effectiveH = player.ducking ? DUCK_H : SPRITE_H;
      const effectiveY = player.ducking ? (player.y + SPRITE_H - DUCK_H) : player.y;
      collideDuck(player.x, effectiveY, effectiveH);

      const walking = Math.abs(player.vx) > 0 && !player.jumping;
      playerEl.classList.toggle('walking', walking);
      playerEl.classList.toggle('jumping', player.jumping);
      playerEl.classList.toggle('ducking', player.ducking);
      playerEl.classList.toggle('facing-left', player.facing === 'left');
      playerEl.style.left = player.x + 'px';
      playerEl.style.top = player.y + 'px';

      const vpW = window.innerWidth;
      let camX = -(player.x - vpW / 2 + 16);
      camX = Math.min(0, Math.max(camX, -(WORLD_W - vpW)));
      worldEl.style.transform = `translateX(${camX}px)`;

      checkFinish();

      const now = Date.now();
      if (now - lastPeerSend > 50) {
        lastPeerSend = now;
        sendPeer({ type: 'pos', x: player.x, y: player.y, vx: player.vx, jumping: player.jumping, ducking: player.ducking, facing: player.facing });
      }

      requestAnimationFrame(gameLoop);
    }

    // ══════════════════════════════════════
    // PARTNER
    // ══════════════════════════════════════
    function updatePartner(data) {
      partner.x = data.x;
      partner.y = data.y;
      partner.jumping = data.jumping;
      partner.ducking = !!data.ducking;
      partnerEl.style.display = '';
      partnerEl.style.left = data.x + 'px';
      partnerEl.style.top = data.y + 'px';
      partnerEl.classList.toggle('walking', Math.abs(data.vx) > 0 && !data.jumping);
      partnerEl.classList.toggle('jumping', data.jumping);
      partnerEl.classList.toggle('ducking', !!data.ducking);
      partnerEl.classList.toggle('facing-left', data.facing === 'left');
    }

    // ══════════════════════════════════════
    // PEERJS
    // ══════════════════════════════════════
    const roomCode = sessionStorage.getItem('datenight-room');
    const isHost = sessionStorage.getItem('datenight-host') === '1';
    let peer = null, conn = null;

    function peerIdForWorld(code) { return 'shahhub-world-' + code; }
    function sendPeer(data) { if (conn && conn.open) conn.send(data); }

    function handlePeerData(data) {
      if (data.type === 'pos') updatePartner(data);
      else if (data.type === 'character') {
        partnerChar = { ...partnerChar, ...data.data };
        buildSprite(partnerEl, partnerChar);
        if (window.hudUpdatePartner) window.hudUpdatePartner(data.data);
      }
      else if (data.type === 'finish') triggerFinish();
    }

    function setupPeer() {
      if (!roomCode) return;
      if (isHost) {
        peer = new Peer(peerIdForWorld(roomCode));
        peer.on('open', () => {
          peer.on('connection', c => {
            conn = c;
            c.on('open', () => c.send({ type: 'character', data: myChar }));
            c.on('data', handlePeerData);
          });
        });
        peer.on('error', () => {});
      } else {
        peer = new Peer();
        peer.on('open', () => tryConnect(0));
        peer.on('error', () => {});
      }
    }

    function tryConnect(attempt) {
      if (attempt > 15) return;
      const c = peer.connect(peerIdForWorld(roomCode), { reliable: true });
      c.on('open', () => {
        conn = c;
        c.send({ type: 'character', data: myChar });
        c.on('data', handlePeerData);
      });
      c.on('error', () => setTimeout(() => tryConnect(attempt + 1), 1000));
    }

    // ══════════════════════════════════════
    // INIT
    // ══════════════════════════════════════
    // ── Level-aware text ──
    document.getElementById('intro-text').innerHTML = LEVEL === 1
      ? 'reach the glowing light to begin<br/>your first adventure together'
      : "this one's too high... try standing on each other!";
    document.getElementById('victory-msg').textContent = LEVEL === 1
      ? "you've reached the first adventure"
      : 'teamwork makes the dream work!';

    // ── Set world width dynamically ──
    document.getElementById('world').style.width = WORLD_W + 'px';

    computeObstacles();
    renderObstacles();

    player.y = groundY();
    partner.y = groundY();

    buildSprite(playerEl, myChar);
    buildSprite(partnerEl, partnerChar);
    playerEl.style.left = player.x + 'px';
    playerEl.style.top = player.y + 'px';

    // ── Click/touch finish box to trigger finish directly ──
    document.getElementById('finish-box').addEventListener('click', () => triggerFinish());
    document.getElementById('finish-box').addEventListener('touchend', (e) => { e.preventDefault(); triggerFinish(); });

    // ── Drop-in animation from home page ──
    let gameStarted = false;
    const dropIn = sessionStorage.getItem('datenight-drop-in') === '1';

    if (dropIn) {
      sessionStorage.removeItem('datenight-drop-in');
      // Hide the real player sprite and game elements temporarily
      playerEl.style.opacity = '0';
      document.getElementById('intro-text').style.opacity = '0';
      document.querySelector('.back-btn').style.opacity = '0';

      // Build the overlay character using home-page style (larger sprite)
      const overlay = document.getElementById('drop-in-overlay');
      const wrapper = document.getElementById('drop-in-wrapper');
      const dropChar = document.getElementById('drop-in-char');
      overlay.style.display = '';

      dropChar.innerHTML = `
        <div class="dc-hair" style="background:${myChar.hair}"></div>
        <div class="dc-face" style="background:${myChar.skin}"></div>
        <div class="dc-eyes"><div class="dc-eye"></div><div class="dc-eye"></div></div>
        <div class="dc-mouth"></div>
        <div class="dc-body" style="background:${myChar.shirt}"></div>
        <div class="dc-legs">
          <div class="dc-leg" style="background:${myChar.pants || '#3a3a5c'}"></div>
          <div class="dc-leg" style="background:${myChar.pants || '#3a3a5c'}"></div>
        </div>`;

      // Calculate where the ground line is on screen
      const lineScreenY = window.innerHeight - LINE_BOTTOM - 3;
      // Character bottom should land on the line, so top = lineScreenY - charHeight
      const charH = 108;
      const landY = lineScreenY - charH;
      // Currently centered: top = 50% - charH/2
      const centerY = window.innerHeight / 2 - charH / 2;
      const dropDistance = landY - centerY;

      // Pause, then drop
      setTimeout(() => {
        wrapper.style.transform = `translateY(${dropDistance}px)`;
        // After drop animation
        setTimeout(() => {
          dropChar.classList.add('landed');
          // Squish done, fade overlay and reveal the real game
          setTimeout(() => {
            // Show the real player at ground position
            playerEl.style.transition = 'opacity 0.2s';
            playerEl.style.opacity = '1';
            // Fade out overlay
            overlay.classList.add('fade-out');
            // Show intro text and back btn
            const intro = document.getElementById('intro-text');
            intro.style.transition = 'opacity 0.8s ease';
            intro.style.opacity = '1';
            document.querySelector('.back-btn').style.transition = 'opacity 0.5s';
            document.querySelector('.back-btn').style.opacity = '1';
            gameStarted = true;

            setTimeout(() => overlay.remove(), 500);
          }, 400);
        }, 650);
      }, 300);
    } else {
      gameStarted = true;
    }

    setupPeer();
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', () => {
      computeObstacles();
      renderObstacles();
      player.y = Math.min(player.y, groundY());
    });
  </script>
</body>
</html>
