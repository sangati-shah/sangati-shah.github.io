<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sketches</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;500;600;700&display=swap');

    :root {
      --saffron: rgba(232, 131, 58, 1);
      --rose: rgba(207, 76, 126, 1);
      --peacock: rgba(0, 115, 130, 1);
      --cream: #fdf6ee;
    }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      color: #4a3f36;
      background: var(--cream);
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      z-index: 1000;
      background: rgba(253, 246, 238, 0.95);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(180, 87, 72, 0.06);
    }

    .nav-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(45deg, var(--saffron), var(--rose));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    main {
      max-width: 700px;
      margin: 6rem auto 2rem;
      padding: 0 1rem;
      line-height: 1.6;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      text-align: center;
      margin-bottom: 2rem;
      color: var(--peacock);
    }

    ul { list-style: none; padding: 0; }
    li { margin: 1rem 0; }
    a {
      font-size: 1.2rem;
      font-weight: 500;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    a:hover {
      color: var(--saffron);
      text-decoration: underline;
    }
    footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 10px;
      font-family: 'Nunito', sans-serif;
      color: var(--rose);
      font-size: 1rem;
      margin-top: 3em;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-content">
        <a href="/"><div class="nav-logo">&lt;s /&gt;</div></a>
    </div>
  </nav>

  <main>
    <h1>Sketches</h1>
    <ul>
      <li><a href="assets/sketches/flower-sketcher/flowers.html" target="_blank">flowers</a></li>
<li><a href="assets/sketches/gradients/gradients.html" target="_blank">gradients</a></li>
    </ul>
  <footer>
    <p id="currentDateDisplay"></p>
    <p>•</p>
    <p>Sangati Shah</p>
  </footer>
  <script src="scripts/main.js"></script>
  </main>
</body>
</html>
