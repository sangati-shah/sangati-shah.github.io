name = "sangati-theme-proxy"
main = "src/index.js"
compatibility_date = "2024-09-01"

[ai]
binding = "AI"

# Create the KV namespace with: npx wrangler kv namespace create RATE_LIMIT
# Then paste the id below.
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "YOUR_KV_NAMESPACE_ID"

[vars]
ALLOWED_ORIGINS = "https://sangati-shah.github.io,http://localhost:8080,http://127.0.0.1:8080"
DAILY_BUDGET = "500"
PER_IP_LIMIT = "10"
PER_IP_WINDOW_SECONDS = "600"
